api:
  dashboard: true
  # insecure: true 를 제거하여 8080 포트 중복 바인딩을 방지합니다.

entryPoints:
  web:
    address: ":80"
    transport:
      respondingTimeouts:
        readTimeout: "60s"
        writeTimeout: "60s"
        idleTimeout: "120s"
  traefik: # 이름을 traefik으로 통일하거나, 아래 라벨에서 dashboard 대신 traefik을 사용해야 함.
    address: ":8080"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false # 명시적으로 라벨을 붙인 서비스만 노출
    network: mooldangbot_osiris_net
  file:
    filename: "/etc/traefik/dynamic.yml"
    watch: true

# 🚀 [Performance]: 10k TPS 튜닝
transport:
  maxIdleConnsPerHost: 2048 # 호스트당 유휴 연결 수를 대폭 늘려 재사용 효율 극대화

log:
  level: INFO
  format: common

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100 # 10k TPS 상황에서 I/O 부하 감소를 위한 버퍼링
  fields:
    names:
      StartUTC: drop # 불필요한 필드 제거로 로그 크기 최적화
