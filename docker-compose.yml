version: '3.8'

services:
  db:
    image: mariadb:11.4
    container_name: mooldang-db
    command: --local-infile=1 --innodb-flush-method=fsync
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mooldang-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mooldang-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-migration
    restart: "no"
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - ConnectionStrings__DefaultConnection=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;AllowUserVariables=True;
    entrypoint: [ "dotnet", "MooldangBot.Cli.dll" ]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-app
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - ConnectionStrings__DefaultConnection=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;AllowUserVariables=True;
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${APP_DATA_PATH}:/app/data

  # [오시리스의 대시보드]: SvelteKit Studio
  studio:
    build:
      context: .
      dockerfile: MooldangBot.Studio/Dockerfile
    container_name: mooldang-studio
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
    depends_on:
      - app

  # [오시리스의 무대]: Svelte Overlay
  overlay:
    build:
      context: ./MooldangBot.Overlay
      dockerfile: Dockerfile
    container_name: mooldang-overlay
    restart: always

  # [오시리스의 관제/관리]: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mooldang-nginx
    restart: always
    ports:
      - "3000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - studio
      - overlay
      - app
