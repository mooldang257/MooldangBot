# [오시리스의 함대 v2.6]: 통합 완전판 (10k TPS 튜닝 + UI/Admin 복구)

services:
  db:
    image: mariadb:11.4
    container_name: mooldang-db
    command:
      - --local-infile=1
      - --innodb-flush-method=O_DIRECT
      - --max-connections=4096
      - --innodb-buffer-pool-size=16G
      - --innodb-log-file-size=2G
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-autoinc-lock-mode=2
      - --bulk_insert_buffer_size=268435456
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/mysql
    networks:
      - osiris_net
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mooldang-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - osiris_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mooldang-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - osiris_net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-migration
    restart: "no"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    entrypoint: [ "dotnet", "cli/MooldangBot.Cli.dll" ]
    networks:
      - osiris_net
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-app
    restart: always
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - osiris_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys

  chzzk-bot:
    build:
      context: .
      dockerfile: MooldangBot.ChzzkAPI/Dockerfile
    container_name: mooldang-chzzk-bot
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - DOTNET_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LOKI_URL=http://loki:3100
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CHZZKAPI__CLIENTID=${CHZZKAPI__CLIENTID}
      - CHZZKAPI__CLIENTSECRET=${CHZZKAPI__CLIENTSECRET}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - osiris_net
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ======== [프론트엔드 UI 서비스 복구] ========
  studio:
    build:
      context: .
      dockerfile: MooldangBot.Studio/Dockerfile
    container_name: mooldang-studio
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
      - INTERNAL_API_URL=http://app:8080
    networks:
      - osiris_net
    depends_on:
      - app

  overlay:
    build:
      context: ./MooldangBot.Overlay
      dockerfile: Dockerfile
    container_name: mooldang-overlay
    restart: always
    networks:
      - osiris_net

  admin:
    build:
      context: .
      dockerfile: MooldangBot.Admin/Dockerfile
    container_name: mooldang-admin
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
    networks:
      - osiris_net
    depends_on:
      - app

  # ======== [모니터링 서비스군] ========
  grafana:
    image: grafana/grafana-oss:latest
    container_name: mooldang-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${BASE_DOMAIN}/admin/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - osiris_net
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:latest
    container_name: mooldang-loki
    restart: always
    ports:
      - "3100:3100"
    networks:
      - osiris_net
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: mooldang-prometheus
    restart: always
    networks:
      - osiris_net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  nginx:
    image: nginx:alpine
    container_name: mooldang-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - osiris_net
    depends_on:
      - studio
      - admin
      - overlay
      - app

networks:
  osiris_net:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data:
