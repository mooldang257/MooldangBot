# [오시리스의 함대]: MooldangBot 통합 인프라 서비스 시트

services:
  db:
    image: mariadb:11.4
    container_name: mooldang-db
    command: 
      - --local-infile=1 
      - --innodb-flush-method=O_DIRECT
      - --max-connections=2048
      - --innodb-buffer-pool-size=4G
      - --innodb-log-file-size=512M
      - --innodb-flush-log-at-trx-commit=2
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/mysql
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mooldang-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mooldang-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-migration
    restart: "no"
    healthcheck:
      disable: true
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;AllowUserVariables=True;
    entrypoint: [ "dotnet", "cli/MooldangBot.Cli.dll" ]
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-app
    restart: always
    expose:
      - "8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - BASE_DOMAIN=${BASE_DOMAIN}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;AllowUserVariables=True;
    depends_on:
      chzzk-bot:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH}:/root/.aspnet/DataProtection-Keys

  # [오시리스의 대시보드]: SvelteKit Studio
  studio:
    build:
      context: .
      dockerfile: MooldangBot.Studio/Dockerfile
    container_name: mooldang-studio
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
      - INTERNAL_API_URL=http://app:8080
    depends_on:
      - app

  # [오시리스의 무대]: Svelte Overlay
  overlay:
    build:
      context: ./MooldangBot.Overlay
      dockerfile: Dockerfile
    container_name: mooldang-overlay
    restart: always

  # [v2.0] 물멍 봇 엔진: 치지직 소켓 전담 워커
  chzzk-bot:
    build:
      context: .
      dockerfile: MooldangBot.ChzzkAPI/Dockerfile
    container_name: mooldang-chzzk-bot
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - .env
    environment:
      - DOTNET_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - SHARD_INDEX=${SHARD_INDEX:-0}
      - SHARD_COUNT=${SHARD_COUNT:-1}
      - INSTANCE_ID=chzzk-bot-${SHARD_INDEX:-0}
      - LOKI_URL=http://loki:3100
      - ASPNETCORE_URLS=http://+:8080
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CHZZKAPI__CLIENTID=${CHZZKAPI__CLIENTID}
      - CHZZKAPI__CLIENTSECRET=${CHZZKAPI__CLIENTSECRET}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;AllowUserVariables=True;
    volumes:
      - ${KEYS_DATA_PATH}:/root/.aspnet/DataProtection-Keys
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # [v2.4] 함대 사령부: 관리자 전용 대시보드
  admin:
    build:
      context: .
      dockerfile: MooldangBot.Admin/Dockerfile
    container_name: mooldang-admin
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
    depends_on:
      - app

  # [v2.4] 관제 센터: Grafana (시각화)
  grafana:
    image: grafana/grafana-oss:latest
    container_name: mooldang-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      # [v2.4.4] 서브패스(/admin/monitoring) 지원 설정
      - GF_SERVER_ROOT_URL=${BASE_DOMAIN}/admin/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  # [v2.4] 관제 센터: Loki (로그 집계)
  loki:
    image: grafana/loki:latest
    container_name: mooldang-loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  # [v2.4] 관제 센터: Prometheus (지표 수집)
  prometheus:
    image: prom/prometheus:latest
    container_name: mooldang-prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'

  # [v2.4] 정찰병: MySQL Exporter (안정 버전 고정)
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.0
    container_name: mooldang-mysql-exporter
    restart: always
    environment:
      - DATA_SOURCE_NAME=${MARIADB_USER}:${MARIADB_PASSWORD}@(db:3306)/
    depends_on:
      db:
        condition: service_healthy

  # [v2.4] 정찰병: Redis Exporter
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: mooldang-redis-exporter
    restart: always
    environment:
      - REDIS_ADDR=redis:6379
    depends_on:
      - redis

  # [v2.4] 정찰병: Node Exporter (호스트 지표)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: mooldang-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'

  # [오시리스의 관제/관리]: Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: mooldang-nginx
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - studio
      - admin
      - overlay
      - app

volumes:
  grafana-data:
  prometheus-data:
