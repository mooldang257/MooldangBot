# [오시리스의 함대 v2.5]: 10k TPS 대응 및 네트워크 격리 버전

services:
  db:
    image: mariadb:11.4
    container_name: mooldang-db
    command: 
      - --local-infile=1 
      - --innodb-flush-method=O_DIRECT
      - --max-connections=4096            # 최대 연결 수 상향
      - --innodb-buffer-pool-size=16G      # 4G -> 16G (메모리 최적화)
      - --innodb-log-file-size=2G          # 512M -> 2G (배치 인서트 성능)
      - --innodb-flush-log-at-trx-commit=2 # 성능 최우선 설정
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/mysql
    networks:
      - osiris_net
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mooldang-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - osiris_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mooldang-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - osiris_net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  migration:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-migration
    restart: "no"
    env_file: - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - osiris_net
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mooldang-app
    restart: always
    env_file: - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - osiris_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys

  chzzk-bot:
    build:
      context: .
      dockerfile: MooldangBot.ChzzkAPI/Dockerfile
    container_name: mooldang-chzzk-bot
    restart: always
    ports:
      - "8081:8080"
    env_file: - .env
    environment:
      - DOTNET_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LOKI_URL=http://loki:3100
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - osiris_net
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # [모니터링 서비스군]
  grafana:
    image: grafana/grafana-oss:latest
    container_name: mooldang-grafana
    restart: always
    ports:
      - "3000:3000"
    networks:
      - osiris_net
    volumes:
      - grafana-data:/var/lib/grafana

  loki:
    image: grafana/loki:latest
    container_name: mooldang-loki
    restart: always
    ports:
      - "3100:3100"
    networks:
      - osiris_net
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: mooldang-prometheus
    restart: always
    networks:
      - osiris_net
    volumes:
      - prometheus-data:/prometheus

  nginx:
    image: nginx:alpine
    container_name: mooldang-nginx
    restart: always
    ports:
      - "80:80" # 외부 표준 포트 개방
    networks:
      - osiris_net
    depends_on:
      - app

networks:
  osiris_net:
    driver: bridge

volumes:
  grafana-data:
  prometheus-data: