# [MooldangBot]: Gateway Layer
# Traefik (Edge Router) & Cloudflare Tunnel (Secure Bridge)

services:
  traefik:
    image: traefik:v3.6.13
    container_name: mooldang-bot-traefik
    restart: always
    ports:
      - "80:80"
      - "81:81"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/log/traefik:/var/log/traefik
    networks:
      - mooldang_prod_net
      - mooldang_dev_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-bot.rule=Host(`${BASE_DOMAIN}`) && PathPrefix(`/traefik`)"
      - "traefik.http.routers.dashboard-bot.entrypoints=web"
      - "traefik.http.routers.dashboard-bot.service=api@internal"
      - "traefik.http.routers.dashboard-bot.middlewares=dashboard-shield@file"
      - "traefik.env=bot"
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mooldang-bot-tunnel
    restart: always
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel --no-autoupdate run
    network_mode: host
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mooldang_prod_net:
    external: true
  mooldang_dev_net:
    external: true
