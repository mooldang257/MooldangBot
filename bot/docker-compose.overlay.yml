# [오시리스의 함대] - FRONTEND OVERLAY LAYER
# 방송 송출 전용 오버레이 서비스를 담당합니다.

services:
  overlay:
    build:
      context: .
      dockerfile: ./MooldangBot.Overlay/Dockerfile
    image: mooldang-overlay:${VERSION_OVERLAY:-latest}
    container_name: mooldang-bot-overlay
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.overlay-bot.rule=(Host(`${BASE_DOMAIN}`)) && PathPrefix(`/overlay`)"
      - "traefik.http.routers.overlay-bot.entrypoints=web"
      - "traefik.http.services.overlay-bot.loadbalancer.server.port=80"
      - "traefik.http.routers.overlay-bot.middlewares=cloudflare-real-ip@file"
      - "traefik.docker.network=mooldang_prod_net"
      - "traefik.env=bot"
    networks:
      - mooldang_prod_net

networks:
  mooldang_prod_net:
    external: true
