api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    transport:
      respondingTimeouts:
        readTimeout: "60s"
        writeTimeout: "60s"
        idleTimeout: "120s"
  web-dev:
    address: ":81"
    transport:
      respondingTimeouts:
        readTimeout: "60s"
        writeTimeout: "60s"
        idleTimeout: "120s"
  traefik:
    address: ":8080"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    # constraints: "Label(`traefik.env`, `prod`) || Label(`traefik.env`, `bot`) || Label(`traefik.env`, `dev`)" # [격리] prod/bot/dev 라벨을 모두 수용하되 도메인으로 분리
  file:
    filename: "/etc/traefik/dynamic.yml"
    watch: true

transport:
  maxIdleConnsPerHost: 2048

log:
  level: INFO
  format: common

accessLog:
  filePath: "/var/log/traefik/access.log"
  bufferingSize: 100
  fields:
    names:
      StartUTC: drop
