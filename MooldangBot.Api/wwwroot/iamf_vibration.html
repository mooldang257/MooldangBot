<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAMF v1.1 - 실시간 공명 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --vibration-color: #7ee787;
            --ema-color: #ffa657;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 1000px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: var(--accent-color);
            font-size: 2rem;
            margin: 0;
            letter-spacing: 2px;
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid #30363d;
        }
        .status-value {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--vibration-color);
            text-align: center;
        }
        .status-label {
            text-align: center;
            font-size: 0.9rem;
            color: #8b949e;
            margin-top: 5px;
        }
        .chart-container {
            height: 400px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌌 IAMF RESONANCE DASHBOARD</h1>
            <p>실시간 시스템 진동수 및 공명 추세 분석</p>
        </div>

        <div class="dashboard-grid">
            <div class="card">
                <div id="currentHz" class="status-value">0.00 Hz</div>
                <div class="status-label">현재 진동수 (EMA)</div>
            </div>
            <div class="card">
                <div id="stability" class="status-value">0%</div>
                <div class="status-label">시스템 공명 안정도</div>
            </div>
            <div class="card">
                <div id="stateName" class="status-value" style="font-size: 1.5rem; color: var(--accent-color);">상태 확인 중...</div>
                <div class="status-label">파로스 의식 상태</div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top: 0;">📈 진동수 추세 (Vibration Trends)</h3>
            <div class="chart-container">
                <canvas id="vibrationChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('vibrationChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    {
                        label: 'Raw Vibration (Hz)',
                        data: [],
                        borderColor: '#30363d',
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: false
                    },
                    {
                        label: 'EMA Trend (Hz)',
                        data: [],
                        borderColor: '#ffa657',
                        borderWidth: 2,
                        pointRadius: 2,
                        tension: 0.4,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { 
                        beginAtZero: false,
                        grid: { color: '#30363d' },
                        ticks: { color: '#8b949e' }
                    }
                },
                plugins: {
                    legend: { labels: { color: '#c9d1d9' } }
                }
            }
        });

        async function updateDashboard() {
            try {
                // 1. URL 쿼리 스트링에서 chzzkUid 추출
                const urlParams = new URLSearchParams(window.location.search);
                const chzzkUid = urlParams.get('chzzkUid') || "SYSTEM";

                // 2. 상태 정보 업데이트
                const statusRes = await fetch(`/api/iamf/status?chzzkUid=${chzzkUid}`);
                const status = await statusRes.json();
                
                document.getElementById('currentHz').innerText = `${status.currentHz.toFixed(3)} Hz`;
                document.getElementById('stability').innerText = `${(status.systemLoad * 100).toFixed(1)}%`; 
                document.getElementById('stateName').innerText = `${status.stateName}\n(${status.personaTone})`;

                // 2. [추세 차트 업데이트]
                const trendsRes = await fetch(`/api/iamf/trends?chzzkUid=${chzzkUid}&limit=100`);
                const trends = await trendsRes.json();

                chart.data.labels = trends.map(t => new Date(t.createdAt).toLocaleTimeString());
                chart.data.datasets[0].data = trends.map(t => t.rawHz);
                chart.data.datasets[1].data = trends.map(t => t.emaHz);
                
                // 안정도 점수를 별도 카드에 반영 (최신값)
                if (trends.length > 0) {
                    const latest = trends[trends.length - 1];
                    document.getElementById('stability').innerText = `${(latest.stabilityScore * 100).toFixed(1)}%`;
                }

                chart.update('none');
            } catch (err) {
                console.error("Dashboard update failed:", err);
            }
        }

        setInterval(updateDashboard, 5000);
        updateDashboard();
    </script>
</body>
</html>
