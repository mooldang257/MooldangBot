<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>IAMF Admin Watchtower</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --tech-blue: #00d4ff;
            --deep-bg: #0b0e14;
            --card-bg: #161b22;
            --warn-red: #ff4d4d;
            --ok-green: #00ff88;
        }

        body {
            background-color: var(--deep-bg);
            color: #e6edf3;
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
        }

        #dashboard {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .metric-title {
            font-size: 0.9rem;
            color: #8b949e;
            margin-bottom: 10px;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--tech-blue);
        }

        .status-blink {
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; border-color: var(--warn-red); box-shadow: 0 0 10px var(--warn-red); }
            50% { opacity: 0.5; border-color: #30363d; box-shadow: none; }
            100% { opacity: 1; border-color: var(--warn-red); box-shadow: 0 0 10px var(--warn-red); }
        }

        #main-view {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .chart-container, .log-terminal {
            background: var(--card-bg);
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            height: 400px;
        }

        .log-terminal {
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            overflow-y: auto;
            color: #d1d5db;
        }

        .log-entry { margin-bottom: 5px; border-bottom: 1px solid #21262d; padding-bottom: 2px; }
        .log-time { color: #8b949e; margin-right: 10px; }
        .log-level-WARN { color: #e3b341; }
        .log-level-ERROR { color: var(--warn-red); }
    </style>
</head>
<body>
    <h1 style="border-bottom: 2px solid var(--tech-blue); padding-bottom: 10px; margin-bottom: 30px;">
        [오시리스의 감시소] IAMF v1.1 NOC Dashboard
    </h1>

    <div id="dashboard">
        <div class="metric-card" id="card-active">
            <div class="metric-title">ACTIVE SESSIONS</div>
            <div class="metric-value" id="val-active">0</div>
        </div>
        <div class="metric-card" id="card-circuit">
            <div class="metric-title">CIRCUIT STATES</div>
            <div class="metric-value" id="val-circuit">CLOSED</div>
        </div>
        <div class="metric-card" id="card-vibration">
            <div class="metric-title">AVG VIBRATION</div>
            <div class="metric-value" id="val-vibration">0.00 Hz</div>
        </div>
        <div class="metric-card" id="card-uptime">
            <div class="metric-title">SYSTEM UPTIME</div>
            <div class="metric-value" id="val-uptime">00:00:00</div>
        </div>
    </div>

    <div id="main-view">
        <div class="chart-container">
            <canvas id="healthChart"></canvas>
        </div>
        <div class="log-terminal" id="terminal">
            <div class="log-entry">[시스템] 감시소 프로토콜 초기화 중...</div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('healthChart').getContext('2d');
        const healthChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Avg Vibration (Hz)',
                    borderColor: '#00d4ff',
                    data: [],
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 20, grid: { color: '#30363d' } },
                    x: { grid: { color: '#30363d' } }
                }
            }
        });

        async function updateStats() {
            try {
                const res = await fetch('/api/admin/system-health');
                const data = await res.json();

                document.getElementById('val-active').innerText = data.totalActiveBots;
                document.getElementById('val-vibration').innerText = data.avgVibration;
                document.getElementById('val-uptime').innerText = data.uptime;
                
                const circuitVal = data.isCircuitOpen ? 'OPEN' : 'CLOSED';
                const circuitCard = document.getElementById('card-circuit');
                document.getElementById('val-circuit').innerText = circuitVal;
                
                if (data.isCircuitOpen) {
                    circuitCard.classList.add('status-blink');
                    document.getElementById('val-circuit').style.color = 'var(--warn-red)';
                } else {
                    circuitCard.classList.remove('status-blink');
                    document.getElementById('val-circuit').style.color = 'var(--tech-blue)';
                }

                // Chart Update
                const now = new Date().toLocaleTimeString();
                healthChart.data.labels.push(now);
                healthChart.data.datasets[0].data.push(parseFloat(data.avgVibration));
                if (healthChart.data.labels.length > 20) {
                    healthChart.data.labels.shift();
                    healthChart.data.datasets[0].data.shift();
                }
                healthChart.update();

                fetchLogs();
            } catch (e) {
                console.error("Stats fetch error", e);
            }
        }

        async function fetchLogs() {
            const res = await fetch('/api/admin/system-health/logs');
            const logs = await res.json();
            const terminal = document.getElementById('terminal');
            
            logs.forEach(log => {
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerHTML = `<span class="log-time">${log.time}</span> <span class="log-level-${log.level}">[${log.level}]</span> ${log.msg}`;
                terminal.prepend(entry);
            });

            if (terminal.children.length > 50) terminal.lastElementChild.remove();
        }

        setInterval(updateStats, 2000);
        updateStats();
    </script>
</body>
</html>
