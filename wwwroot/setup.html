<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>치지직 통제실 초기 설정</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .setup-box {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }

        h2 {
            color: #00ffa3;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            color: #aaa;
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 20px;
            text-align: center;
            font-family: monospace;
        }

        button {
            background: #00ffa3;
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 6px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

            button:hover {
                background: #00cc82;
            }
    </style>
</head>
<body>
    <div class="setup-box">
        <h2>초기 설정</h2>
        <p>본인의 <b>치지직 채널 고유 ID (UID)</b>를 입력해주세요.<br>(치지직 채널 접속 시 URL 맨 뒤의 32자리 영문/숫자)</p>
        <input type="text" id="chzzkUid" placeholder="치지직 UID 32자리 입력" maxlength="32">
        <button onclick="saveUid()">완료 및 시작하기</button>
    </div>

    <script>
        async function saveUid() {
            const uid = document.getElementById("chzzkUid").value.trim();
            if (uid.length < 10) {
                alert("정확한 치지직 UID를 입력해주세요.");
                return;
            }

            const response = await fetch('/api/setup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chzzkUid: uid })
            });

            if (response.ok) {
                // 저장 성공 시, 본인의 UID 기반 대시보드로 이동
                window.location.href = '/dashboard/' + uid;
            } else {
                alert("설정 저장에 실패했습니다.");
            }
        }
    </script>
</body>
</html>
