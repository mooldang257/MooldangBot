<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물댕봇 - 나만의 커스텀 치지직 봇</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0093E9;
            --secondary: #80D0C7;
            --accent: #FF9A9E;
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --text-dark: #2c3e50;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #fcfcfc 0%, #ebedee 100%);
            /* Cool wave background */
            background-image:
                radial-gradient(at 0% 0%, hsla(199, 100%, 75%, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 0%, hsla(353, 100%, 78%, 0.4) 0px, transparent 50%),
                radial-gradient(at 100% 100%, hsla(172, 100%, 71%, 0.4) 0px, transparent 50%),
                radial-gradient(at 0% 100%, hsla(220, 100%, 77%, 0.4) 0px, transparent 50%);
            color: var(--text-dark);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            text-decoration: none;
        }

        .logo-area img {
            height: 40px;
            border-radius: 50%;
        }

        .auth-area {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .btn-login {
            background: linear-gradient(135deg, #00c73c 0%, #00932a 100%);
            color: white;
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 199, 60, 0.3);
            border: none;
            cursor: pointer;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 199, 60, 0.4);
        }

        .profile-box {
            display: none;
            /* JS로 제어 */
            align-items: center;
            gap: 0.8rem;
            background: rgba(255, 255, 255, 0.5);
            padding: 0.4rem 1rem 0.4rem 0.4rem;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
        }

        .profile-img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .profile-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .hero-section {
            text-align: center;
            margin-bottom: 4rem;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero-character {
            width: 300px;
            height: 300px;
            object-fit: contain;
            margin-bottom: 1.5rem;
            /* 누끼로 인한 약간의 외곽선을 자연스럽게 덮어주는 흰색 후광 효과 */
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.9));
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-15px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            color: #555;
            max-width: 600px;
            margin: 0 auto;
            line-height: 1.6;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            width: 100%;
            max-width: 900px;
        }

        .menu-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            text-align: center;
            box-shadow: var(--glass-shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: var(--text-dark);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 100%);
            z-index: 1;
        }

        .menu-card>* {
            position: relative;
            z-index: 2;
        }

        .menu-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(0, 147, 233, 0.2);
        }

        .menu-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        .menu-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            color: var(--primary);
        }

        .menu-desc {
            font-size: 0.95rem;
            color: #666;
            margin: 0;
        }

        .login-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(4px);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: var(--primary);
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .loader {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(0, 147, 233, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <a href="/" class="logo-area">
            <img src="/images/wman_sd_transparent.png" alt="Logo" onerror="this.src='/images/wman_sd.png'">
            물댕봇
        </a>
        <div class="auth-area">
            <div id="loading-indicator" class="loader"></div>
            <a href="/login" id="login-btn" class="btn-login" style="display: none;">
                스트리머 로그인
            </a>
            <div id="profile-box" class="profile-box">
                <img id="profile-img" src="" alt="Profile" class="profile-img"
                    onerror="this.src='https://ssl.pstatic.net/cmstatic/nng/img/img_anonymous_square_gray_opacityx2.png'">
                <span id="profile-name" class="profile-name"></span>
            </div>
        </div>
    </nav>

    <main class="main-container">
        <section class="hero-section">
            <img src="/images/wman_sd_transparent.png" alt="물댕 봇 캐릭터" class="hero-character"
                onerror="this.src='/images/wman_sd.png'">
            <h1 class="hero-title">나만의 치지직 도우미</h1>
            <p class="hero-subtitle">물댕봇과 함께 당신의 방송을 더 특별하게 만들어보세요.<br>빠르고 예쁜 봇 기능들을 지금 바로 사용해보세요!</p>
        </section>

        <section class="menu-grid" id="menu-grid">
            <a href="#" class="menu-card" id="btn-song">
                <div class="menu-icon">🎵</div>
                <h2 class="menu-title">신청곡 관리</h2>
                <p class="menu-desc">시청자들이 신청한 노래들을 확인하고 재생 대기열을 관리합니다.</p>
                <div class="login-overlay">로그인이 필요합니다</div>
            </a>

            <a href="#" class="menu-card" id="btn-cmd">
                <div class="menu-icon">⚡</div>
                <h2 class="menu-title">명령어 관리</h2>
                <p class="menu-desc">채팅창에서 활용할 수 있는 내 방송만의 맞춤형 명령어를 설정합니다.</p>
                <div class="login-overlay">로그인이 필요합니다</div>
            </a>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const loginBtn = document.getElementById('login-btn');
            const profileBox = document.getElementById('profile-box');
            const profileImg = document.getElementById('profile-img');
            const profileName = document.getElementById('profile-name');
            const loadingIndicator = document.getElementById('loading-indicator');
            const overlays = document.querySelectorAll('.login-overlay');
            const btnSong = document.getElementById('btn-song');
            const btnCmd = document.getElementById('btn-cmd');

            try {
                // 내 정보 불러오기 API 호출
                const response = await fetch('/api/auth/me');

                if (!response.ok) {
                    throw new Error("API 연동 오류");
                }

                const data = await response.json();
                loadingIndicator.style.display = 'none';

                if (data.isAuthenticated) {
                    if (data.isChzzkLinked) {
                        // 치지직까지 모두 연동된 로그인 성공 상태
                        profileBox.style.display = 'flex';
                        profileName.textContent = data.channelName;
                        profileImg.src = data.profileImageUrl || 'https://ssl.pstatic.net/cmstatic/nng/img/img_anonymous_square_gray_opacityx2.png';

                        // 각 메뉴 카드 링크 활성화
                        btnSong.href = `/dashboard/${data.chzzkUid}`;
                        btnCmd.href = `/commands-manager/${data.chzzkUid}`;

                        // 로그인 오버레이 제거 (클릭 가능해짐)
                        overlays.forEach(overlay => overlay.style.display = 'none');
                    } else {
                        // 로그인만 되고 치지직 연동이 안 된 경우, 자동으로 치지직 연동으로 이동
                        window.location.href = '/api/auth/chzzk-login';
                    }
                } else {
                    // 비로그인 상태
                    loginBtn.style.display = 'block';
                }
            } catch (error) {
                console.error("인증 정보를 불러오는데 실패했습니다.", error);
                loadingIndicator.style.display = 'none';
                loginBtn.style.display = 'block';
            }
        });
    </script>
</body>

</html>
