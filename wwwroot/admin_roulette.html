<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>룰렛 관리 - 물댕봇</title>
    <link rel="stylesheet" href="/css/glass-theme.css">
    <style>
        .roulette-card {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            position: relative;
        }
        .item-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .item-row input {
            margin-bottom: 0;
        }
        .prob-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .total-prob {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
            color: var(--primary);
        }
        .test-btns {
            display: flex;
            gap: 5px;
        }
        .last-update {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            margin-top: 5px;
        }
        .load-more-container {
            text-align: center;
            margin: 20px 0;
        }
        /* 스위치 스타일 */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="panel">
            <h2 style="display:flex; justify-content:space-between; align-items:center;">
                🎡 룰렛 시스템 관리
                <button class="btn btn-primary" onclick="showCreateForm()">➕ 새 룰렛 만들기</button>
            </h2>

            <div style="margin-bottom: 20px; padding: 15px; background: rgba(0,255,163,0.1); border: 1px solid var(--primary); border-radius: 8px; display: flex; align-items: center; gap: 10px;">
                <span style="white-space: nowrap; font-weight: bold; color: var(--primary);">오버레이 URL:</span>
                <input type="text" id="overlayUrl" readonly style="flex: 1; padding: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px;" value="">
                <button class="btn btn-primary" onclick="copyOverlayUrl()" style="white-space: nowrap; padding: 8px 15px;">📋 URL 복사</button>
            </div>

            <div id="rouletteList">
                <!-- JS Rendered -->
            </div>
            <div class="load-more-container" id="loadMoreArea">
                <button class="btn btn-outline" id="btnLoadMore" style="display:none;" onclick="loadRoulettes(true)">더 보기 🔽</button>
            </div>
        </div>
    </div>

    <!-- 룰렛 편집 모달 -->
    <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto; padding: 40px 0;">
        <div class="panel" style="max-width:800px; margin:auto; background: #1a1a1a;">
            <h2 id="modalTitle">룰렛 설정</h2>
            <div class="config-grid">
                <div>
                    <span class="sub-title">룰렛 이름</span>
                    <input type="text" id="rName" placeholder="예: 치즈 룰렛">
                    <span class="sub-title">유형</span>
                    <select id="rType" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px; margin-bottom:15px;">
                        <option value="0" style="background:#2a2a2a; color:white;">치즈 (후원금)</option>
                        <option value="1" style="background:#2a2a2a; color:white;">채팅 포인트</option>
                    </select>
                    <span class="sub-title">실행 명령어 (채팅 포인트용)</span>
                    <input type="text" id="rCommand" value="!룰렛">
                    <span class="sub-title">1회 실행 비용</span>
                    <input type="number" id="rCost" value="1000">
                    <div style="display:flex; align-items:center; gap:10px; margin-top:15px;">
                        <span class="sub-title" style="margin-bottom:0;">활성화 여부</span>
                        <label class="switch">
                            <input type="checkbox" id="rIsActive" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
                <div>
                    <span class="sub-title">아이템 목록 (확률/가중치 설정)</span>
                    <div id="itemListContainer"></div>
                    <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="addItemRow()">➕ 아이템 추가</button>
                    <div class="total-prob" id="totalProbDisplay">총 가중치: 0</div>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" style="flex:1;" onclick="saveRoulette()">💾 저장하기</button>
                <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <script>
        let lastId = 0;
        let isEnd = false;
        let roulettes = [];
        let editingId = null;

        async function loadRoulettes(append = false) {
            if (!append) {
                lastId = 0;
                isEnd = false;
                roulettes = [];
                document.getElementById('rouletteList').innerHTML = '';
            }

            const queryParams = new URLSearchParams(window.location.search);
            const chzzkUid = queryParams.get('uid') || ""; 
            document.getElementById('overlayUrl').value = `${window.location.origin}/roulette_overlay.html?uid=${chzzkUid}`;

            try {
                const res = await fetch(`/api/admin/roulette?LastId=${lastId}&PageSize=10`, { credentials: 'same-origin' });
                if (res.ok) {
                    const result = await res.json();
                    roulettes = roulettes.concat(result.Data);
                    renderList(result.Data, append);
                    
                    if (result.NextLastId) {
                        lastId = result.NextLastId;
                        document.getElementById('btnLoadMore').style.display = 'inline-block';
                    } else {
                        isEnd = true;
                        document.getElementById('btnLoadMore').style.display = 'none';
                    }
                }
            } catch (err) {
                console.error("데이터 로딩 실패:", err);
            }
        }

        function renderList(newData, append) {
            const container = document.getElementById('rouletteList');
            
            if (!append && newData.length === 0) {
                container.innerHTML = '<div style="padding:40px; text-align:center; color:rgba(255,255,255,0.3);">등록된 룰렛이 없습니다.</div>';
                return;
            }

            newData.forEach(R => {
                const card = document.createElement('div');
                card.className = 'roulette-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <div style="flex:1;">
                            <h3 style="margin:0; color:var(--primary);">${R.Name}</h3>
                            <span class="prob-badge" style="background:rgba(255,255,255,0.1); margin-top:5px; display:inline-block;">
                                ${R.Type === 0 ? '🧀 치즈' : '🪙 포인트'} | ${R.CostPerSpin.toLocaleString()} ${R.Type === 0 ? '치즈' : 'P'} | 명령어: ${R.Command}
                            </span>
                            <div class="last-update">최종 수정: ${new Date(R.LstUpdDt).toLocaleString()}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <label class="switch" title="룰렛 활성/비활성">
                                <input type="checkbox" onchange="toggleRouletteStatus(${R.Id}, this.checked)" ${R.IsActive ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                            <div class="test-btns">
                                <button class="btn btn-secondary btn-sm" onclick="runTestSpin(${R.Id}, false)">🚀 1회 테스트</button>
                                <button class="btn btn-danger btn-sm" onclick="runTestSpin(${R.Id}, true)">🔥 10연차 테스트</button>
                                <button class="btn btn-outline btn-sm" onclick="showEditForm(${R.Id})">✏️ 수정</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteRoulette(${R.Id})">🗑️ 삭제</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function toggleRouletteStatus(Id, IsActive) {
            try {
                const res = await fetch(`/api/admin/roulette/${Id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(IsActive),
                    credentials: 'same-origin'
                });
                if (!res.ok) {
                    alert("상태 변경 실패");
                    loadRoulettes();
                }
            } catch (err) {
                console.error("통신 오류:", err);
                loadRoulettes();
            }
        }

        async function showEditForm(Id) {
            const res = await fetch(`/api/admin/roulette/${Id}`, { credentials: 'same-origin' });
            if (!res.ok) return;
            const R = await res.json();
            
            editingId = Id;
            document.getElementById('modalTitle').innerText = '룰렛 수정';
            document.getElementById('rName').value = R.Name;
            document.getElementById('rType').value = R.Type.toString();
            document.getElementById('rCommand').value = R.Command;
            document.getElementById('rCost').value = R.CostPerSpin;
            document.getElementById('rIsActive').checked = R.IsActive;
            
            const itemContainer = document.getElementById('itemListContainer');
            itemContainer.innerHTML = '';
            R.Items.forEach(I => addItemRow(I));
            
            updateTotalProb();
            document.getElementById('editModal').style.display = 'block';
        }

        function addItemRow(Item = null) {
            const container = document.getElementById('itemListContainer');
            const row = document.createElement('div');
            row.className = 'item-row';
            // 💡 PascalCase 대응 (Item.IsActive 또는 Item.isActive 처리)
            const isActive = Item ? (Item.IsActive ?? Item.isActive ?? true) : true;
            row.innerHTML = `
                <label class="switch" title="활성/비활성">
                    <input type="checkbox" class="item-active" ${isActive ? 'checked' : ''}>
                    <span class="slider"></span>
                </label>
                <input type="text" class="item-name" placeholder="항목명" value="${Item ? Item.ItemName : ''}" style="flex:2;">
                <input type="number" class="item-prob" placeholder="가중치" value="${Item ? Item.Probability : 10}" style="flex:1;" onchange="updateTotalProb()">
                <input type="color" class="item-color" value="${Item ? Item.Color : '#ff0055'}" style="width:40px; padding:2px; height:38px; border:none; background:none; cursor:pointer;">
                <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove(); updateTotalProb();">✖</button>
            `;
            container.appendChild(row);
            updateTotalProb();
        }

        async function saveRoulette() {
            const name = document.getElementById('rName').value.trim();
            if (!name) {
                alert("⚠️ 룰렛 이름을 입력해주세요.");
                return;
            }

            const Data = {
                Id: editingId || 0,
                Name: name,
                Type: parseInt(document.getElementById('rType').value),
                Command: document.getElementById('rCommand').value,
                CostPerSpin: parseInt(document.getElementById('rCost').value),
                IsActive: document.getElementById('rIsActive').checked,
                Items: Array.from(document.querySelectorAll('.item-row')).map(row => ({
                    ItemName: row.querySelector('.item-name').value,
                    Probability: parseFloat(row.querySelector('.item-prob').value) || 0,
                    Probability10x: parseFloat(row.querySelector('.item-prob').value) || 0,
                    Color: row.querySelector('.item-color').value,
                    IsActive: row.querySelector('.item-active').checked
                }))
            };

            // 💡 방어 로직: 적어도 하나 이상의 항목 활성화 확인
            if (!Data.Items.some(I => I.IsActive)) {
                alert("⚠️ 적어도 하나 이상의 항목은 활성화되어야 합니다.");
                return;
            }

            const res = await fetch(editingId ? `/api/admin/roulette/${editingId}` : '/api/admin/roulette', {
                method: editingId ? 'PUT' : 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(Data)
            });

            if (res.ok) {
                closeModal();
                loadRoulettes();
            } else {
                alert("저장 실패");
            }
        }

        function showCreateForm() {
            editingId = null;
            document.getElementById('modalTitle').innerText = '새 룰렛 생성';
            document.getElementById('rName').value = '';
            document.getElementById('rIsActive').checked = true;
            document.getElementById('itemListContainer').innerHTML = '';
            addItemRow();
            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        async function deleteRoulette(id) { if(confirm("삭제하시겠습니까?")) { await fetch(`/api/admin/roulette/${id}`, {method:'DELETE', credentials:'same-origin'}); loadRoulettes(); } }
        async function runTestSpin(id, is10x) { await fetch(`/api/admin/roulette/${id}/test?is10x=${is10x}`, {method:'POST', credentials:'same-origin'}); }
        function updateTotalProb() {
            let total = 0;
            document.querySelectorAll('.item-prob').forEach(input => total += parseFloat(input.value) || 0);
            document.getElementById('totalProbDisplay').innerText = `총 가중치 합: ${total.toFixed(2)}`;
        }
        function copyOverlayUrl() { 
            const urlInput = document.getElementById('overlayUrl');
            urlInput.select();
            document.execCommand('copy');
            alert("URL이 복사되었습니다.");
        }

        window.onload = loadRoulettes;
    </script>
</body>
</html>
