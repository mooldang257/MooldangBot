<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>룰렛 관리 - 물댕봇</title>
    <link rel="stylesheet" href="/css/glass-theme.css">
    <style>
        .roulette-card {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }
        .item-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }
        .item-row input {
            margin-bottom: 0;
        }
        .prob-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .total-prob {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
            color: var(--primary);
        }
        .test-btns {
            display: flex;
            gap: 5px;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="panel">
            <h2 style="display:flex; justify-content:space-between; align-items:center;">
                🎡 룰렛 시스템 관리
                <button class="btn btn-primary" onclick="showCreateForm()">➕ 새 룰렛 만들기</button>
            </h2>

            <div style="margin-bottom: 20px; padding: 15px; background: rgba(0,255,163,0.1); border: 1px solid var(--primary); border-radius: 8px; display: flex; align-items: center; gap: 10px;">
                <span style="white-space: nowrap; font-weight: bold; color: var(--primary);">오버레이 URL:</span>
                <input type="text" id="overlayUrl" readonly style="flex: 1; padding: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px;" value="">
                <button class="btn btn-primary" onclick="copyOverlayUrl()" style="white-space: nowrap; padding: 8px 15px;">📋 URL 복사</button>
            </div>

            <div id="rouletteList">
                <!-- JS Rendered -->
            </div>
        </div>
    </div>

    <!-- 룰렛 편집 모달 (간이 구현) -->
    <div id="editModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; overflow-y:auto; padding: 40px 0;">
        <div class="panel" style="max-width:800px; margin:auto; background: #1a1a1a;">
            <h2 id="modalTitle">룰렛 설정</h2>
            <div class="config-grid">
                <div>
                    <span class="sub-title">룰렛 이름</span>
                    <input type="text" id="rName" placeholder="예: 치즈 룰렛">
                    <span class="sub-title">유형</span>
                    <select id="rType" style="width:100%; padding:10px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:white; border-radius:8px; margin-bottom:15px;">
                        <option value="0" style="background:#2a2a2a; color:white;">치즈 (후원금)</option>
                        <option value="1" style="background:#2a2a2a; color:white;">채팅 포인트</option>
                    </select>
                    <span class="sub-title">실행 명령어 (채팅 포인트용)</span>
                    <input type="text" id="rCommand" value="!룰렛">
                    <span class="sub-title">1회 실행 비용</span>
                    <input type="number" id="rCost" value="1000">
                </div>
                <div>
                    <span class="sub-title">아이템 목록 (확률/가중치 설정)</span>
                    <div id="itemListContainer"></div>
                    <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="addItemRow()">➕ 아이템 추가</button>
                    <div class="total-prob" id="totalProbDisplay">총 가중치: 0</div>
                </div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn btn-primary" style="flex:1;" onclick="saveRoulette()">💾 저장하기</button>
                <button class="btn btn-secondary" style="flex:1;" onclick="closeModal()">취소</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script>
        const pathParts = window.location.pathname.split('/');
        const queryParams = new URLSearchParams(window.location.search);
        const chzzkUid = queryParams.get('uid') || (pathParts.length > 1 && pathParts[pathParts.length - 1] !== "admin_roulette.html" ? pathParts[pathParts.length - 1] : prompt("Chzzk UID를 입력하세요 (테스트용)"));
        
        let roulettes = [];
        let editingId = null;

        async function loadRoulettes() {
            // 오버레이 URL 초기화
            document.getElementById('overlayUrl').value = `${window.location.origin}/roulette_overlay.html?uid=${chzzkUid}`;

            const res = await fetch(`/api/admin/roulette`, { credentials: 'same-origin' });
            if (res.ok) {
                roulettes = await res.json();
                renderList();
            }
        }

        function copyOverlayUrl() {
            const urlInput = document.getElementById('overlayUrl');
            urlInput.select();
            urlInput.setSelectionRange(0, 99999);
            
            navigator.clipboard.writeText(urlInput.value).then(() => {
                alert("룰렛 오버레이 URL이 클립보드에 복사되었습니다!\nOBS 화면의 브라우저 소스에 붙여넣기 해 주세요. 🚀");
            }).catch(err => {
                // HTTPS 환경이 아니거나 클립보드 권한이 없을 경우를 대비한 구형 방식 지원
                try {
                    document.execCommand('copy');
                    alert("룰렛 오버레이 URL이 복사되었습니다.");
                } catch (e) {
                    alert("복사 실패. 주소창의 텍스트를 직접 복사해 주세요.");
                }
            });
        }

        function renderList() {
            const container = document.getElementById('rouletteList');
            container.innerHTML = '';
            
            if (roulettes.length === 0) {
                container.innerHTML = '<div style="padding:40px; text-align:center; color:rgba(255,255,255,0.3);">등록된 룰렛이 없습니다.</div>';
                return;
            }

            roulettes.forEach(r => {
                const card = document.createElement('div');
                card.className = 'roulette-card';
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:15px;">
                        <div>
                            <h3 style="margin:0; color:var(--primary);">${r.name}</h3>
                            <span class="prob-badge" style="background:rgba(255,255,255,0.1); margin-top:5px; display:inline-block;">
                                ${r.type === 0 ? '🧀 치즈' : '🪙 포인트'} | ${r.costPerSpin.toLocaleString()} ${r.type === 0 ? '치즈' : 'P'} | 명령어: ${r.command}
                            </span>
                        </div>
                        <div class="test-btns">
                            <button class="btn btn-secondary btn-sm" onclick="runTestSpin(${r.id}, false)">🚀 1회 테스트</button>
                            <button class="btn btn-danger btn-sm" onclick="runTestSpin(${r.id}, true)">🔥 10연차 테스트</button>
                            <button class="btn btn-outline btn-sm" onclick="showEditForm(${r.id})">✏️ 수정</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteRoulette(${r.id})">🗑️ 삭제</button>
                        </div>
                    </div>
                    <div style="display:flex; flex-wrap:wrap; gap:8px; font-size:13px;">
                        ${r.items.map(i => `<span style="border:1px solid ${i.color}; padding:2px 8px; border-radius:15px; color:${i.color}">${i.itemName} (${i.probability}%)</span>`).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function showCreateForm() {
            editingId = null;
            document.getElementById('modalTitle').innerText = '새 룰렛 생성';
            document.getElementById('rName').value = '';
            document.getElementById('rType').value = '0';
            document.getElementById('rCommand').value = '!룰렛';
            document.getElementById('rCost').value = '1000';
            document.getElementById('itemListContainer').innerHTML = '';
            addItemRow();
            document.getElementById('editModal').style.display = 'block';
        }

        function showEditForm(id) {
            const r = roulettes.find(x => x.id === id);
            if (!r) return;
            
            editingId = id;
            document.getElementById('modalTitle').innerText = '룰렛 수정';
            document.getElementById('rName').value = r.name;
            document.getElementById('rType').value = r.type.toString();
            document.getElementById('rCommand').value = r.command;
            document.getElementById('rCost').value = r.costPerSpin;
            
            const itemContainer = document.getElementById('itemListContainer');
            itemContainer.innerHTML = '';
            r.items.forEach(i => addItemRow(i));
            
            updateTotalProb();
            document.getElementById('editModal').style.display = 'block';
        }

        function addItemRow(item = null) {
            const container = document.getElementById('itemListContainer');
            const row = document.createElement('div');
            row.className = 'item-row';
            row.innerHTML = `
                <input type="text" class="item-name" placeholder="항목명" value="${item ? item.itemName : ''}" style="flex:2;">
                <input type="number" class="item-prob" placeholder="1회 가중치" value="${item ? item.probability : 10}" style="flex:1;" onchange="updateTotalProb()">
                <input type="number" class="item-prob10x" placeholder="10연차 가중치" value="${item ? item.probability10x : 10}" style="flex:1;">
                <input type="color" class="item-color" value="${item ? item.color : '#ff0055'}" style="width:40px; padding:2px; height:38px; border:none; background:none; cursor:pointer;">
                <button class="btn btn-danger btn-sm" onclick="this.parentElement.remove(); updateTotalProb();">✖</button>
            `;
            container.appendChild(row);
            updateTotalProb();
        }

        function updateTotalProb() {
            let total = 0;
            document.querySelectorAll('.item-prob').forEach(input => {
                total += parseFloat(input.value) || 0;
            });
            document.getElementById('totalProbDisplay').innerText = `총 가중치 합: ${total.toFixed(2)}`;
        }

        async function saveRoulette() {
            const data = {
                id: editingId || 0,
                chzzkUid: chzzkUid,
                name: document.getElementById('rName').value,
                type: parseInt(document.getElementById('rType').value),
                command: document.getElementById('rCommand').value,
                costPerSpin: parseInt(document.getElementById('rCost').value),
                isActive: true,
                items: Array.from(document.querySelectorAll('.item-row')).map(row => ({
                    rouletteId: editingId || 0,
                    itemName: row.querySelector('.item-name').value,
                    probability: parseFloat(row.querySelector('.item-prob').value) || 0,
                    probability10x: parseFloat(row.querySelector('.item-prob10x').value) || parseFloat(row.querySelector('.item-prob').value) || 0,
                    color: row.querySelector('.item-color').value
                }))
            };

            if (!data.name || data.items.length === 0) {
                alert("이름과 아이템을 입력해주세요.");
                return;
            }

            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? `/api/admin/roulette/${editingId}` : '/api/admin/roulette';

            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify(data)
            });

            if (res.ok) {
                closeModal();
                loadRoulettes();
            } else {
                alert("저장 실패: " + await res.text());
            }
        }

        async function deleteRoulette(id) {
            if (!confirm("정말 삭제하시겠습니까?")) return;
            const res = await fetch(`/api/admin/roulette/${id}`, { method: 'DELETE', credentials: 'same-origin' });
            if (res.ok) loadRoulettes();
        }

        async function runTestSpin(id, is10x) {
            const res = await fetch(`/api/admin/roulette/${id}/test?is10x=${is10x}`, { method: 'POST', credentials: 'same-origin' });
            if (res.ok) {
                const result = await res.json();
                console.log("테스트 실행 결과:", result);
                // 결과는 오버레이로 자동 전송됨 (SignalR)
            }
        }

        function closeModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        window.onload = loadRoulettes;
    </script>
</body>
</html>
