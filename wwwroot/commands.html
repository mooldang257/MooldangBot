<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>물댕봇 - 명령어 관리소</title>
    <link rel="stylesheet" href="/css/glass-theme.css">
    <style>
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 2fr auto;
            gap: 15px;
            align-items: end;
            margin-bottom: 25px;
        }
        .keyword { color: var(--primary); font-weight: bold; }
        .badge { font-size: 11px; padding: 4px 8px; border-radius: 6px; background: rgba(0,0,0,0.05); color: var(--text-dark); border: 1px solid var(--glass-border); font-weight: 700; }
        @media(max-width: 800px) {
            .form-row { grid-template-columns: 1fr; gap: 10px; }
            .form-row button { width: 100%; margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="javascript:history.back()" class="btn btn-outline" style="margin-bottom: 25px; display: inline-flex;">← 대시보드로 돌아가기</a>
        <h1>🛠️ 명령어 관리소</h1>

        <div class="panel" style="background: rgba(0, 147, 233, 0.05); border-left: 4px solid var(--primary);">
            <h3 style="margin-top:0; margin-bottom: 15px; font-size: 1.1em; color: var(--text-dark);">✨ 챗봇 답변용 동적 변수 가이드</h3>
            <p style="margin-top:0; font-size: 0.9em; color: #555; line-height: 1.8;">
                내용 중에 아래의 변수표현을 사용하면, 채팅을 친 시청자 본인의 실제 정보로 자동 치환되어 답변됩니다.<br>
                <span class="badge" style="background:var(--primary); color:white; border:none; padding:4px 8px;">{포인트}</span> <b>보유 포인트</b><br>
                <span class="badge" style="background:var(--primary); color:white; border:none; padding:4px 8px;">{출석일수}</span> <b>누적 출석 횟수</b><br>
                <span class="badge" style="background:var(--primary); color:white; border:none; padding:4px 8px;">{팔로우일수}</span> <b>방송을 팔로우한 일수 (치지직 연동)</b><br>
                <span style="color:var(--primary); font-weight:bold;">💡 등록 예시 :</span> <code>!내정보</code> (키워드) ➔ <code>현재 {포인트}점 보유, {출석일수}일째 출석 중!</code> (내용)
            </p>
        </div>

        <div class="panel">
            <div class="form-row">
                <div class="group"><label>키워드</label><input type="text" id="newKeyword" placeholder="!명령어" style="margin-bottom:0;"></div>
                <div class="group">
                    <label>동작</label>
                    <select id="newAction" style="margin-bottom:0;">
                        <option value="Notice">📢 상단 공지</option>
                        <option value="Reply">💬 채팅 답변</option>
                        <option value="SongRequest">🎵 노래 신청</option>
                    </select>
                </div>
                <div class="group">
                    <label>권한</label>
                    <select id="newRole" style="margin-bottom:0;"><option value="manager">스트리머/매니저</option><option value="all">모든 시청자</option></select>
                </div>
                <div class="group"><label>내용</label><input type="text" id="newContent" placeholder="실행할 내용" style="margin-bottom:0;"></div>
                <button class="btn btn-primary" onclick="saveCommand()" style="height:44px; margin-bottom:0;">추가/수정</button>
            </div>
        </div>

        <div class="panel">
            <table>
                <thead>
                    <tr><th>키워드</th><th>동작</th><th>권한</th><th>내용</th><th>관리</th></tr>
                </thead>
                <tbody id="commandTableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const chzzkUid = window.location.pathname.split('/').pop();

        async function loadCommands() {
            const res = await fetch(`/api/commands/list/${chzzkUid}`);
            const list = await res.json();
            const body = document.getElementById('commandTableBody');
            body.innerHTML = '';

            list.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="keyword">${c.commandKeyword}</td>
                    <td><span class="badge">${getActionLabel(c.actionType)}</span></td>
                    <td>${c.requiredRole === 'manager' ? '🛡️ 관리자' : '👥 전체'}</td>
                    <td>${c.content}</td>
                    <td><button class="btn btn-danger btn-sm" onclick="deleteCommand(${c.id})">삭제</button></td>
                `;
                body.appendChild(tr);
            });
        }

        async function saveCommand() {
            const action = document.getElementById('newAction').value;
            const content = document.getElementById('newContent').value;

            const cmd = {
                chzzkUid: chzzkUid,
                commandKeyword: document.getElementById('newKeyword').value,
                actionType: action,
                requiredRole: document.getElementById('newRole').value,
                content: content || (action === 'SongRequest' ? 'SongRequest' : '')
            };

            if(!cmd.commandKeyword) return alert("키워드를 입력해 주세요!");
            if(cmd.actionType !== 'SongRequest' && !cmd.content) return alert("내용을 입력해 주세요!");

            await fetch('/api/commands/save', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cmd)
            });
            loadCommands();
            document.getElementById('newKeyword').value = '';
            document.getElementById('newContent').value = '';
        }

        async function deleteCommand(id) {
            if(!confirm("정말 삭제할까요?")) return;
            await fetch(`/api/commands/delete/${id}`, { method: 'DELETE' });
            loadCommands();
        }

        function getActionLabel(type) {
            switch(type) {
                case 'Notice': return '📢 공지';
                case 'Reply': return '💬 답변';
                case 'SongRequest': return '🎵 노래 신청';
                default: return type;
            }
        }

        window.onload = loadCommands;
    </script>
</body>
</html>
