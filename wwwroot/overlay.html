<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물댕 마스터 오버레이</title>
    <!-- SignalR Client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent !important;
            overflow: hidden;
        }

        /* 
         * 모든 마스터 컴포넌트는 position: absolute 로 설정되며
         * 백엔드(SignalR)에서 전달받은 위치 및 크기로 실시간 업데이트 됩니다.
         */
        /* 
         * 모든 마스터 컴포넌트는 position: absolute 로 설정되며
         * 백엔드(SignalR)에서 전달받은 위치 및 크기로 실시간 업데이트 됩니다.
         */
        .overlay-component {
            position: absolute;
            border: none;
            background-color: transparent;
            pointer-events: none; /* 오버레이이므로 마우스 이벤트 무시 */
            transition: left 0.3s ease, top 0.3s ease, width 0.3s ease, height 0.3s ease;
            box-sizing: border-box;
            overflow: hidden;
        }
        .overlay-component img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .overlay-component iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }
    </style>
</head>
<body>

    <script>
        const pathParts = window.location.pathname.split('/');
        const chzzkUid = pathParts[pathParts.length - 1];

        // 각 컴포넌트 ID별 로드할 실제 오버레이 소스 URL 매핑
        function getComponentUrl(id, customUrl, type, templateId) {
            if (customUrl && customUrl.trim() !== "") return customUrl;
            if (type === 'image') return customUrl; // 이미지 타입은 URL이 필수

            const v = Date.now(); // 캐시 방지용 파라미터
            const tid = templateId || id;
            switch(tid) {
                case 'songlist': return `/songlist_overlay/${chzzkUid}?v=${v}`;
                case 'avatar': return `/avatar_overlay.html?uid=${chzzkUid}&v=${v}`;
                case 'roulette': return `/roulette_overlay.html?uid=${chzzkUid}&v=${v}`;
                case 'chat': return `/ChatPoint.html?uid=${chzzkUid}&v=${v}`;
                default: return ``; 
            }
        }

        function applyLayout(components) {
            if (!components || !Array.isArray(components)) return;

            // 제거된 컴포넌트 처리
            const currentIds = components.map(c => `master-${c.id}`);
            const existingEls = document.querySelectorAll('.overlay-component');
            existingEls.forEach(el => {
                if (!currentIds.includes(el.id)) {
                    el.remove();
                }
            });

            components.forEach(comp => {
                let el = document.getElementById(`master-${comp.id}`);
                const srcUrl = getComponentUrl(comp.id, comp.customUrl, comp.type, comp.templateId);
                
                // 엘리먼트가 없으면 생성
                if (!el) {
                    if (!srcUrl && comp.type !== 'image') return;

                    el = document.createElement('div');
                    el.id = `master-${comp.id}`;
                    el.className = 'overlay-component';
                    
                    if (comp.type === 'image') {
                        const img = document.createElement('img');
                        img.src = srcUrl || '';
                        el.appendChild(img);
                    } else {
                        const iframe = document.createElement('iframe');
                        iframe.src = srcUrl;
                        el.appendChild(iframe);
                    }
                    
                    el.setAttribute('data-src', srcUrl);
                    el.setAttribute('data-type', comp.type || 'bot_feature');
                    document.body.appendChild(el);
                } else {
                    // 타입이 바뀌었으면 재성성 방식을 취하거나 내부 교체
                    if (el.getAttribute('data-type') !== (comp.type || 'bot_feature')) {
                        el.remove();
                        applyLayout([comp]); // 재귀적 생성
                        return;
                    }

                    // URL 갱신 확인
                    if (el.getAttribute('data-src') !== srcUrl) {
                        const inner = el.querySelector('img, iframe');
                        if (inner) inner.src = srcUrl;
                        el.setAttribute('data-src', srcUrl);
                    }
                }

                // 속성 업데이트
                el.style.left = comp.x + 'px';
                el.style.top = comp.y + 'px';
                el.style.width = comp.width + 'px';
                el.style.height = comp.height + 'px';
                el.style.zIndex = comp.zIndex;
                el.style.display = comp.visible ? 'block' : 'none';
            });
        }

        async function fetchInitialLayout() {
            try {
                const res = await fetch(`/api/overlay/layout/${chzzkUid}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.components) {
                        applyLayout(data.components);
                    }
                }
            } catch (e) {
                console.error("초기 마스터 레이아웃 로드 실패", e);
            }
        }

        // SignalR 설정 및 연결
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/overlayHub")
            .withAutomaticReconnect()
            .build();

        // 관리자 대시보드에서 '저장 및 즉시 적용' 시 발생하는 이벤트 리스닝
        connection.on("ReceiveOverlayStyle", (jsonStyle) => {
            try {
                const data = JSON.parse(jsonStyle);
                console.log("마스터 오버레이 레이아웃 업데이트 수신:", data);
                if (data.components) {
                    applyLayout(data.components);
                }
            } catch (e) {
                console.error("수신된 레이아웃 데이터 파싱 실패", e);
            }
        });

        connection.start().then(() => { 
            console.log("마스터 오버레이 SignalR 연결 성공");
            connection.invoke("JoinStreamerGroup", chzzkUid.toLowerCase()); 
            fetchInitialLayout(); 
        }).catch(err => { 
            console.error("SignalR 연결 실패, 5초 후 재시도", err);
            setTimeout(fetchInitialLayout, 5000); 
        });

        connection.onreconnected(() => {
            console.log("SignalR 재연결 완료! 방명록에 다시 가입합니다.");
            connection.invoke("JoinStreamerGroup", chzzkUid.toLowerCase());
            fetchInitialLayout();
        });
    </script>
</body>
</html>
