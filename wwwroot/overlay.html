<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물댕 마스터 오버레이</title>
    <!-- SignalR Client -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent !important;
            overflow: hidden;
        }

        /* 
         * 모든 마스터 컴포넌트는 position: absolute 로 설정되며
         * 백엔드(SignalR)에서 전달받은 위치 및 크기로 실시간 업데이트 됩니다.
         */
        /* 
         * 모든 마스터 컴포넌트는 position: absolute 로 설정되며
         * 백엔드(SignalR)에서 전달받은 위치 및 크기로 실시간 업데이트 됩니다.
         */
        .overlay-component {
            position: absolute;
            border: none;
            background-color: transparent;
            pointer-events: none; /* 오버레이이므로 마우스 이벤트 무시 */
            transition: left 0.3s ease, top 0.3s ease, width 0.3s ease, height 0.3s ease;
            box-sizing: border-box;
            overflow: hidden;
        }
        .overlay-component img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .overlay-component iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: transparent;
        }

        /* Animated Background Layer */
        #bg-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -999;
            pointer-events: none;
            overflow: hidden;
            background-color: black;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #bg-video, #bg-img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }
    </style>
</head>
<body>
    <div id="bg-layer">
        <video id="bg-video" autoplay loop muted playsinline></video>
        <img id="bg-img">
    </div>

    <script>
        function getChzzkUid() {
            // 1. URL 쿼리 파라미터 확인
            const urlParams = new URL(window.location.href).searchParams;
            if (urlParams.get('uid')) return urlParams.get('uid');
            
            // 2. 경로에서 추출 (마지막 "/" 제외 필터링)
            const pathParts = window.location.pathname.split('/').filter(p => p !== "");
            const lastPart = pathParts[pathParts.length - 1];
            
            // 만약 마지막 부분이 overlay 이거나 .html 이면 UID 아님
            if (!lastPart || lastPart === 'overlay' || lastPart.includes('.html')) return "";
            return lastPart;
        }

        const chzzkUid = getChzzkUid();
        console.log("Master Overlay: Extracted UID =", chzzkUid);

        // 각 컴포넌트 ID별 로드할 실제 오버레이 소스 URL 매핑
        function getComponentUrl(id, customUrl, type, templateId) {
            if (customUrl && customUrl.trim() !== "") return customUrl;
            if (type === 'image') return customUrl; // 이미지 타입은 URL이 필수

            const v = Date.now(); // 캐시 방지용 파라미터
            const tid = templateId || id;
            switch(tid) {
                case 'songlist': return `/songlist_overlay/${chzzkUid}?v=${v}`;
                case 'avatar': return `/avatar_overlay.html?uid=${chzzkUid}&v=${v}`;
                case 'roulette': return `/roulette_overlay.html?uid=${chzzkUid}&v=${v}`;
                case 'chat': return `/ChatPoint.html?uid=${chzzkUid}&v=${v}`;
                default: return ``; 
            }
        }

        function applyLayout(components) {
            if (!components || !Array.isArray(components)) return;

            // 제거된 컴포넌트 처리
            const currentIds = components.map(c => `master-${c.id}`);
            const existingEls = document.querySelectorAll('.overlay-component');
            existingEls.forEach(el => {
                if (!currentIds.includes(el.id)) {
                    el.remove();
                }
            });

            components.forEach(comp => {
                let el = document.getElementById(`master-${comp.id}`);
                const srcUrl = getComponentUrl(comp.id, comp.customUrl, comp.type, comp.templateId);
                
                // 엘리먼트가 없으면 생성
                if (!el) {
                    if (!srcUrl && comp.type !== 'image') return;

                    el = document.createElement('div');
                    el.id = `master-${comp.id}`;
                    el.className = 'overlay-component';
                    
                    if (comp.type === 'image') {
                        const img = document.createElement('img');
                        img.src = srcUrl || '';
                        el.appendChild(img);
                    } else {
                        const iframe = document.createElement('iframe');
                        iframe.src = srcUrl;
                        el.appendChild(iframe);
                    }
                    
                    el.setAttribute('data-src', srcUrl);
                    el.setAttribute('data-type', comp.type || 'bot_feature');
                    document.body.appendChild(el);
                } else {
                    // 타입이 바뀌었으면 재성성 방식을 취하거나 내부 교체
                    if (el.getAttribute('data-type') !== (comp.type || 'bot_feature')) {
                        el.remove();
                        applyLayout([comp]); // 재귀적 생성
                        return;
                    }

                    // URL 갱신 확인
                    if (el.getAttribute('data-src') !== srcUrl) {
                        const inner = el.querySelector('img, iframe');
                        if (inner) inner.src = srcUrl;
                        el.setAttribute('data-src', srcUrl);
                    }
                }

                // 속성 업데이트
                el.style.left = comp.x + 'px';
                el.style.top = comp.y + 'px';
                el.style.width = comp.width + 'px';
                el.style.height = comp.height + 'px';
                el.style.zIndex = comp.zIndex;
                el.style.display = comp.visible ? 'block' : 'none';
                el.style.opacity = comp.opacity ?? 1;
            });
        }

        function applyBackground(bg) {
            const layer = document.getElementById('bg-layer');
            const video = document.getElementById('bg-video');
            const img = document.getElementById('bg-img');

            if (!bg || !bg.visible || !bg.url) {
                layer.style.opacity = 0;
                setTimeout(() => {
                    if (layer.style.opacity == 0) {
                        video.src = '';
                        img.src = '';
                        video.style.display = 'none';
                        img.style.display = 'none';
                    }
                }, 500);
                return;
            }

            layer.style.opacity = bg.opacity ?? 0.5;
            const isVideo = /\.(mp4|webm|ogg|mov)$/i.test(bg.url);

            if (isVideo) {
                if (video.src !== bg.url) {
                    video.src = bg.url;
                    video.style.display = 'block';
                    img.style.display = 'none';
                    img.src = '';
                }
            } else {
                if (img.src !== bg.url) {
                    img.src = bg.url;
                    img.style.display = 'block';
                    video.style.display = 'none';
                    video.src = '';
                }
            }
        }

        const urlParams = new URL(window.location.href).searchParams;
        const presetId = urlParams.get('presetId');

        async function fetchInitialLayout() {
            try {
                if (!chzzkUid && !presetId) {
                    console.error("No UID or PresetID found for overlay.");
                    return;
                }

                let url = '';
                if (presetId) {
                    url = `/api/OverlayPreset/public/${presetId}`; // 특정 프리셋 고정 모드
                } else {
                    url = `/api/OverlayPreset/active/${chzzkUid}`; // 서버 관리 유동 모드
                }
 
                console.log("Fetching layout from:", url);
                const res = await fetch(url);
                if (res.ok) {
                    const data = await res.json();
                    
                    if (data.configJson) {
                        try {
                            const config = JSON.parse(data.configJson);
                            applyLayout(config.components);
                            applyBackground(config.background);
                        } catch (e) {
                            console.error("Error parsing configJson from server", e);
                        }
                    }

                    console.log(`Layout received: ${components ? components.length : 0} components`);
                    if (components) applyLayout(components);
                    if (background) applyBackground(background);
                } else {
                    console.error("Failed to fetch layout:", res.status);
                }
            } catch (e) {
                console.error("초기 레이아웃 로드 실패", e);
            }
        }

        // SignalR 설정 및 연결
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/overlayHub")
            .withAutomaticReconnect()
            .build();

        // 관리자 대시보드에서 '저장 및 즉시 적용' 시 발생하는 이벤트 리스닝
        connection.on("ReceiveOverlayStyle", (jsonStyle) => {
            try {
                const data = JSON.parse(jsonStyle);
                console.log("마스터 오버레이 레이아웃 업데이트 수신:", data);
                if (data.components) {
                    applyLayout(data.components);
                }
                if (data.background) {
                    applyBackground(data.background);
                }
            } catch (e) {
                console.error("수신된 레이아웃 데이터 파싱 실패", e);
            }
        });

        connection.start().then(() => { 
            console.log("마스터 오버레이 SignalR 연결 성공");
            if (presetId) {
                connection.invoke("JoinPresetGroup", parseInt(presetId));
            } else {
                connection.invoke("JoinStreamerGroup", chzzkUid.toLowerCase()); 
            }
            fetchInitialLayout(); 
        }).catch(err => { 
            console.error("SignalR 연결 실패, 5초 후 재시도", err);
            setTimeout(fetchInitialLayout, 5000); 
        });
 
        connection.onreconnected(() => {
            console.log("SignalR 재연결 완료!");
            if (presetId) {
                connection.invoke("JoinPresetGroup", parseInt(presetId));
            } else {
                connection.invoke("JoinStreamerGroup", chzzkUid.toLowerCase());
            }
            fetchInitialLayout();
        });
    </script>
</body>
</html>
