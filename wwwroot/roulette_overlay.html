<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooldang Roulette Overlay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --accent-color: #ff3e3e;
            --bg-color: transparent;
            --slot-bg: rgba(20, 20, 20, 0.9);
            --gold-color: #ffd700;
            --item-h: 60px; /* v6 refinement: 높이 절반으로 축소 */
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-color);
            color: white;
        }

        #overlay-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* 최상단 배치 */
            align-items: center;
            position: relative;
            padding-top: 50px; /* 상단 여백 */
        }

        /* 슬롯 머신 컨테이너 */
        #slot-machine {
            width: 450px;
            height: var(--item-h);
            background: var(--slot-bg);
            border: 3px solid #444;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: none; 
            margin-bottom: 20px; /* 결과 바와의 간격 */
        }

        #slot-machine.active {
            display: flex;
            animation: slot-enter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        @keyframes slot-enter {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #slot-window {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 5; pointer-events: none;
        }

        .win-indicator {
            position: absolute; width: 100%; height: 3px;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            z-index: 10;
        }

        #slot-reel { width: 100%; will-change: transform; }

        .slot-item {
            height: var(--item-h);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: 800;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: -0.5px;
        }

        /* 결과 바 (v6: 슬롯 하단에 위치하며 아래로 확장) */
        #history-bar {
            width: 90%;
            max-height: 400px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            overflow-y: auto;
            /* 위쪽에서 아래쪽으로 서서히 나타나는 효과 */
            mask-image: linear-gradient(to bottom, black 90%, transparent);
        }

        #history-track {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; align-items: center; gap: 6px;
            animation: item-appear 0.3s ease-out forwards;
        }

        @keyframes item-appear {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .history-item .reward { font-weight: bold; }
        .history-item .count { color: var(--gold-color); font-weight: 800; }

    </style>
</head>

<body>
    <div id="overlay-container">
        <!-- 슬롯 머신 (최상단) -->
        <div id="slot-machine">
            <div class="win-indicator" style="top: 0;"></div>
            <div id="slot-window"></div>
            <div id="slot-reel"></div>
            <div class="win-indicator" style="bottom: 0;"></div>
        </div>

        <!-- 결과 목록 (슬롯 하단에 위치) -->
        <div id="history-bar">
            <div id="history-track"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script src="/js/overlay_utils.js"></script>
    <script>
        const queryParams = new URLSearchParams(window.location.search);
        const chzzkUid = queryParams.get('uid') || window.location.pathname.split('/').pop();
        const isFastMode = queryParams.get('skip') === 'true';

        const reels = document.getElementById('slot-reel');
        const machine = document.getElementById('slot-machine');
        const historyTrack = document.getElementById('history-track');
        const historyBar = document.getElementById('history-bar');

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/overlayHub")
            .withAutomaticReconnect()
            .build();

        let queue = [];
        let isRunning = false;
        const ITEM_HEIGHT = 60; // 120 -> 60 절반 축소

        connection.on("ReceiveRouletteResult", (data) => {
            data = createSafeData(data);
            if (!data || !data.Results) return;
            queue.push(data);
            processQueue();
        });

        async function processQueue() {
            if (isRunning || queue.length === 0) return;
            isRunning = true;
            const data = queue.shift();
            await runSlotAnimation(data);
            isRunning = false;
            processQueue();
        }

        async function runSlotAnimation(data) {
            const results = data.Results || data.results;
            const isMulti = results.length > 1;

            historyTrack.innerHTML = '';
            machine.classList.add('active');

            for (let i = 0; i < results.length; i++) {
                const result = results[i];
                const itemName = result.ItemName || result.itemName;
                const itemColor = result.Color || result.color || '#ffffff';

                const dummyCount = isFastMode ? 20 : (isMulti ? 30 : 50); 
                reels.innerHTML = '';
                reels.style.transition = 'none';
                reels.style.transform = 'translateY(0)';

                for (let d = 0; d < dummyCount; d++) {
                    const div = document.createElement('div');
                    div.className = 'slot-item';
                    div.innerText = "???"; 
                    reels.appendChild(div);
                }

                const winnerDiv = document.createElement('div');
                winnerDiv.className = 'slot-item';
                winnerDiv.innerText = itemName;
                winnerDiv.style.color = itemColor;
                reels.appendChild(winnerDiv);

                reels.offsetHeight;

                const duration = isFastMode ? 0.5 : (isMulti ? 0.8 : 3.0); 
                reels.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                reels.style.transform = `translateY(-${dummyCount * ITEM_HEIGHT}px)`;

                await new Promise(r => setTimeout(r, duration * 1000));

                updateRealtimeHistory(itemName, itemColor);
                
                const wait = isFastMode ? 200 : (isMulti ? 400 : 1000);
                await new Promise(r => setTimeout(r, wait));
            }

            machine.classList.remove('active');
            if (data.SpinId || data.spinId) notifyComplete(data.SpinId || data.spinId);
        }

        function updateRealtimeHistory(name, color) {
            const existing = Array.from(historyTrack.children).find(el => el.dataset.itemName === name);
            
            if (existing) {
                const countSpan = existing.querySelector('.count');
                const currentCount = parseInt(countSpan.innerText.replace('x', '')) || 1;
                countSpan.innerText = `x${currentCount + 1}`;
                existing.style.transform = 'scale(1.1)';
                setTimeout(() => existing.style.transform = 'scale(1)', 150);
            } else {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.dataset.itemName = name;
                div.innerHTML = `
                    <span class="reward" style="color: ${color}">[${name}]</span>
                    <span class="count">x1</span>
                `;
                historyTrack.appendChild(div);
            }
            
            // 실시간 스크롤 하단 유지
            historyBar.scrollTop = historyBar.scrollHeight;
        }

        async function notifyComplete(spinId) {
            try {
                await fetch('/api/admin/roulette/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ spinId })
                });
            } catch (e) { console.error(e); }
        }

        connection.start().then(() => {
            connection.invoke("JoinStreamerGroup", chzzkUid);
        }).catch(e => console.error(e));
    </script>
</body>
</html>
