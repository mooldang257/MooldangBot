<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooldang Roulette Overlay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --accent-color: #ff3e3e;
            --bg-color: transparent;
            --slot-bg: rgba(20, 20, 20, 0.9);
            --gold-color: #ffd700;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-color);
            color: white;
        }

        #overlay-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 슬롯 머신 컨테이너 */
        #slot-machine {
            width: 500px;
            height: 120px;
            background: var(--slot-bg);
            border: 4px solid #333;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
            display: none; /* 시작 전엔 숨김 */
        }

        #slot-machine.active {
            display: flex;
            animation: slot-enter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slot-enter {
            from { transform: scale(0.8) translateY(50px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        #slot-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        /* 당첨 라인 표시기 */
        .win-indicator {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            z-index: 10;
        }

        #slot-reel {
            width: 100%;
            will-change: transform;
        }

        .slot-item {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: -1px;
        }

        /* 하단 히스토리 바 (v6: 화면 너비 초과 시 행변환 지원) */
        #history-bar {
            position: absolute;
            bottom: 30px;
            width: 90%;
            min-height: 60px;
            max-height: 240px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 10px 20px;
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
        }

        #history-track {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            transition: all 0.5s ease;
            width: 100%;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-item .reward { font-weight: bold; }
        .history-item .count { color: var(--gold-color); font-weight: 800; font-size: 20px; }

    </style>
</head>

<body>
    <div id="overlay-container">
        <!-- 슬롯 머신 -->
        <div id="slot-machine">
            <div class="win-indicator" style="top: 0;"></div>
            <div id="slot-window"></div>
            <div id="slot-reel">
                <!-- 아이템들이 수직으로 나열됨 -->
            </div>
            <div class="win-indicator" style="bottom: 0;"></div>
        </div>

        <!-- 하단 히스토리 -->
        <div id="history-bar">
            <div id="history-track">
                <!-- 당첨 내역이 여기에 추가됨 -->
            </div>
        </div>
    </div>

    <!-- [JS] Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script src="/js/overlay_utils.js"></script>
    <script>
        const queryParams = new URLSearchParams(window.location.search);
        const chzzkUid = queryParams.get('uid') || window.location.pathname.split('/').pop();
        const isFastMode = queryParams.get('skip') === 'true';

        const reels = document.getElementById('slot-reel');
        const machine = document.getElementById('slot-machine');
        const historyTrack = document.getElementById('history-track');

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/overlayHub")
            .withAutomaticReconnect()
            .build();

        let queue = [];
        let isRunning = false;
        let lastTimestamp = 0;
        const ITEM_HEIGHT = 120;

        connection.on("ReceiveRouletteResult", (data) => {
            data = createSafeData(data);
            if (!data || !data.Results) return;
            queue.push(data);
            processQueue();
        });

        async function processQueue() {
            if (isRunning || queue.length === 0) return;
            isRunning = true;
            const data = queue.shift();
            await runSlotAnimation(data);
            isRunning = false;
            processQueue();
        }

        async function runSlotAnimation(data) {
            const results = data.Results || data.results;
            const isMulti = results.length > 1;

            // [v6 규칙] 새로운 룰렛 시작 시 히스토리 초기화
            historyTrack.innerHTML = '';
            machine.classList.add('active');

            for (let i = 0; i < results.length; i++) {
                const result = results[i];
                const itemName = result.ItemName || result.itemName;
                const itemColor = result.Color || result.color || '#ffffff';

                // 1. 슬롯 데이터 채우기
                const dummyCount = isFastMode ? 20 : (isMulti ? 30 : 50); 
                reels.innerHTML = '';
                reels.style.transition = 'none';
                reels.style.transform = 'translateY(0)';

                for (let d = 0; d < dummyCount; d++) {
                    const div = document.createElement('div');
                    div.className = 'slot-item';
                    div.innerText = "???"; 
                    reels.appendChild(div);
                }

                const winnerDiv = document.createElement('div');
                winnerDiv.className = 'slot-item';
                winnerDiv.innerText = itemName;
                winnerDiv.style.color = itemColor;
                reels.appendChild(winnerDiv);

                reels.offsetHeight;

                // 2. 애니메이션 실행
                const duration = isFastMode ? 0.6 : (isMulti ? 1.0 : 3.5); 
                reels.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                reels.style.transform = `translateY(-${dummyCount * ITEM_HEIGHT}px)`;

                await new Promise(r => setTimeout(r, duration * 1000));

                // 3. [v6 Refinement] 결과 연출 (실시간 히스토리 누적)
                updateRealtimeHistory(itemName, itemColor);
                
                const wait = isFastMode ? 300 : (isMulti ? 600 : 1500);
                await new Promise(r => setTimeout(r, wait));
            }

            machine.classList.remove('active');
            if (data.SpinId || data.spinId) notifyComplete(data.SpinId || data.spinId);
        }

        function updateRealtimeHistory(name, color) {
            // 해당 이름의 아이템이 이미 있는지 확인 (Dataset 사용)
            const existing = Array.from(historyTrack.children).find(el => el.dataset.itemName === name);
            
            if (existing) {
                const countSpan = existing.querySelector('.count');
                const currentCount = parseInt(countSpan.innerText.replace('x', '')) || 1;
                countSpan.innerText = `x${currentCount + 1}`;
                
                // 시각적 피드백
                existing.style.transform = 'scale(1.1)';
                setTimeout(() => existing.style.transform = 'scale(1)', 200);
            } else {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.dataset.itemName = name;
                div.innerHTML = `
                    <span class="reward" style="color: ${color}">[${name}]</span>
                    <span class="count">x1</span>
                `;
                historyTrack.appendChild(div);
                
                // 애니메이션 효과
                div.style.opacity = '0';
                div.style.transform = 'translateY(10px)';
                requestAnimationFrame(() => {
                    div.style.transition = 'all 0.3s ease';
                    div.style.opacity = '1';
                    div.style.transform = 'translateY(0)';
                });
            }
            
            // 자동 스크롤 하단 유지
            const bar = document.getElementById('history-bar');
            bar.scrollTop = bar.scrollHeight;
        }

        async function notifyComplete(spinId) {
            try {
                await fetch('/api/admin/roulette/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ spinId })
                });
            } catch (e) { console.error(e); }
        }

        connection.start().then(() => {
            connection.invoke("JoinStreamerGroup", chzzkUid);
        }).catch(e => console.error(e));
    </script>
</body>
</html>
