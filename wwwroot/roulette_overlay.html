<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>룰렛 오버레이 (V5 Premium)</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary-bg: rgba(15, 15, 15, 0.85);
            --accent-color: #ff0055;
            --gold-color: #ffd700;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --border-radius: 20px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: 'Pretendard', sans-serif;
            color: white;
            user-select: none;
        }

        #overlay-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 슬롯 머신 컨테이너 */
        #slot-machine {
            position: relative;
            width: 500px;
            height: 120px;
            background: var(--primary-bg);
            border: 4px solid #333;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(255, 255, 255, 0.1);
            display: none;
            backdrop-filter: blur(10px);
        }

        #slot-machine.active {
            display: flex;
            animation: slot-enter 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slot-enter {
            from { transform: scale(0.8) translateY(50px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        #slot-window {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        /* 당첨 라인 표시기 */
        .win-indicator {
            position: absolute;
            width: 100%;
            height: 4px;
            background: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            z-index: 10;
        }

        #slot-reel {
            width: 100%;
            will-change: transform;
        }

        .slot-item {
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: 800;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: -1px;
        }

        /* 하단 히스토리 바 */
        #history-bar {
            position: absolute;
            bottom: 30px;
            width: 90%;
            height: 60px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 0 20px;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 5%, black 95%, transparent);
        }

        #history-track {
            display: flex;
            gap: 15px;
            white-space: nowrap;
            transition: transform 0.5s ease;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--glass-bg);
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 14px;
            animation: history-enter 0.5s ease backwards;
        }

        @keyframes history-enter {
            from { transform: translateX(30px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .history-item .viewer { color: #aaa; font-size: 12px; }
        .history-item .reward { font-weight: bold; }

        /* 결과 알림 팝업 */
        #result-toast {
            position: absolute;
            top: 20%;
            padding: 20px 40px;
            background: linear-gradient(135deg, #1a1a1a, #333);
            border: 2px solid var(--gold-color);
            border-radius: 50px;
            font-size: 24px;
            font-weight: bold;
            color: var(--gold-color);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            transform: translateY(-50px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 20;
        }

        #result-toast.active {
            transform: translateY(0);
            opacity: 1;
        }

        .mission-badge {
            background: var(--accent-color);
            color: white;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div id="overlay-container">
        <!-- 결과 팝업 -->
        <div id="result-toast">
            🎊 당첨! <span id="toast-item-name">아이템명</span> 🎊
        </div>

        <!-- 슬롯 머신 -->
        <div id="slot-machine">
            <div class="win-indicator" style="top: 0;"></div>
            <div id="slot-window"></div>
            <div id="slot-reel">
                <!-- 아이템들이 수직으로 나열됨 -->
            </div>
            <div class="win-indicator" style="bottom: 0;"></div>
        </div>

        <!-- 하단 히스토리 -->
        <div id="history-bar">
            <div id="history-track">
                <!-- 히스토리 아이템들이 추가됨 -->
            </div>
        </div>
    </div>

    <!-- [JS] Logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script src="/js/overlay_utils.js"></script>
    <script>
        const queryParams = new URLSearchParams(window.location.search);
        const chzzkUid = queryParams.get('uid') || window.location.pathname.split('/').pop();
        const isFastMode = queryParams.get('skip') === 'true';

        const reels = document.getElementById('slot-reel');
        const machine = document.getElementById('slot-machine');
        const toast = document.getElementById('result-toast');
        const historyTrack = document.getElementById('history-track');

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/overlayHub")
            .withAutomaticReconnect()
            .build();

        let queue = [];
        let isRunning = false;
        let lastTimestamp = 0;
        const ITEM_HEIGHT = 120;

        connection.on("ReceiveRouletteResult", (data) => {
            data = createSafeData(data);
            if (!data || !data.Results) return;
            queue.push(data);
            processQueue();
        });

        async function processQueue() {
            if (isRunning || queue.length === 0) return;
            isRunning = true;
            const data = queue.shift();
            await runSlotAnimation(data);
            isRunning = false;
            processQueue();
        }

        async function runSlotAnimation(data) {
            const results = data.Results;
            const isMulti = results.length > 1;

            machine.classList.add('active');

            for (let i = 0; i < results.length; i++) {
                const result = results[i];
                const itemName = result.ItemName || result.itemName;
                const itemColor = result.Color || result.color || '#ffffff';

                // 1. 슬롯 데이터 채우기 (랜덤하게 섞인 느낌 연출)
                const dummyCount = isFastMode ? 20 : 50;
                reels.innerHTML = '';
                reels.style.transition = 'none';
                reels.style.transform = 'translateY(0)';

                // 시각적 연출을 위한 더미 데이터들
                for (let d = 0; d < dummyCount; d++) {
                    const div = document.createElement('div');
                    div.className = 'slot-item';
                    div.innerText = "???"; // 나중에 랜덤명 추출 가능
                    reels.appendChild(div);
                }

                // 마지막 당첨 항목 배치
                const winnerDiv = document.createElement('div');
                winnerDiv.className = 'slot-item';
                winnerDiv.innerText = itemName;
                winnerDiv.style.color = itemColor;
                reels.appendChild(winnerDiv);

                // 리렌더링 강제
                reels.offsetHeight;

                // 2. 애니메이션 실행
                const duration = isFastMode ? 0.8 : 3.5;
                reels.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                reels.style.transform = `translateY(-${dummyCount * ITEM_HEIGHT}px)`;

                await new Promise(r => {
                    let done = false;
                    const check = (time) => {
                        // rAF 타이밍 체크: 탭 비활성화 방어
                        if (lastTimestamp > 0 && time - lastTimestamp > 1000) {
                            console.warn("[rAF] Tab lag detected, skipping...");
                        }
                        lastTimestamp = time;
                        if (!done) requestAnimationFrame(check);
                    };
                    requestAnimationFrame(check);
                    setTimeout(() => { done = true; r(); }, duration * 1000);
                });

                // 3. 결과 연출 (토스트 및 히스토리)
                showResultToast(itemName, itemColor);
                addToHistory(result.ViewerNickname || data.ViewerNickname, itemName, itemColor);

                const wait = isFastMode ? 500 : 2000;
                await new Promise(r => setTimeout(r, wait));
                toast.classList.remove('active');
            }

            machine.classList.remove('active');
            if (data.SpinId) notifyComplete(data.SpinId);
        }

        function showResultToast(name, color) {
            const nameEl = document.getElementById('toast-item-name');
            nameEl.innerText = name;
            nameEl.style.color = color;
            toast.classList.add('active');
        }

        function addToHistory(viewer, item, color) {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span class="viewer">${viewer || 'Anonymous'}</span>
                <span class="reward" style="color: ${color}">${item}</span>
            `;
            historyTrack.prepend(div);

            // 히스토리 개수 제한
            if (historyTrack.children.length > 20) {
                historyTrack.removeChild(historyTrack.lastChild);
            }
        }

        async function notifyComplete(spinId) {
            try {
                await fetch('/api/admin/roulette/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ spinId })
                });
            } catch (e) { console.error(e); }
        }

        connection.start().then(() => {
            connection.invoke("JoinStreamerGroup", chzzkUid);
        }).catch(e => console.error(e));
    </script>
</body>

</html>
