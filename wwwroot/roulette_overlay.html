<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>룰렛 오버레이</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent;
            font-family: 'Pretendard', sans-serif;
            color: white;
        }

        #overlay-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            perspective: 1000px;
        }

        /* 원형 룰렛 디자인 */
        #roulette-wrapper {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            border: 10px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            overflow: hidden;
            display: none; /* 평소엔 숨김 */
            background: #222;
        }

        #roulette-wheel {
            position: absolute;
            width: 100%;
            height: 100%;
            transition: transform 5s cubic-bezier(0.1, 0.7, 0.1, 1);
        }

        .segment {
            position: absolute;
            width: 50%;
            height: 50%;
            left: 50%;
            top: 50%;
            transform-origin: 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding-left: 50px;
            box-sizing: border-box;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            font-size: 16px;
            clip-path: polygon(0 0, 100% 0, 100% 100%);
        }

        .pointer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 40px solid #ff0055;
            z-index: 10;
            filter: drop-shadow(0 0 5px gold);
        }

        /* 결과 연출 */
        #result-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.9);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid gold;
            text-align: center;
            z-index: 100;
            transition: transform 0.5s ease;
            min-width: 300px;
        }

        #result-popup.active {
            transform: translate(-50%, -50%) scale(1);
        }

        .win-title {
            font-size: 24px;
            color: gold;
            margin-bottom: 20px;
        }

        .win-item {
            font-size: 40px;
            font-weight: 800;
            margin: 10px 0;
        }

        /* 10연차 결과 그리드 */
        #multi-results {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .multi-item {
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 폭죽 보조 효과 */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f00;
        }
    </style>
</head>
<body>
    <div id="overlay-container">
        <div id="roulette-wrapper">
            <div class="pointer"></div>
            <div id="roulette-wheel"></div>
        </div>

        <div id="result-popup">
            <div class="win-title">🎊 REWARD 🎊</div>
            <div id="single-result-name" class="win-item">아이템명</div>
            <div id="multi-results"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script>
        const pathParts = window.location.pathname.split('/');
        const queryParams = new URLSearchParams(window.location.search);
        const chzzkUid = queryParams.get('uid') || pathParts[pathParts.length - 1];

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/overlayHub")
            .withAutomaticReconnect()
            .build();

        let rouletteQueue = [];
        let isSpinning = false;

        connection.on("RouletteTriggered", (data) => {
            console.log("룰렛 발생, 대기열 추가:", data);
            rouletteQueue.push(data);
            processQueue();
        });

        async function processQueue() {
            if (isSpinning || rouletteQueue.length === 0) return;
            
            isSpinning = true;
            const data = rouletteQueue.shift();
            await startRouletteAnimation(data);
            isSpinning = false;
            
            // 다음 항목이 있으면 계속 이어서 실행
            processQueue();
        }

        connection.onreconnected(() => {
            console.log("재연결 성공. 그룹 재가입 시도...");
            connection.invoke("JoinStreamerGroup", chzzkUid);
        });

        connection.start().then(() => {
            console.log("오버레이 연결됨:", chzzkUid);
            connection.invoke("JoinStreamerGroup", chzzkUid);
        }).catch(err => {
            console.error("연결 실패:", err);
            setTimeout(() => location.reload(), 5000);
        });

        async function startRouletteAnimation(data) {
            if (!data.results || data.results.length === 0) return;

            const isMulti = data.results.length > 1;
            const wrapper = document.getElementById('roulette-wrapper');
            const wheel = document.getElementById('roulette-wheel');
            const popup = document.getElementById('result-popup');
            const multiContainer = document.getElementById('multi-results');
            const singleName = document.getElementById('single-result-name');
            
            wrapper.style.display = 'block';
            multiContainer.innerHTML = '';
            
            for (let i = 0; i < data.results.length; i++) {
                const currentResult = data.results[i];

                // 1. 매 회차 초기화
                wheel.style.transition = 'none';
                wheel.style.transform = 'rotate(0deg)';
                popup.classList.remove('active');
                
                // 룰렛판 아이템 채우기 (샘플링 연출)
                wheel.innerHTML = '';
                const segments = 12; // 고정된 칸 수로 연출
                for(let j=0; j<segments; j++){
                    const seg = document.createElement('div');
                    seg.className = 'segment';
                    const angle = (360 / segments);
                    seg.style.transform = `rotate(${j * angle}deg) skewY(${90 - angle}deg)`;
                    seg.style.backgroundColor = (j % 2 === 0) ? '#333' : '#444';
                    wheel.appendChild(seg);
                }

                // 2. 애니메이션 대기 및 실행
                await new Promise(r => setTimeout(r, 50)); // 브라우저 배칭 방지
                
                const spinRounds = 10;
                const extraAngle = Math.random() * 360;
                const spinDuration = isMulti ? 1 : 2; // 회전 시간 단축
                
                wheel.style.transition = `transform ${spinDuration}s cubic-bezier(0.1, 0.7, 0.1, 1)`;
                wheel.style.transform = `rotate(${spinRounds * 360 + extraAngle}deg)`;

                // 룰렛이 회전하는 동안 기다림
                await new Promise(r => setTimeout(r, spinDuration * 1000 + 100));

                // 3. 종료 및 결과 팝업 업데이트
                singleName.innerText = currentResult.itemName;
                singleName.style.color = currentResult.color;
                
                if (isMulti) {
                    const div = document.createElement('div');
                    div.className = 'multi-item';
                    div.style.borderColor = currentResult.color;
                    div.innerText = currentResult.itemName;
                    multiContainer.appendChild(div);
                }
                
                popup.classList.add('active');

                // 결과 표시 대기 시간 (3초에서 추가 단축)
                const waitDuration = isMulti ? 1000 : 2000;
                await new Promise(r => setTimeout(r, waitDuration));
                
                // 다음 돌아갈 순서가 남아있으면 화면 정리만 하고 약간 대기
                if (i < data.results.length - 1) {
                    popup.classList.remove('active');
                    await new Promise(r => setTimeout(r, 100));
                }
            }
            
            // 모든 연차 애니메이션 완전 종료
            popup.classList.remove('active');
            wrapper.style.display = 'none';
        }
    </script>
</body>
</html>
