<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>팬 캐릭터(아바타) 오버레이</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            /* 투명 배경 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100vw;
            height: 100vh;
        }

        #avatar-layer {
            position: absolute;
            bottom: 0px;
            left: 0;
            width: 100%;
            height: 150px;
            /* 캐릭터들이 활동할 영역 (화면 하단) */
            pointer-events: none;
            /* 드래그를 위해 자식요소에만 pointer-events 설정 */
        }

        .avatar-container {
            position: absolute;
            bottom: 0px;
            pointer-events: auto;
            /* 스트리머 마우스 상호작용 용 */
            cursor: grab;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: left 0.1s linear, top 0.1s linear;
        }

        .avatar-container:active {
            cursor: grabbing;
        }

        .avatar-img {
            width: auto;
            height: 80px;
            object-fit: contain;
            filter: drop-shadow(2px 4px 6px rgba(0, 0, 0, 0.5));
            transform-origin: center bottom;
        }

        /* 채팅 말풍선 */
        .chat-bubble {
            background-color: white;
            color: #333;
            padding: 6px 10px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            margin-bottom: 5px;
            max-width: 200px;
            text-align: center;
            opacity: 0;
            /* 기본적으로 안 보임 */
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            position: relative;
            word-break: break-all;
        }

        /* 말풍선 꼬리 */
        .chat-bubble::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 5px 5px 0;
            border-style: solid;
            border-color: white transparent transparent transparent;
        }

        .nickname {
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 2px;
            text-shadow: 1px 1px 2px black;
        }

        /* 애니메이션 효과 */
        .anim-walking {
            animation: walking 0.6s alternate infinite ease-in-out;
        }

        .anim-running {
            animation: walking 0.15s alternate infinite linear;
        }

        /* .anim-flying {
            animation: flying 3s ease-in-out;
        }
         */
        /* ⭐ [CSS 변수 활용] 애니메이션과 가로 반전이 충돌하지 않도록 처리 */
        .avatar-img {
            --flip: 1;
            transform: scaleX(var(--flip));
            transition: transform 0.2s;
            /* 부드러운 방향 전환 */
        }

        .flip-h {
            --flip: -1;
        }

        @keyframes walking {
            0% {
                transform: scaleX(var(--flip)) translateY(0);
            }

            100% {
                transform: scaleX(var(--flip)) translateY(-8px);
            }
        }

        /* @keyframes flying {
            0% { transform: translate(0, 0) scaleX(var(--flip)); }
            50% { transform: translate(calc(var(--fly-x) * 0.5), -600px) scaleX(var(--flip)); }
            100% { transform: translate(var(--fly-x), 0) scaleX(var(--flip)); }
        } */
    </style>
</head>

<body>

    <div id="avatar-layer">
        <!-- 동적으로 추가되는 아바타 컨테이너들이 들어옴 -->
    </div>

    <script>
        // URL에서 chzzkUid 가져오기
        const pathParts = window.location.pathname.split('/');
        let chzzkUid = pathParts[pathParts.length - 1];
        if (!chzzkUid || chzzkUid.includes(".html")) {
            const urlParams = new URLSearchParams(window.location.search);
            chzzkUid = urlParams.get('uid') || "TEST_UID";
        }

        let settings = {
            isEnabled: true, showNickname: true, showChat: true,
            disappearTimeSeconds: 60,
            walkingImageUrl: null, stopImageUrl: null, interactionImageUrl: null
        };

        const avatars = {}; // { senderId: { element, pos, dir, pinned, speed, state, chatTimer, destroyTimer } }
        const MAX_WIDTH = window.innerWidth;
        const DEFAULT_Y = 0; // bottom 0

        async function initSettings() {
            try {
                const res = await fetch(`/api/avatar/settings/${chzzkUid}`);
                if (res.ok) {
                    const fetched = await res.json();
                    settings = {
                        isEnabled: fetched.isEnabled ?? fetched.IsEnabled ?? true,
                        showNickname: fetched.showNickname ?? fetched.ShowNickname ?? true,
                        showChat: fetched.showChat ?? fetched.ShowChat ?? true,
                        disappearTimeSeconds: fetched.disappearTimeSeconds ?? fetched.DisappearTimeSeconds ?? 60,
                        walkingImageUrl: fetched.walkingImageUrl ?? fetched.WalkingImageUrl ?? null,
                        stopImageUrl: fetched.stopImageUrl ?? fetched.StopImageUrl ?? null,
                        interactionImageUrl: fetched.interactionImageUrl ?? fetched.InteractionImageUrl ?? null
                    };
                    console.log("Settings loaded and normalized:", settings);
                }
            } catch (e) { console.error("Setting load failed", e); }
        }

        function getAvatarImg(state) {
            const fallback = '/images/man.png';
            if (state === 'flying' || state === 'interaction') return settings.interactionImageUrl || settings.walkingImageUrl || fallback;
            if (state === 'stop' || state === 'idle') return settings.stopImageUrl || settings.walkingImageUrl || fallback;
            return settings.walkingImageUrl || fallback;
        }

        function createAvatar(senderId, nickname, userRole) {
            const layer = document.getElementById('avatar-layer');
            const container = document.createElement('div');
            container.className = 'avatar-container';
            container.id = 'ava_' + senderId;

            const startX = Math.random() * (MAX_WIDTH - 100);
            container.style.left = startX + 'px';
            container.style.bottom = DEFAULT_Y + 'px';

            const chatNode = document.createElement('div');
            chatNode.className = 'chat-bubble';
            chatNode.innerText = '';
            chatNode.style.display = settings.showChat ? 'block' : 'none';

            const nickNode = document.createElement('div');
            nickNode.className = 'nickname';
            nickNode.innerText = nickname;
            nickNode.style.display = settings.showNickname ? 'block' : 'none';

            const imgNode = document.createElement('img');
            imgNode.className = 'avatar-img anim-walking';
            imgNode.src = getAvatarImg('walking');

            container.appendChild(chatNode);
            container.appendChild(nickNode);
            container.appendChild(imgNode);
            layer.appendChild(container);

            avatars[senderId] = {
                el: container,
                imgEl: imgNode,
                chatEl: chatNode,
                x: startX,
                y: DEFAULT_Y,
                dirX: (Math.random() > 0.5 ? 1 : -1),
                speed: (1 + Math.random()) * 0.6, // 기존 1~2px의 60% -> 0.6~1.2px
                pinned: false,
                state: 'walking',
                chatTimer: null,
                destroyTimer: null,
                nextThinkTime: Date.now() + 3000 // 3초 뒤에 다음 행동 결정
            };

            makeDraggable(container, senderId);
        }

        function resetDestroyTimer(senderId) {
            const av = avatars[senderId];
            if (!av) return;
            if (settings.disappearTimeSeconds > 0) {
                if (av.destroyTimer) clearTimeout(av.destroyTimer);
                av.destroyTimer = setTimeout(() => {
                    av.el.remove();
                    delete avatars[senderId];
                }, settings.disappearTimeSeconds * 1000);
            }
        }

        function showChatBubble(senderId, message, emojis) {
            const av = avatars[senderId];
            if (!av) return;

            let safeMsg = document.createElement('div');
            safeMsg.innerText = message;
            let htmlMsg = safeMsg.innerHTML;

            if (emojis && Object.keys(emojis).length > 0) {
                for (const key in emojis) {
                    let targetKey = key;
                    if (!targetKey.startsWith('{:')) targetKey = '{:' + targetKey + ':}';
                    const imgTag = `<img src="${emojis[key]}" style="height:28px; vertical-align:middle; margin:0 2px;" />`;
                    htmlMsg = htmlMsg.split(targetKey).join(imgTag);
                }
            }

            av.chatEl.innerHTML = htmlMsg;
            av.chatEl.style.opacity = '1';
            av.chatEl.style.transform = 'translateY(0)';

            if (av.chatTimer) clearTimeout(av.chatTimer);
            av.chatTimer = setTimeout(() => {
                av.chatEl.style.opacity = '0';
                av.chatEl.style.transform = 'translateY(10px)';
            }, 5000);
        }

        function makeDraggable(el, id) {
            let isDown = false;
            let offset = [0, 0];

            el.addEventListener('mousedown', function (e) {
                isDown = true;
                offset = [el.offsetLeft - e.clientX, el.offsetTop - e.clientY];
                avatars[id].pinned = true;
                el.style.bottom = 'auto';
            }, true);

            el.addEventListener('dblclick', function (e) {
                avatars[id].pinned = false;
                el.style.bottom = '0px';
                el.style.top = 'auto';
                avatars[id].y = 0;
            });

            document.addEventListener('mouseup', function () { isDown = false; }, true);
            document.addEventListener('mousemove', function (e) {
                if (isDown) {
                    const newLeft = e.clientX + offset[0];
                    const newTop = e.clientY + offset[1];
                    el.style.left = newLeft + 'px';
                    el.style.top = newTop + 'px';
                    avatars[id].x = newLeft;
                    // top 좌표를 bottom(0) 기준으로 역산하진 않음 (드래그 중엔 y 갱신 생략하거나 pinned 상태 활용)
                }
            }, true);
        }

        function gameLoop() {
            const now = Date.now();

            for (let id in avatars) {
                const av = avatars[id];
                if (av.pinned) continue;

                // 3초마다 모션 변경 로직 (독립 시행 확률)
                if (now > av.nextThinkTime && av.state !== 'run' && av.state !== 'flying') {
                    const rnd = Math.random();
                    if (rnd < 0.5) { // 50% 확률 정지
                        av.state = 'stop';
                        av.imgEl.src = getAvatarImg('stop');
                        av.imgEl.classList.remove('anim-walking');
                    } else if (rnd < 0.8) { // 30% 확률 걷기
                        av.state = 'walking';
                        av.imgEl.src = getAvatarImg('walking');
                        av.imgEl.classList.add('anim-walking');
                    } else { // 20% 확률 방향전환 후 걷기
                        av.state = 'walking';
                        av.dirX *= -1;
                        av.imgEl.src = getAvatarImg('walking');
                        av.imgEl.classList.add('anim-walking');
                    }
                    av.nextThinkTime = now + 3000;
                }

                if (av.state === 'walking' || av.state === 'run') {
                    av.x += av.dirX * av.speed;
                    if (av.x < 0) { av.x = 0; av.dirX = 1; }
                    if (av.x > MAX_WIDTH - 80) { av.x = MAX_WIDTH - 80; av.dirX = -1; }

                    av.el.style.left = av.x + 'px';

                    // 방향 처리: 왼쪽 기본(1), 오른쪽 반전(-1)
                    if (av.dirX > 0) av.imgEl.classList.add('flip-h'); // 오른쪽 바라보기 (반전)
                    else av.imgEl.classList.remove('flip-h'); // 왼쪽 바라보기 (기본)
                }
            }
            requestAnimationFrame(gameLoop);
        }

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/overlayHub")
            .withAutomaticReconnect()
            .build();

        connection.on("ReceiveChat", (jsonRaw) => {
            if (!settings.isEnabled) return;
            const data = JSON.parse(jsonRaw);
            if (!avatars[data.senderId]) {
                createAvatar(data.senderId, data.nickname, data.userRole);
            }
            resetDestroyTimer(data.senderId);
            if (settings.showChat) showChatBubble(data.senderId, data.message, data.emojis);
        });

        connection.on("ReceiveAvatarCommand", (jsonRaw) => {
            if (!settings.isEnabled) return;
            const data = JSON.parse(jsonRaw);
            if (!avatars[data.senderId]) createAvatar(data.senderId, data.nickname, data.userRole);
            resetDestroyTimer(data.senderId);

            const av = avatars[data.senderId];
            if (data.command === 'run') {
                av.state = 'run';
                av.speed = 3; // 5 * 0.6 = 3
                av.imgEl.src = getAvatarImg('walking');
                av.imgEl.className = 'avatar-img anim-running';
                setTimeout(() => {
                    if (av.state === 'run') {
                        av.state = 'walking';
                        av.speed = (1 + Math.random()) * 0.6;
                        av.imgEl.className = 'avatar-img anim-walking';
                    }
                }, 5000);
            }
            // else if (data.command === 'fly') {
            //     av.state = 'flying';
            //     av.pinned = true; 
            //     av.imgEl.src = getAvatarImg('interaction');
            //     av.imgEl.className = 'avatar-img anim-flying';

            //     // 방향 유지 및 처리
            //     if(av.dirX > 0) av.imgEl.classList.add('flip-h');
            //     else av.imgEl.classList.remove('flip-h');

            //     setTimeout(() => {
            //         // 비행 종료 후 위치 유지
            //         av.x += (av.dirX * 300); 
            //         av.x = Math.max(0, Math.min(MAX_WIDTH - 80, av.x));
            //         av.el.style.left = av.x + 'px';

            //         // 공중에 뜬 상태 유지 (bottom을 top으로 변환된 값 그대로 두거나, 
            //         // 요구사항이 "위치정보 기억"이므로 DEFAULT_Y로 돌아가지 않음을 의미함)
            //         // 단, 드래그와 호환을 위해 pinned 해제 시 bottom:0으로 돌아가는 기존 로직 수정 필요
            //         av.imgEl.src = getAvatarImg('walking');
            //         av.imgEl.className = 'avatar-img anim-walking';
            //         av.pinned = false; // 자동 이동 재개 (좌우)
            //         av.state = 'walking';
            //     }, 3000);
            // }
        });

        connection.start().then(() => {
            connection.invoke("JoinStreamerGroup", chzzkUid);
        });

        connection.onreconnected((connectionId) => {
            console.log("SignalR 재연결 완료! 방명록에 다시 가입합니다.");
            connection.invoke("JoinStreamerGroup", chzzkUid);
        });

        initSettings().then(() => {
            requestAnimationFrame(gameLoop);
        });

    </script>
</body>

</html>
