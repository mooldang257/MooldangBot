# [MooldangBot]: Infrastructure Layer
# DB, Redis, RabbitMQ, Traefik, Monitoring

services:
  db:
    image: mariadb:11.8
    container_name: mooldang-prod-db
    command:
      - --local-infile=1
      - --innodb-flush-method=O_DIRECT
      - --max-connections=4096
      - --innodb-buffer-pool-size=16G
      - --innodb-log-file-size=2G
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-autoinc-lock-mode=2
      - --bulk_insert_buffer_size=268435456
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/mysql
    networks:
      - mooldang_prod_net
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: mooldang-prod-redis
    restart: always
    networks:
      - mooldang_prod_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mooldang-prod-rabbitmq
    restart: always
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - mooldang_prod_net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  grafana:
    image: grafana/grafana-oss:latest
    container_name: mooldang-prod-grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${BASE_DOMAIN}/admin/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`bot.mooldang.com`) && PathPrefix(`/admin/monitoring`)"
      - "traefik.http.routers.grafana.entrypoints=web"
      - "traefik.http.routers.grafana.middlewares=monitoring-strip@file,traefik-auth@file,cloudflare-real-ip@file"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
      - "traefik.env=prod"
    networks:
      - mooldang_prod_net
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  loki:
    image: grafana/loki:latest
    container_name: mooldang-prod-loki
    restart: always
    networks:
      - mooldang_prod_net
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: mooldang-prod-prometheus
    restart: always
    networks:
      - mooldang_prod_net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  adminer:
    image: adminer:latest
    container_name: mooldang-prod-adminer
    restart: always
    environment:
      - ADMINER_DEFAULT_SERVER=db
    networks:
      - mooldang_prod_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mooldang_prod_net:
    external: true

volumes:
  grafana-data:
  prometheus-data:
