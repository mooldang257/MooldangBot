# [MooldangBot]: UI Layer
# Studio, Overlay, Admin

services:
  studio:
    image: mooldang-studio:${VERSION_UI:-latest}
    container_name: mooldang-prod-studio
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
      - INTERNAL_API_URL=http://app:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studio.rule=Host(`bot.mooldang.com`) && PathPrefix(`/`)"
      - "traefik.http.routers.studio.entrypoints=web"
      - "traefik.http.services.studio.loadbalancer.server.port=3000"
      - "traefik.http.routers.studio.middlewares=cloudflare-real-ip@file"
      - "traefik.env=prod"
    networks:
      - mooldang_prod_net
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  overlay:
    image: mooldang-overlay:${VERSION_UI:-latest}
    container_name: mooldang-prod-overlay
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.overlay.rule=Host(`bot.mooldang.com`) && PathPrefix(`/overlay`)"
      - "traefik.http.routers.overlay.entrypoints=web"
      - "traefik.http.services.overlay.loadbalancer.server.port=80"
      - "traefik.http.routers.overlay.middlewares=cloudflare-real-ip@file"
      - "traefik.env=prod"
    networks:
      - mooldang_prod_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    image: mooldang-admin:${VERSION_UI:-latest}
    container_name: mooldang-prod-admin
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=Host(`bot.mooldang.com`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.routers.admin.middlewares=admin-strip@file,traefik-auth@file,cloudflare-real-ip@file"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
      - "traefik.env=prod"
    networks:
      - mooldang_prod_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mooldang_prod_net:
    external: true
