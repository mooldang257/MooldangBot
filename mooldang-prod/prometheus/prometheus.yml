global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692'] # RabbitMQ Prometheus Plugin default port

  - job_name: 'mooldang-api'
    metrics_path: '/health' # Using health check as metrics if configured
    static_configs:
      - targets: ['app:8080']

  - job_name: 'chzzk-bot'
    static_configs:
      - targets: ['chzzk-bot:8080']
