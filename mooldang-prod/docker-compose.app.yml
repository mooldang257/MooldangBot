# [MooldangBot]: Application Layer
# App, Chzzk-Bot, UI, Migration

services:
  migration:
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-prod-migration
    restart: "no"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    entrypoint: [ "dotnet", "cli/MooldangBot.Cli.dll" ]
    command: [ "migrate" ]
    networks:
      - mooldang_prod_net
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  app:
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-prod-app
    restart: always
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`bot.mooldang.com`) && (PathPrefix(`/api`) || PathPrefix(`/overlayHub`) || PathPrefix(`/swagger`))"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
      - "traefik.http.services.app.loadbalancer.sticky.cookie=true"
      - "traefik.http.middlewares.app-upgrade.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.app.middlewares=app-upgrade,cloudflare-real-ip@file"
      - "traefik.env=prod"
    networks:
      - mooldang_prod_net
    depends_on:
      migration:
        condition: service_completed_successfully
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${COMMON_SONG_DATA_PATH}:/app/wwwroot/uploads/library/songs
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  chzzk-bot:
    image: mooldang-chzzk-bot:${VERSION_APP:-latest}
    container_name: mooldang-prod-chzzk-bot
    restart: always
    env_file:
      - .env
    environment:
      - DOTNET_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LOKI_URL=http://loki:3100
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
    networks:
      - mooldang_prod_net
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

networks:
  mooldang_prod_net:
    external: true
