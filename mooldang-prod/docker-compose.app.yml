# [MooldangBot]: Application Layer
# App, Chzzk-Bot, UI, Migration

services:
  migration:
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-prod-migration
    restart: "no"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    entrypoint: [ "dotnet", "cli/MooldangBot.Cli.dll" ]
    networks:
      - mooldang_prod_net
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  app:
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-prod-app
    restart: always
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=(Host(`bot.mooldang.store`) || Host(`www.mooldang.store`)) && (PathPrefix(`/api`) || PathPrefix(`/Auth/callback`) || PathPrefix(`/overlayHub`) || PathPrefix(`/swagger`))"
      - "traefik.http.routers.app.entrypoints=web"
      - "traefik.http.services.app.loadbalancer.server.port=8080"
      - "traefik.http.services.app.loadbalancer.sticky.cookie=true"
      - "traefik.http.middlewares.app-upgrade.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.app.middlewares=app-upgrade,cloudflare-real-ip@file"
    networks:
      - mooldang_prod_net
    depends_on:
      migration:
        condition: service_completed_successfully
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  chzzk-bot:
    image: mooldang-chzzk-bot:${VERSION_APP:-latest}
    container_name: mooldang-prod-chzzk-bot
    restart: always
    ports:
      - "9081:8080"
    env_file:
      - .env
    environment:
      - DOTNET_ENVIRONMENT=Production
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LOKI_URL=http://loki:3100
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CHZZKAPI__CLIENTID=${CHZZKAPI__CLIENTID}
      - CHZZKAPI__CLIENTSECRET=${CHZZKAPI__CLIENTSECRET}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - mooldang_prod_net
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  studio:
    image: mooldang-studio:${VERSION_UI:-latest}
    container_name: mooldang-prod-studio
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
      - INTERNAL_API_URL=http://app:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studio.rule=(Host(`bot.mooldang.store`) || Host(`www.mooldang.store`)) && PathPrefix(`/`)"
      - "traefik.http.routers.studio.entrypoints=web"
      - "traefik.http.services.studio.loadbalancer.server.port=3000"
      - "traefik.http.routers.studio.middlewares=cloudflare-real-ip@file"
    networks:
      - mooldang_prod_net
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  overlay:
    image: mooldang-overlay:${VERSION_UI:-latest}
    container_name: mooldang-prod-overlay
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.overlay.rule=(Host(`bot.mooldang.store`) || Host(`www.mooldang.store`)) && PathPrefix(`/overlay`)"
      - "traefik.http.routers.overlay.entrypoints=web"
      - "traefik.http.services.overlay.loadbalancer.server.port=80"
      - "traefik.http.routers.overlay.middlewares=cloudflare-real-ip@file"
    networks:
      - mooldang_prod_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  admin:
    image: mooldang-admin:${VERSION_UI:-latest}
    container_name: mooldang-prod-admin
    restart: always
    environment:
      - NODE_ENV=production
      - ORIGIN=${BASE_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=(Host(`bot.mooldang.store`) || Host(`www.mooldang.store`)) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.routers.admin.middlewares=admin-strip@file,traefik-auth@file,cloudflare-real-ip@file"
      - "traefik.http.services.admin.loadbalancer.server.port=3000"
    networks:
      - mooldang_prod_net
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  mooldang_prod_net:
    external: true
