events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # [오시리스의 눈]: 클라우드플레어 터널(cloudflared) 환경 최적화
    # 터널 컨테이너가 위치한 Docker 내부 네트워크 대역을 신뢰합니다.
    set_real_ip_from 172.16.0.0/12; 
    set_real_ip_from 192.168.0.0/16; 
    real_ip_header CF-Connecting-IP; # 클라우드플레어가 전달하는 실제 시청자 IP

    upstream backend {
        server app:8080;
    }

    upstream studio {
        server studio:3000;
    }

    upstream overlay {
        server overlay:80;
    }

    server {
        listen 80;
        server_name www.mooldang.store localhost;

        # 공통 프록시 설정 (Cloudflare 체인 반영)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. [관리자 대시보드] - 사령관의 브릿지
        location /admin/ {
            proxy_pass http://admin:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # 1.1 [함대 관제 센터] - Grafana 통합
        location /admin/monitoring/ {
            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            
            # [v2.4.4] 서브패스 지원을 위한 정밀 헤더 설정
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. [스트리머 스튜디오]
        location / {
            proxy_pass http://studio;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
            
            # [Aegis 보완]: 백엔드(api)에서 생성한 쿠키가 어드민 경로에서도 유효하도록 경로 보정
            proxy_cookie_path / /;
        }

        # 2. [백엔드 API]
        location /api {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }

        # 🌟 [Aegis Bridge]: 치지직 OAuth 콜백 전용 우회 경로 (레거시 호환용)
        location /Auth/callback {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. [SignalR WebSocket] - 시니어 파트너 '물멍'의 핵심 제언 반영
        location /overlayHub {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_cache_bypass $http_upgrade;
        }

        # 4. [오버레이 프론트엔드]
        location /overlay/ {
            proxy_pass http://overlay/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_cache_bypass $http_upgrade;
        }
    }
}
