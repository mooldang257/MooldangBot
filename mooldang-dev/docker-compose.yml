# [오시리스의 함대 v2.6]: 통합 완전판 (10k TPS 튜닝 + UI/Admin 복구) - DEV 환경

services:
  db:
    image: mariadb:11.7
    container_name: mooldang-dev-db
    command:
      - --local-infile=1
      - --innodb-flush-method=O_DIRECT
      - --max-connections=4096
      - --innodb-buffer-pool-size=16G
      - --innodb-log-file-size=2G
      - --innodb-flush-log-at-trx-commit=2
      - --innodb-autoinc-lock-mode=2
      - --bulk_insert_buffer_size=268435456
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      MARIADB_ROOT_HOST: '%'
    ports:
      - "3307:3306"
    volumes:
      - ${DB_DATA_PATH}:/var/lib/mysql
    networks:
      - mooldang_dev_net
    healthcheck:
      test: [ "CMD-SHELL", "mariadb-admin ping -h localhost -u root -p$${MARIADB_ROOT_PASSWORD} || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mooldang-dev-redis
    restart: always
    ports:
      - "6380:6379"
    networks:
      - mooldang_dev_net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mooldang-dev-rabbitmq
    restart: always
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - mooldang_dev_net
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  migration:
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-dev-migration
    restart: "no"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    entrypoint: [ "dotnet", "cli/MooldangBot.Cli.dll" ]
    networks:
      - mooldang_dev_net
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mooldang-app:latest
    container_name: mooldang-dev-app
    restart: always
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-dev.rule=(Host(`dev.mooldang.store`)) && (PathPrefix(`/api`) || PathPrefix(`/Auth/callback`) || PathPrefix(`/overlayHub`) || PathPrefix(`/swagger`))"
      - "traefik.http.routers.app-dev.entrypoints=web"
      - "traefik.http.services.app-dev.loadbalancer.server.port=8080"
      - "traefik.http.services.app-dev.loadbalancer.sticky.cookie=true"
      - "traefik.http.middlewares.app-upgrade.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.dev-noindex.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow, noarchive, nosnippet"
      - "traefik.http.routers.app-dev.middlewares=app-upgrade,cloudflare-real-ip@file,dev-noindex"
    networks:
      - mooldang_dev_net
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys

  chzzk-bot:
    build:
      context: .
      dockerfile: MooldangBot.ChzzkAPI/Dockerfile
    image: mooldang-chzzk-bot:latest
    container_name: mooldang-dev-chzzk-bot
    restart: always
    env_file:
      - .env
    environment:
      - DOTNET_ENVIRONMENT=Development
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LOKI_URL=http://loki:3100
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CHZZKAPI__CLIENTID=${CHZZKAPI__CLIENTID}
      - CHZZKAPI__CLIENTSECRET=${CHZZKAPI__CLIENTSECRET}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - mooldang_dev_net
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  studio:
    build:
      context: .
      dockerfile: MooldangBot.Studio/Dockerfile
    image: mooldang-studio:latest
    container_name: mooldang-dev-studio
    restart: always
    environment:
      - NODE_ENV=development
      - ORIGIN=${BASE_DOMAIN}
      - INTERNAL_API_URL=http://app:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.studio-dev.rule=(Host(`dev.mooldang.store`)) && PathPrefix(`/`)"
      - "traefik.http.routers.studio-dev.entrypoints=web"
      - "traefik.http.services.studio-dev.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.dev-noindex.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow, noarchive, nosnippet"
      - "traefik.http.routers.studio-dev.middlewares=cloudflare-real-ip@file,dev-noindex"
    networks:
      - mooldang_dev_net
    depends_on:
      # [수정됨 3] 502 에러 방지를 위해 app이 완전히 켜진 후(healthy) 실행되도록 변경
      app:
        condition: service_healthy

  overlay:
    build:
      context: ./MooldangBot.Overlay
      dockerfile: Dockerfile
    image: mooldang-overlay:latest
    container_name: mooldang-dev-overlay
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.overlay-dev.rule=(Host(`dev.mooldang.store`)) && PathPrefix(`/overlay`)"
      - "traefik.http.routers.overlay-dev.entrypoints=web"
      - "traefik.http.services.overlay-dev.loadbalancer.server.port=80"
      - "traefik.http.routers.overlay-dev.middlewares=cloudflare-real-ip@file"
    networks:
      - mooldang_dev_net

  admin:
    build:
      context: .
      dockerfile: MooldangBot.Admin/Dockerfile
    image: mooldang-admin:latest
    container_name: mooldang-dev-admin
    restart: always
    environment:
      - NODE_ENV=development
      - ORIGIN=${BASE_DOMAIN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin-dev.rule=(Host(`dev.mooldang.store`)) && PathPrefix(`/admin`)"
      - "traefik.http.routers.admin-dev.entrypoints=web"
      - "traefik.http.routers.admin-dev.middlewares=admin-strip@file,traefik-auth@file,cloudflare-real-ip@file"
      - "traefik.http.services.admin-dev.loadbalancer.server.port=3000"
    networks:
      - mooldang_dev_net
    depends_on:
      - app

  grafana:
    image: grafana/grafana-oss:latest
    container_name: mooldang-dev-grafana
    restart: always
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${BASE_DOMAIN}/admin/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana-dev.rule=(Host(`dev.mooldang.store`)) && PathPrefix(`/admin/monitoring`)"
      - "traefik.http.routers.grafana-dev.entrypoints=web"
      - "traefik.http.routers.grafana-dev.middlewares=monitoring-strip@file,traefik-auth@file,cloudflare-real-ip@file"
      - "traefik.http.services.grafana-dev.loadbalancer.server.port=3000"
    networks:
      - mooldang_dev_net
    volumes:
      - grafana-data-dev:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:latest
    container_name: mooldang-dev-loki
    restart: always
    ports:
      - "3101:3100"
    networks:
      - mooldang_dev_net
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  prometheus:
    image: prom/prometheus:latest
    container_name: mooldang-dev-prometheus
    restart: always
    networks:
      - mooldang_dev_net
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data-dev:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  traefik:
    image: traefik:v3.6.13
    container_name: mooldang-dev-traefik
    restart: always
    ports:
      - "81:80"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - /var/log/traefik:/var/log/traefik
    networks:
      - mooldang_dev_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard-dev.rule=PathPrefix(`/`)"
      - "traefik.http.routers.dashboard-dev.entrypoints=traefik"
      - "traefik.http.routers.dashboard-dev.service=api@internal"
      - "traefik.http.routers.dashboard-dev.middlewares=dashboard-shield@file"

  adminer:
    image: adminer:latest
    container_name: mooldang-dev-adminer
    restart: always
    environment:
      - ADMINER_DEFAULT_SERVER=db
    networks:
      - mooldang_dev_net
    ports:
      - "8889:8080"

networks:
  mooldang_dev_net:
    name: mooldang_dev_net
    driver: bridge

volumes:
  grafana-data-dev:
  prometheus-data-dev:
