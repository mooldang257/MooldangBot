# [오시리스의 함대] - SHARED ASSETS LAYER
# 개발 환경(dev.mooldang.com) 전용 공용 자산 레이어입니다.

services:
  fonts:
    build:
      context: ../fonts
      dockerfile: Dockerfile
    image: mooldang-fonts:${VERSION_FONTS:-latest}
    container_name: mooldang-common-fonts
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      - "traefik.enable=true"
      # [개발 도메인]
      - "traefik.http.routers.mooldang-dev-fonts.rule=Host(`dev.mooldang.com`) && PathPrefix(`/fonts`)"
      - "traefik.http.routers.mooldang-dev-fonts.entrypoints=web,web-dev"
      - "traefik.http.routers.mooldang-dev-fonts.middlewares=cloudflare-real-ip@file,fonts-dev-no-cache"
      - "traefik.http.services.mooldang-dev-fonts-svc.loadbalancer.server.port=80"
      
      # [운영 도메인]
      - "traefik.http.routers.mooldang-bot-fonts.rule=Host(`bot.mooldang.com`) && PathPrefix(`/fonts`)"
      - "traefik.http.routers.mooldang-bot-fonts.entrypoints=web"
      - "traefik.http.routers.mooldang-bot-fonts.middlewares=cloudflare-real-ip@file"
      - "traefik.http.services.mooldang-bot-fonts-svc.loadbalancer.server.port=80"
      
      - "traefik.docker.network=mooldang_dev_net"
      - "traefik.env=common" 
    networks:
      - mooldang_dev_net
      - mooldang_prod_net

networks:
  mooldang_dev_net:
    external: true
  mooldang_prod_net:
    external: true
