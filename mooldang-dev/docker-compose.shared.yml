# [오시리스의 함대] - SHARED ASSETS LAYER
# 개발 환경(dev.mooldang.com) 전용 공용 자산 레이어입니다.

services:
  fonts:
    build:
      context: ../fonts
      dockerfile: Dockerfile
    image: mooldang-fonts:${VERSION_FONTS:-latest}
    container_name: mooldang-dev-fonts
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      - "traefik.enable=true"
      # [물멍]: 개발(dev) 도메인 전용 명시적 라우팅 (우선순위 트릭 제거)
      - "traefik.http.routers.mooldang-dev-fonts.rule=Host(`dev.mooldang.com`) && PathPrefix(`/fonts`)"
      - "traefik.http.routers.mooldang-dev-fonts.entrypoints=web,web-dev"
      
      # [물멍]: 캐시 방지 미들웨어 (개발 편의성 유지)
      - "traefik.http.middlewares.fonts-dev-no-cache.headers.customresponseheaders.Cache-Control=no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0"
      - "traefik.http.middlewares.fonts-dev-no-cache.headers.customresponseheaders.Pragma=no-cache"
      - "traefik.http.middlewares.fonts-dev-no-cache.headers.customresponseheaders.Expires=0"
      
      - "traefik.http.routers.mooldang-dev-fonts.middlewares=cloudflare-real-ip@file,fonts-dev-no-cache"
      
      - "traefik.http.services.mooldang-dev-fonts-svc.loadbalancer.server.port=80"
      - "traefik.http.routers.mooldang-dev-fonts.service=mooldang-dev-fonts-svc"
      - "traefik.docker.network=mooldang_dev_net"
      - "traefik.env=dev" 
    networks:
      - mooldang_dev_net

networks:
  mooldang_dev_net:
    external: true
