# [오시리스의 함대] - SHARED ASSETS LAYER
# 개발과 운영이 공동으로 사용하는 공용 자산(폰트 등)을 담당합니다.

services:
  fonts:
    build:
      context: ../fonts
      dockerfile: Dockerfile
    image: mooldang-fonts:${VERSION_FONTS:-latest}
    container_name: mooldang-fonts
    restart: always
    deploy:
      resources:
        limits:
          memory: 128M
    labels:
      - "traefik.enable=true"
      # 개발(dev)과 운영(bot) 도메인 모두에서 /fonts 경로를 수용합니다.
      - "traefik.http.routers.fonts-shared.rule=(Host(`bot.mooldang.com`) || Host(`${BASE_DOMAIN}`)) && PathPrefix(`/fonts`)"
      - "traefik.http.routers.fonts-shared.entrypoints=web"
      - "traefik.http.services.fonts-shared.loadbalancer.server.port=80"
      - "traefik.http.routers.fonts-shared.middlewares=cloudflare-real-ip@file"
      - "traefik.docker.network=mooldang_dev_net"
      # 공용 자산이지만 환경 식별을 위해 라벨 유지
      - "traefik.env=bot" 
    networks:
      - mooldang_dev_net

networks:
  mooldang_dev_net:
    external: true
