<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mooldang Roulette Overlay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --accent-color: #ff3e3e;
            --bg-color: transparent;
            --slot-bg: rgba(20, 20, 20, 0.9);
            --gold-color: #ffd700;
            --item-h: 60px;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Pretendard', sans-serif;
            background: var(--bg-color);
            color: white;
        }

        #overlay-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            position: relative;
            padding-top: 40px;
        }

        /* 룰렛 타이틀 (v6 refinement) */
        #roulette-title {
            font-size: 20px;
            font-weight: 700;
            color: #eee;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.4);
            padding: 5px 20px;
            border-radius: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #roulette-title.active { opacity: 1; }

        /* 슬롯 머신 컨테이너 */
        #slot-machine {
            width: 450px;
            height: var(--item-h);
            background: var(--slot-bg);
            border: 3px solid #444;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            display: none; 
            margin-bottom: 20px;
        }

        #slot-machine.active {
            display: flex;
            animation: slot-enter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        @keyframes slot-enter {
            from { transform: translateY(-30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        #slot-window {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            z-index: 5; pointer-events: none;
        }

        .win-indicator {
            position: absolute; width: 100%; height: 3px;
            background: var(--accent-color);
            box-shadow: 0 0 10px var(--accent-color);
            z-index: 10;
        }

        #slot-reel { width: 100%; will-change: transform; }

        .slot-item {
            height: var(--item-h);
            display: flex; justify-content: center; align-items: center;
            font-size: 24px; font-weight: 800;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            letter-spacing: -0.5px;
        }

        /* 결과 바 */
        #history-bar {
            width: 90%;
            max-height: 400px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            overflow-y: auto;
            mask-image: linear-gradient(to bottom, black 90%, transparent);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #history-bar.active { opacity: 1; }

        #history-track {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .history-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 15px;
            font-size: 16px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex; align-items: center; gap: 6px;
            animation: item-appear 0.3s ease-out forwards;
        }

        @keyframes item-appear {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .history-item .reward { font-weight: bold; }
        .history-item .count { color: var(--gold-color); font-weight: 800; }

    </style>
</head>

<body>
    <div id="overlay-container">
        <!-- 타이틀 문구 (v6 refinement) -->
        <div id="roulette-title">시청자님의 룰렛 0/0</div>

        <!-- 슬롯 머신 -->
        <div id="slot-machine">
            <div class="win-indicator" style="top: 0;"></div>
            <div id="slot-window"></div>
            <div id="slot-reel"></div>
            <div class="win-indicator" style="bottom: 0;"></div>
        </div>

        <!-- 결과 목록 -->
        <div id="history-bar">
            <div id="history-track"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script src="/js/overlay_utils.js"></script>
    <script>
        const queryParams = new URLSearchParams(window.location.search);
        const chzzkUid = queryParams.get('uid') || window.location.pathname.split('/').pop();
        const isFastMode = queryParams.get('skip') === 'true';

        const reels = document.getElementById('slot-reel');
        const machine = document.getElementById('slot-machine');
        const titleEl = document.getElementById('roulette-title');
        const historyTrack = document.getElementById('history-track');
        const historyBar = document.getElementById('history-bar');

        const connection = new signalR.HubConnectionBuilder()
            .withUrl("/api/hubs/overlay")
            .withAutomaticReconnect()
            .build();

        let queue = [];
        let isRunning = false;
        const ITEM_HEIGHT = 60;

        // [v2.1] SignalR 이벤트 핸들러 고도화
        connection.on("ReceiveRouletteResult", (data) => {
            console.log("🎰 [오버레이] 결과 수신:", data);
            
            // HarmonyProxy를 통한 데이터 정규화 (casing 대응)
            data = window.createSafeData ? window.createSafeData(data) : data;
            
            // 필수 데이터 확인 (results 또는 Results)
            if (!data || !(data.results || data.Results)) {
                console.warn("⚠️ [오버레이] 유효하지 않은 결과 데이터 형식:", data);
                return;
            }
            
            queue.push(data);
            processQueue();
        });

        async function processQueue() {
            if (isRunning || queue.length === 0) return;
            isRunning = true;
            try {
                const data = queue.shift();
                await runSlotAnimation(data);
            } catch (e) {
                console.error("❌ [오버레이] 애니메이션 실행 중 오류:", e);
            } finally {
                isRunning = false;
                processQueue();
            }
        }

        async function runSlotAnimation(data) {
            const results = data.results || data.Results;
            const rouletteName = data.rouletteName || data.RouletteName || "기본";
            const viewerNickname = data.viewerNickname || data.ViewerNickname || "시청자";
            const totalCount = results.length;
            const isMulti = totalCount > 1;

            console.log(`🎬 애니메이션 시작: ${rouletteName} (x${totalCount})`);

            historyTrack.innerHTML = '';
            machine.classList.add('active');
            titleEl.classList.add('active');
            historyBar.classList.add('active');

            for (let i = 0; i < totalCount; i++) {
                const result = results[i];
                const itemName = result.itemName || result.ItemName;
                const itemColor = result.color || result.Color || '#ffffff';
                const currentIdx = i + 1;

                titleEl.innerText = `${viewerNickname}님의 ${rouletteName} ${currentIdx}/${totalCount}`;

                const dummyCount = isFastMode ? 20 : (isMulti ? 30 : 50); 
                reels.innerHTML = '';
                reels.style.transition = 'none';
                reels.style.transform = 'translateY(0)';

                for (let d = 0; d < dummyCount; d++) {
                    const div = document.createElement('div');
                    div.className = 'slot-item';
                    div.innerText = "???"; 
                    reels.appendChild(div);
                }

                const winnerDiv = document.createElement('div');
                winnerDiv.className = 'slot-item';
                winnerDiv.innerText = itemName;
                winnerDiv.style.color = itemColor;
                reels.appendChild(winnerDiv);

                reels.offsetHeight;

                const duration = isFastMode ? 0.5 : (isMulti ? 0.8 : 3.0); 
                reels.style.transition = `transform ${duration}s cubic-bezier(0.1, 0, 0.1, 1)`;
                reels.style.transform = `translateY(-${dummyCount * ITEM_HEIGHT}px)`;

                await new Promise(r => setTimeout(r, duration * 1000));

                updateRealtimeHistory(itemName, itemColor);
                
                const wait = isFastMode ? 200 : (isMulti ? 400 : 1000);
                await new Promise(r => setTimeout(r, wait));
            }

            await new Promise(r => setTimeout(r, 500)); // 2.0s에서 0.5s로 단축 (신속한 피드백)
            historyBar.classList.remove('active');
            titleEl.classList.remove('active');
            setTimeout(() => {
                historyTrack.innerHTML = '';
            }, 500);

            machine.classList.remove('active');
            
            // 완료 보고 (spinId 수동 체크 포함)
            const spinId = data.spinId || data.SpinId;
            if (spinId) notifyComplete(spinId);
        }

        function updateRealtimeHistory(name, color) {
            const existing = Array.from(historyTrack.children).find(el => el.dataset.itemName === name);
            if (existing) {
                const countSpan = existing.querySelector('.count');
                const currentCount = parseInt(countSpan.innerText.replace('x', '')) || 1;
                countSpan.innerText = `x${currentCount + 1}`;
                existing.style.transform = 'scale(1.1)';
                setTimeout(() => existing.style.transform = 'scale(1)', 150);
            } else {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.dataset.itemName = name;
                div.innerHTML = `<span class="reward" style="color: ${color}">[${name}]</span><span class="count">x1</span>`;
                historyTrack.appendChild(div);
            }
            historyBar.scrollTop = historyBar.scrollHeight;
        }

        async function notifyComplete(spinId) {
            try {
                // [v1.9.9] SignalR 고속 공명: REST API 대신 허브 메서드 호출
                await connection.invoke("CompleteRouletteAsync", spinId);
                console.log("✅ [오버레이] 서버에 완료 신호 전송됨:", spinId);
            } catch (e) { 
                console.error("❌ 완료 보고 실패:", e); 
            }
        }

        // [v2.2] 연결 관리 (재연결 시 그룹 자동 재가입)
        async function startConnection() {
            try {
                await connection.start();
                console.log("✅ SignalR 연결됨 (ID: " + connection.connectionId + ")");
                await connection.invoke("JoinStreamerGroup", chzzkUid);
            } catch (err) {
                console.error("❌ SignalR 초기 연결 실패:", err);
                setTimeout(startConnection, 5000);
            }
        }

        connection.onreconnected(async () => {
            console.log("📡 SignalR 재연결됨. 그룹 재가입 시도...");
            await connection.invoke("JoinStreamerGroup", chzzkUid);
        });

        startConnection();
    </script>
    </script>
</body>
</html>
