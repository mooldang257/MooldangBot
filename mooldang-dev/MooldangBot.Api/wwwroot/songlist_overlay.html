<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>물댕 오버레이</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script src="/js/overlay_utils.js"></script>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            color: white;
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            overflow: hidden;
            text-shadow: 0 1px 1px rgba(0,0,0,0.5); /* 최소한의 구분용 그림자 */
            font-weight: 800;
            letter-spacing: -0.8px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        .overlay-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            width: 400px;
            height: 700px;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* 위젯 단독 모드 스타일 최적화 */
        body.widget-mode {
            padding: 5px; /* 단독 위젯일 때는 여백 최소화 */
        }
        body.widget-mode .overlay-wrapper {
            gap: 0;
        }
        body.widget-mode .box {
            margin: 0;
            box-shadow: none; /* 마스터 관리자에서 개별적으로 관리하므로 그림자 중첩 방지 (선택 사항) */
        }

        .box {
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-left: 5px solid rgba(255,255,255,0.4);
            font-weight: 700; 
        }

        #stats-container {
            font-weight: bold;
            text-align: right;
            text-shadow: 2px 2px 4px #000;
            transition: color 0.3s;
        }

        #notice-container {
            white-space: pre-wrap;
            line-height: 1.4;
            font-weight: bold;
        }

        #omakase-container {
            font-weight: bold;
            text-align: center;
            border-radius: 8px;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .now-label {
            font-size: 13px;
            margin-bottom: 8px;
            opacity: 1;
            font-weight: 900;
            letter-spacing: 0px;
        }

        .now-title {
            font-weight: 900; /* Black */
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 5px;
            line-height: 1.1;
            font-size: 1.25em;
        }

        .now-artist {
            text-align: right;
            font-size: 0.8em;
            opacity: 1;
            margin-top: 5px;
            font-weight: 800;
        }

        .list-title {
            font-size: 1.1em;
            font-weight: 900;
            margin-bottom: 10px;
            border-bottom: 3px solid rgba(255,255,255,0.4);
            padding-bottom: 5px;
            opacity: 1;
            letter-spacing: 0px;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

            .list-item:last-child {
                margin-bottom: 0;
            }

        .item-title {
            font-size: 1.05em;
            font-weight: 800;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-artist {
            font-size: 0.9em;
            margin-left: 10px;
            flex-shrink: 0;
            opacity: 1;
            font-weight: 800;
        }
    </style>
    <style id="dynamic-styles"></style>
</head>
<body>
    <div class="overlay-wrapper">
        <div id="stats-container" style="display:none;"></div>
        <div id="notice-container" class="box" style="display:none;"></div>
        <div id="omakase-container" style="display:none;"></div>
        <div id="playing-container" class="box" style="display:none;"></div>
        <div id="pending-container" class="box" style="display:none;"></div>
        <div id="completed-container" class="box" style="display:none;"></div>
    </div>

    <script>
        const urlParams = new URL(window.location.href).searchParams;
        const targetWidget = urlParams.get('widget')?.toLowerCase(); // e.g., 'playing', 'pending', 'completed', 'notice', 'omakase'
        const isSample = urlParams.get('sample') === 'true';
        
        if (targetWidget) document.body.classList.add('widget-mode');
        
        // UID 추출 로직 개선 (쿼리 파라미터 또는 경로에서 추출)
        let chzzkUid = urlParams.get('chzzkUid');
        if (!chzzkUid || chzzkUid.includes('.')) {
            const pathParts = window.location.pathname.split('/');
            chzzkUid = pathParts[pathParts.length - 1];
        }

        let dashState = { memo: "", omakases: [], currentTitle: "-", currentArtist: "", pendingSongs: [], completedSongs: [], labels: {} };
        let designState = {};

        // 🎨 부모 창(설정 페이지)으로부터의 실시간 디자인 메시지 수신 로직
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === "DEMO_DESIGN_UPDATE") {
                console.log("🎨 실시간 디자인 업데이트 수신:", event.data.settings);
                designState = event.data.settings;
                if (event.data.dashState) {
                    dashState = event.data.dashState;
                }
                applyDesignStyles();
                renderOverlay();
            }
        });

        // ⭐ 프리뷰 모드일 때 초기 상태를 샘플 데이터로 설정해 "깜빡임" 및 "검은 화면" 방지
        if (isSample) {
            dashState = { ...SAMPLE_DATA };
        }

        // 샘플 데이터 (프리뷰용)
        const SAMPLE_DATA = {
            memo: "📢 공지: 물댕봇 테스트 중입니다! \n디자인을 자유롭게 수정해 보세요.",
            omakases: [
                { name: "물마카세", count: 3, icon: "🍣" },
                { name: "🎤 노래방", count: 1, icon: "🎤" }
            ],
            currentTitle: "테스트 곡 제목",
            currentArtist: "테스트 가수",
            pendingSongs: [
                { title: "대기 중인 곡 1", artist: "시청자A" },
                { title: "대기 중인 곡 2", artist: "시청자B" },
                { title: "대기 중인 곡 3", artist: "시청자C" }
            ],
            completedSongs: [
                { title: "어제 부른 노래", artist: "시청자D" },
                { title: "방금 부른 노래", artist: "시청자E" }
            ],
            labels: { nowPlaying: "▶ NOW PLAYING", upNext: "⏳ UP NEXT", completed: "✔ COMPLETED" }
        };

        async function fetchInitialData() {
            try {
                // 1. 노래 데이터 및 대시보드 상태 가져오기
                const dashRes = await fetch(`/api/songlist/data/${chzzkUid}`);
                if (dashRes.ok) {
                    const d = createSafeData(await dashRes.json());
                    
                    // [Safe Casing] PascalCase와 camelCase 모두 대응
                    dashState = {
                        memo: d.Memo ?? d.memo ?? "",
                        omakases: d.Omakases ?? d.omakases ?? [],
                        pendingSongs: (d.Songs ?? d.songs ?? []).filter(s => (s.Status ?? s.status) === 'Pending'),
                        completedSongs: (d.Songs ?? d.songs ?? []).filter(s => (s.Status ?? s.status) === 'Completed'),
                        labels: { nowPlaying: "▶ NOW PLAYING", upNext: "⏳ UP NEXT", completed: "✔ COMPLETED" }
                    };

                    const songs = d.Songs ?? d.songs ?? [];
                    const playing = songs.find(s => (s.Status ?? s.status) === 'Playing');
                    if (playing) { 
                        dashState.currentTitle = playing.Title ?? playing.title ?? "-"; 
                        dashState.currentArtist = playing.Artist ?? playing.artist ?? ""; 
                    } else {
                        dashState.currentTitle = "-";
                        dashState.currentArtist = "";
                    }

                    // ⭐ 샘플 모드인데 실제 데이터가 거의 없는 경우 샘플 데이터로 보완
                    if (isSample) {
                        if (dashState.currentTitle === "-" && dashState.pendingSongs.length === 0 && dashState.completedSongs.length === 0) {
                            dashState.currentTitle = SAMPLE_DATA.currentTitle;
                            dashState.currentArtist = SAMPLE_DATA.currentArtist;
                            dashState.pendingSongs = SAMPLE_DATA.pendingSongs;
                            dashState.completedSongs = SAMPLE_DATA.completedSongs;
                        }
                        if (dashState.omakases.length === 0) dashState.omakases = SAMPLE_DATA.omakases;
                        if (!dashState.memo || dashState.memo.trim() === "") dashState.memo = SAMPLE_DATA.memo;
                    }
                }
                
                // 2. 디자인 설정 가져오기
                const setRes = await fetch(`/api/settings/data/${chzzkUid}`);
                if (setRes.ok) {
                    const s = createSafeData(await setRes.json());
                    
                    // [Safe Casing] labels/Labels 및 내부 필드 대응
                    const labels = s.Labels ?? s.labels;
                    if (labels) {
                        dashState.labels = {
                            nowPlaying: labels.NowPlaying ?? labels.nowPlaying ?? "▶ NOW PLAYING",
                            upNext: labels.UpNext ?? labels.upNext ?? "⏳ UP NEXT",
                            completed: labels.Completed ?? labels.completed ?? "✔ COMPLETED"
                        };
                    }

                    const designJson = s.DesignSettingsJson ?? s.designSettingsJson;
                    if (designJson && designJson !== "{}") {
                        designState = typeof designJson === 'string' ? JSON.parse(designJson) : designJson;
                        applyDesignStyles();
                    }
                }
                renderOverlay();
            } catch (e) { 
                console.error("데이터 로드 실패", e);
                if (isSample) {
                    dashState = { ...SAMPLE_DATA };
                    renderOverlay();
                }
            }
        }

        function applyDesignStyles() {
            const ds = designState;
            let css = ds.CustomCss ?? ds.customCss ?? ""; 

            // Canvas (전체 규격) 설정
            const wrapper = document.querySelector('.overlay-wrapper');
            if (ds.Canvas && wrapper) {
                const c = ds.Canvas;
                wrapper.style.width = (c.w || 400) + 'px';
                wrapper.style.height = (c.h || 700) + 'px';
                
                const hexToRgba = (hex, alphaPercent) => {
                    if (!hex) return "rgba(0,0,0,0)";
                    const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
                    return `rgba(${r}, ${g}, ${b}, ${(alphaPercent || 0) / 100})`;
                };
                
                wrapper.style.backgroundColor = hexToRgba(c.bg || "#2c3e50", c.alpha || 0);

                // 글로벌 테두리 적용
                if (c.borderWidth && c.borderWidth > 0) {
                    wrapper.style.border = `${c.borderWidth}px solid ${hexToRgba(c.borderColor || "#ffffff", c.borderAlpha !== undefined ? c.borderAlpha : 100)}`;
                    wrapper.style.boxSizing = "border-box";
                } else {
                    wrapper.style.border = "none";
                }
                if (c.borderRadius !== undefined) {
                    wrapper.style.borderRadius = c.borderRadius + 'px';
                }
                
                // ⭐ 개별 상위 여백으로 제어하므로 전체 Gap 삭제

                // ⭐ 전체 크기 배율(Global Scale) 적용
                if (c.scale !== undefined) {
                    const s = c.scale / 100;
                    wrapper.style.transform = `scale(${s})`;
                    wrapper.style.transformOrigin = "top center";
                }
            }

            // ⭐ 통계 위치 조정 (Horizontal Position %)
            const stats = document.getElementById("stats-container");
            if (stats && ds.Stats) {
                const s = ds.Stats;
                if (s.posX !== undefined) {
                    stats.style.textAlign = 'right';
                    // 100%일 때 우측 끝, 0%일 때 좌측 끝으로 오도록 padding 조절 (비율 기반)
                    stats.style.paddingRight = (100 - parseInt(s.posX || 100)) + '%';
                    stats.style.width = '100%';
                    stats.style.boxSizing = 'border-box';
                }
            }

            const map = {
                'Playing': '#playing-container',
                'Pending': '#pending-container',
                'Completed': '#completed-container',
                'Omakase': '#omakase-container',
                'Notice': '#notice-container',
                'Stats': '#stats-container'
            };

            for (const [key, selector] of Object.entries(map)) {
                const style = ds[key] ?? ds[key.toLowerCase()];
                const el = document.querySelector(selector);
                
                if (style && el) {
                    let rule = `${selector} { `;
                    const rgba = style.Rgba ?? style.rgba;
                    const text = style.Text ?? style.text;
                    const size = style.Size ?? style.size;
                    const marginTop = style.MarginTop ?? style.marginTop ?? 10;
                    
                    if (rgba) rule += `background: ${rgba} !important; `;
                    if (text) rule += `color: ${text} !important; `;
                    if (rgba) rule += `border-color: ${rgba.replace(/,[^,]*\)/, ', 1)')} !important; `;
                    if (size) rule += `font-size: ${size}px !important; `;
                    rule += `margin-top: ${marginTop}px !important; `;
                    rule += `font-weight: 900 !important; `;
                    rule += `letter-spacing: -0.8px !important; `;
                    
                    // 절대 좌표 배치 적용 (위젯 단독 모드가 아닐 때만)
                    // 절대 좌표 배치 제거 (세로 쌓기 모드로 전환)

                    rule += `} `;
                    css += rule;
                    
                    const custom = style.CustomCss ?? style.customCss;
                    if (custom) css += `\n/* ${key} custom CSS */\n${custom}\n`;
                }
            }

            document.getElementById("dynamic-styles").innerHTML = css;
        }

        function renderOverlay() {
            const st = dashState;
            const ds = designState;

            // [Safe Helper] 대소문자 무시 속성 가져오기
            const getDS = (key) => ds[key] ?? ds[key.toLowerCase()] ?? {};

            // ⭐ 1. 내부 데이터 갱신
            const stats = document.getElementById("stats-container");
            const dsStats = getDS('Stats');
            const showStats = dsStats.Show ?? dsStats.show ?? true;
            if (showStats) {
                stats.style.display = "block";
                const omaTotal = st.omakases ? st.omakases.reduce((acc, o) => acc + (o.Count ?? o.count ?? 0), 0) : 0;
                const pendingTotal = (st.pendingSongs ? st.pendingSongs.length : 0) + omaTotal;
                stats.innerHTML = `완료 ${(st.completedSongs || []).length} / 대기 ${pendingTotal}`;
            } else { stats.style.display = "none"; }

            const notice = document.getElementById("notice-container");
            const dsNotice = getDS('Notice');
            const showNotice = dsNotice.Show ?? dsNotice.show ?? true;
            if (showNotice && st.memo && st.memo.trim() !== "") {
                notice.style.display = "block"; notice.innerText = st.memo;
            } else { notice.style.display = "none"; }

            const omakase = document.getElementById("omakase-container");
            const dsOmakase = getDS('Omakase');
            const showOmakase = dsOmakase.Show ?? dsOmakase.show ?? true;

            if (showOmakase && st.omakases && st.omakases.some(o => (o.Count ?? o.count ?? 0) > 0)) {
                omakase.style.display = "block";
                const htmlArray = st.omakases.filter(o => (o.Count ?? o.count ?? 0) > 0).map(o => {
                    const iconVal = o.Icon ?? o.icon ?? '🍣';
                    const iconStr = iconVal ? `${iconVal} ` : '';
                    return `<span>${iconStr}${o.Name ?? o.name}</span> x ${o.Count ?? o.count}`;
                });
                omakase.innerHTML = htmlArray.join('<br><div style="margin:5px 0;"></div>');
            } else { omakase.style.display = "none"; }

            const currentLabels = ds.Labels ?? ds.labels ?? st.labels ?? {};

            const playing = document.getElementById("playing-container");
            const dsPlaying = getDS('Playing');
            const showPlaying = dsPlaying.Show ?? dsPlaying.show ?? true;
            if (showPlaying && st.currentTitle !== "-") {
                playing.style.display = "block";
                const labelTxt = currentLabels.nowPlaying ?? currentLabels.NowPlaying ?? "";
                const labelHtml = labelTxt ? `<div class="now-label">${labelTxt}</div>` : "";
                playing.innerHTML = `${labelHtml}
                                         <div class="now-title">🎵 ${st.currentTitle}</div>
                                         <div class="now-artist">${st.currentArtist ? "- " + st.currentArtist : ""}</div>`;
            } else { playing.style.display = "none"; }

            const pending = document.getElementById("pending-container");
            const dsPending = getDS('Pending');
            const showPending = dsPending.Show ?? dsPending.show ?? true;
            if (showPending && st.pendingSongs.length > 0) {
                pending.style.display = "block";
                const limit = parseInt(dsPending.Limit ?? dsPending.limit ?? 5) || 5;
                const labelTxt = currentLabels.upNext ?? currentLabels.UpNext ?? "";
                let html = labelTxt ? `<div class="list-title">${labelTxt}</div>` : "";
                (st.pendingSongs || []).slice(0, limit).forEach((song, index) => {
                    html += `<div class="list-item"><span class="item-title"><span style="color:#aaa;font-size:0.8em;margin-right:5px;">${index + 1}</span>${song.Title ?? song.title}</span><span class="item-artist">${song.Artist ?? song.artist ?? ""}</span></div>`;
                });
                if ((st.pendingSongs || []).length > limit) html += `<div style="text-align:center; font-size:11px; opacity:0.6; margin-top:5px;">...외 ${(st.pendingSongs || []).length - limit}곡 대기 중</div>`;
                pending.innerHTML = html;
            } else { pending.style.display = "none"; }

            const completed = document.getElementById("completed-container");
            const dsCompleted = getDS('Completed');
            const showCompleted = dsCompleted.Show ?? dsCompleted.show ?? true;
            if (showCompleted && st.completedSongs.length > 0) {
                completed.style.display = "block";
                const limit = parseInt(dsCompleted.Limit ?? dsCompleted.limit ?? 3) || 3;
                const labelTxt = currentLabels.completed ?? currentLabels.Completed ?? "";
                let html = labelTxt ? `<div class="list-title">${labelTxt}</div>` : "";
                [...st.completedSongs].reverse().slice(0, limit).forEach(song => {
                    html += `<div class="list-item" style="opacity:1;"><span class="item-title" style="text-decoration: line-through;">${song.Title ?? song.title}</span><span class="item-artist" style="opacity: 0.8;">${song.Artist ?? song.artist ?? ""}</span></div>`;
                });
                completed.innerHTML = html;
            } else { completed.style.display = "none"; }

            // ⭐ 2. 커스텀 표시 순서에 따른 물리적 DOM 재배치
            const order = ds.componentOrder || ['Stats', 'Notice', 'Omakase', 'Playing', 'Pending', 'Completed'];
            const wrapper = document.querySelector('.overlay-wrapper');
            
            // ⭐ 위젯 모드일 때 필터링 및 오버라이드
            if (targetWidget) {
                // 특정 위젯만 보여주기 위해 모든 컨테이너 순회하며 처리
                ['stats', 'notice', 'omakase', 'playing', 'pending', 'completed'].forEach(id => {
                    const el = document.getElementById(`${id}-container`);
                    if (el) {
                        if (id === targetWidget) {
                            el.style.display = "block"; // 강제 표시 (데이터가 있을 때만 표시하고 싶다면 추가 조건 필요)
                            // 단, notice/playing/pending/completed는 데이터 유무 체크가 필요할 수도 있음.
                            // 여기서는 '위젯 호출' 자체가 해당 기능을 쓰겠다는 의도이므로 최대한 보여줌.
                        } else {
                            el.style.display = "none"; // 타겟이 아니면 무조건 숨김
                        }
                    }
                });
                // 위젯 모드에서는 재배치 로직이 큰 의미가 없으므로 생략하거나 최소화
            } else {
                // 기존 전체 모드일 때만 재배치 로직 수행
                order.forEach(id => {
                    const el = document.getElementById(`${id.toLowerCase()}-container`);
                    if (el) wrapper.appendChild(el); 
                });
            }
        }

        const connection = new signalR.HubConnectionBuilder().withUrl("/api/hubs/overlay").withAutomaticReconnect().build();

        connection.on("ReceiveOverlayState", (jsonState) => { dashState = createSafeData(JSON.parse(jsonState)); renderOverlay(); });
        connection.on("ReceiveOverlayStyle", async (jsonStyle) => { 
            designState = createSafeData(JSON.parse(jsonStyle)); 
            applyDesignStyles(); 
            try {
                const dashRes = await fetch(`/api/songlist/data/${chzzkUid}`);
                if (dashRes.ok) {
                    const d = await dashRes.json();
                    dashState.omakases = d.omakases || [];
                }
            } catch (e) {}
            renderOverlay(); 
        });

        // 🚀 백엔드에서 온 갱신 신호를 직접 수신 (노래/오마카세/대시보드 통합)
        connection.on("RefreshSongAndDashboard", async () => {
            console.log("⚡ 백엔드로부터 데이터 갱신 신호를 받았습니다. 최신 정보를 불러옵니다.");
            await fetchInitialData();
        });

        connection.start().then(() => { connection.invoke("JoinStreamerGroup", chzzkUid); fetchInitialData(); }).catch(err => { setTimeout(fetchInitialData, 5000); });

        connection.onreconnected((connectionId) => {
            console.log("SignalR 재연결 완료! 방명록에 다시 가입합니다.");
            connection.invoke("JoinStreamerGroup", chzzkUid);
            // 💡 서버 재시작 사이 유실된/새로운 상태를 화면에 띄우기 위해 최신 DB 조회
            fetchInitialData();
        });

        // 🎨 부모 창(설정 페이지)으로부터의 실시간 디자인 메시지 수신 로직
        window.addEventListener('message', (event) => {
            if (event.data && event.data.type === "DEMO_DESIGN_UPDATE") {
                console.log("🎨 실시간 디자인 업데이트 수신:", event.data.settings);
                designState = event.data.settings;
                // 메시지로 받은 데이터는 샘플 데이터를 포함할 수 있으므로 강제 적용
                if (event.data.dashState) {
                    dashState = event.data.dashState;
                }
                applyDesignStyles();
                renderOverlay();
            }
        });
    </script>
</body>
</html>
