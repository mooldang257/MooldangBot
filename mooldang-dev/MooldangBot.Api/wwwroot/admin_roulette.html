<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>룰렛 관리 - 물댕봇</title>
    <link rel="stylesheet" href="/css/glass-theme.css">
    <style>
        .roulette-card {
            margin-bottom: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            position: relative;
        }

        .item-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
        }

        .item-row input {
            margin-bottom: 0;
        }

        .prob-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .total-prob {
            text-align: right;
            font-weight: bold;
            margin-top: 10px;
            color: var(--primary);
        }

        .test-btns {
            display: flex;
            gap: 5px;
        }

        .last-update {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 5px;
        }

        .load-more-container {
            text-align: center;
            margin: 20px 0;
        }

        /* 스위치 스타일 */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 20px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(14px);
        }
    </style>
</head>

<body>
    <div class="main-container">
        <a id="btn-back-home" href="/main.html" class="btn btn-outline"
            style="margin-bottom: 20px; display: inline-flex; text-decoration: none;">← 대시보드로 돌아가기</a>
        <div class="panel">
            <h2 style="display:flex; justify-content:space-between; align-items:center;">
                🎡 룰렛 시스템 관리
                <button class="btn btn-primary" onclick="showCreateForm()">➕ 새 룰렛 만들기</button>
            </h2>

            <div
                style="margin-bottom: 20px; padding: 15px; background: rgba(0,255,163,0.1); border: 1px solid var(--primary); border-radius: 8px; display: flex; align-items: center; gap: 10px;">
                <span style="white-space: nowrap; font-weight: bold; color: var(--primary);">오버레이 URL:</span>
                <input type="text" id="overlayUrl" readonly
                    style="flex: 1; padding: 8px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 4px;"
                    value="">
                <button class="btn btn-primary" onclick="copyOverlayUrl()"
                    style="white-space: nowrap; padding: 8px 15px;">📋 URL 복사</button>
            </div>

            <div id="rouletteList">
                <!-- JS Rendered -->
            </div>
            <div class="load-more-container" id="loadMoreArea">
                <button class="btn btn-outline" id="btnLoadMore" style="display:none;" onclick="loadRoulettes(true)">더
                    보기 🔽</button>
            </div>
        </div>
    </div>

    <script src="/js/overlay_utils.js?v=20260325_v2"></script>
    <script src="/js/roulette_modal.js?v=20260329_v1"></script>
    <script>
        const urlParams = new URL(window.location.href).searchParams;
        const chzzkUid = urlParams.get('uid') || '';

        // 💡 [추가] 대시보드로 돌아가기 링크에 UID 파라미터 유지
        document.addEventListener('DOMContentLoaded', () => {
            const backBtn = document.getElementById('btn-back-home');
            if (backBtn && chzzkUid) {
                backBtn.href = `/main.html?uid=${chzzkUid}`;
            }
        });

        let lastId = 0;
        let isEnd = false;
        let roulettes = [];
        let editingId = null;

        async function loadRoulettes(append = false) {
            if (!append) {
                lastId = 0;
                isEnd = false;
                roulettes = [];
                document.getElementById('rouletteList').innerHTML = '';
            }

            document.getElementById('overlayUrl').value = `${window.location.origin}/roulette_overlay.html?uid=${chzzkUid}`;

            try {
                const res = await fetch(`/api/admin/roulette/${chzzkUid}?LastId=${lastId}&PageSize=10`, { credentials: 'same-origin' });
                if (res.ok) {
                    let result = await res.json();
                    result = createSafeData(result);
                    
                    roulettes = roulettes.concat(result.Data);
                    renderList(result.Data, append);

                    if (result.NextLastId) {
                        lastId = result.NextLastId;
                        document.getElementById('btnLoadMore').style.display = 'inline-block';
                    } else {
                        isEnd = true;
                        document.getElementById('btnLoadMore').style.display = 'none';
                    }
                } else {
                    const errorMsg = res.status === 401 ? "로그인이 필요하거나 권한이 없습니다." : 
                                   res.status === 403 ? "접근 권한이 없습니다." : "데이터 로딩 실패 (Status: " + res.status + ")";
                    document.getElementById('rouletteList').innerHTML = `<div style="padding:40px; text-align:center; color:#ff4757;">⚠️ ${errorMsg}</div>`;
                }
            } catch (err) {
                console.error("데이터 로딩 실패:", err);
                document.getElementById('rouletteList').innerHTML = `<div style="padding:40px; text-align:center; color:#ff4757;">⚠️ 서버 통신 오류가 발생했습니다.</div>`;
            }
        }

        function renderList(newData, append) {
            const container = document.getElementById('rouletteList');

            if (!append && newData.length === 0) {
                container.innerHTML = '<div style="padding:40px; text-align:center; color:rgba(255,255,255,0.3);">등록된 룰렛이 없습니다.</div>';
                return;
            }

            newData.forEach(R => {
                const card = document.createElement('div');
                card.className = 'roulette-card';
                // 💡 방어적 코드: 필드가 누락되어도 자바스크립트가 중단되지 않도록 조치
                const name = R.Name || R.name || '무제';
                const type = R.Type ?? R.type ?? 0;
                const cost = R.CostPerSpin ?? R.costPerSpin ?? 0;
                const cmd = R.Command || R.command || '-';
                const date = R.LstUpdDt || R.lstUpdDt;
                const id = R.Id ?? R.id;
                const isActive = R.IsActive ?? R.isActive ?? true;

                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                        <div style="flex:1;">
                            <h3 style="margin:0; color:var(--primary);">${name}</h3>
                            <span class="prob-badge" style="background:rgba(255,255,255,0.1); margin-top:5px; display:inline-block;">
                                ${type === 0 ? '🧀 치즈' : '🪙 포인트'} | ${cost.toLocaleString()} ${type === 0 ? '치즈' : 'P'} | 명령어: ${cmd}
                            </span>
                            <div class="last-update">최종 수정: ${date ? new Date(date).toLocaleString() : '-'}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:15px;">
                            <label class="switch" title="룰렛 활성/비활성">
                                <input type="checkbox" onchange="toggleRouletteStatus(${id}, this.checked)" ${isActive ? 'checked' : ''}>
                                <span class="slider"></span>
                            </label>
                            <div class="test-btns">
                                <button class="btn btn-secondary btn-sm" onclick="runTestSpin(${id}, false)">🚀 1회 테스트</button>
                                <button class="btn btn-danger btn-sm" onclick="runTestSpin(${id}, true)">🔥 10연차 테스트</button>
                                <button class="btn btn-outline btn-sm" onclick="showEditForm(${id})">✏️ 수정</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteRoulette(${id})">🗑️ 삭제</button>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function toggleRouletteStatus(Id, IsActive) {
            const chzzkUid = new URLSearchParams(window.location.search).get('uid') || "";
            try {
                const res = await fetch(`/api/admin/roulette/${chzzkUid}/${Id}/status`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(IsActive),
                    credentials: 'same-origin'
                });
                if (!res.ok) {
                    alert("상태 변경 실패");
                    loadRoulettes();
                }
            } catch (err) {
                console.error("통신 오류:", err);
                loadRoulettes();
            }
        }

        async function showEditForm(Id) {
            RouletteModal.open(chzzkUid, Id);
        }

        function showCreateForm() {
            editingId = null;
            document.getElementById('modalTitle').innerText = '새 룰렛 생성';
            document.getElementById('rName').value = '';
            document.getElementById('rIsActive').checked = true;
            document.getElementById('itemListContainer').innerHTML = '';
            addItemRow();
            document.getElementById('editModal').style.display = 'block';
        }

        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        async function deleteRoulette(id) {
            const chzzkUid = new URLSearchParams(window.location.search).get('uid') || "";
            if (confirm("삭제하시겠습니까?")) {
                await fetch(`/api/admin/roulette/${chzzkUid}/${id}`, { method: 'DELETE', credentials: 'same-origin' });
                loadRoulettes();
            }
        }
        async function runTestSpin(id, is10x) {
            const chzzkUid = new URLSearchParams(window.location.search).get('uid') || "";
            await fetch(`/api/admin/roulette/${chzzkUid}/${id}/test?is10x=${is10x}`, { method: 'POST', credentials: 'same-origin' });
        }
        function updateTotalProb() {
            let total = 0;
            document.querySelectorAll('.item-prob').forEach(input => total += parseFloat(input.value) || 0);
            document.getElementById('totalProbDisplay').innerText = `총 가중치 합: ${total.toFixed(2)}`;
        }
        function copyOverlayUrl() {
            const urlInput = document.getElementById('overlayUrl');
            urlInput.select();
            document.execCommand('copy');
            alert("URL이 복사되었습니다.");
        }

        window.onload = () => loadRoulettes(false);
    </script>
</body>

</html>
