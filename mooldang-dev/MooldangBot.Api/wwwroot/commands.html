<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>물댕봇 - 명령어 관리소</title>
    <link rel="stylesheet" href="/css/glass-theme.css">
    <style>
        .form-row {
            display: grid;
            gap: 15px;
            align-items: end;
            margin-bottom: 25px;
        }

        /* Row 1: 키워드(150px) | 응답(Flexible) | 버튼(Audo) */
        .row-primary {
            grid-template-columns: 180px 1fr auto;
        }

        /* Row 2: 권한 | 카테고리 | 기능 | 재화 | 비용 (균등 분할 또는 개별 설정) */
        .row-secondary {
            grid-template-columns: 150px 150px 150px 110px 100px;
        }

        .keyword {
            color: var(--primary);
            font-weight: bold;
        }

        .badge {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-dark);
            border: 1px solid var(--glass-border);
            font-weight: 700;
        }

        @media(max-width: 900px) {

            .row-primary,
            .row-secondary {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .btn-group-action {
                width: 100%;
                margin-top: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="javascript:history.back()" class="btn btn-outline" style="margin-bottom: 10px; display: inline-flex;">←
            대시보드로 돌아가기</a>
        <h1 class="mb-0">🛠️ 명령어 관리소</h1>

        <div class="panel" style="border-top: 3px solid var(--primary); margin-top: 10px;">
            <h3 style="margin-top:0; margin-bottom: 15px; font-size: 1.1em; color: var(--text-dark);">✨ 챗봇 답변용 동적 변수 가이드</h3>
            <p id="dynamicVariableGuide" style="margin:0; font-size: 0.9em; color: #555; line-height: 1.8;">
                데이터 로딩 중...
            </p>
        </div>

        <!-- [v1.6-Final_Refine] 명령어 관리 2단 폼 -->
        <h1 id="formTitle">✨ 명령어 추가</h1>
        <div class="panel" style="border-top: 3px solid var(--primary);">
            <input type="hidden" id="editCommandId" value="0">
            <input type="hidden" id="editTargetId" value="">

            <!-- Row 1 (상세 옵션이 먼저 나옴) -->
            <div class="form-row row-secondary" style="margin-bottom:20px;">
                <div class="group"><label>실행 권한</label><select id="newRole" style="margin-bottom:0;"></select></div>
                <div class="group"><label>카테고리</label><select id="newCategory" onchange="onCategoryChange()"
                        style="margin-bottom:0;"></select></div>
                <div class="group"><label>세부 기능</label><select id="newFeature" onchange="onFeatureChange()"
                        style="margin-bottom:0;"></select></div>
                <div class="group">
                    <label>재화 타입</label>
                    <select id="newCostType" style="margin-bottom:0;">
                        <option value="None">무료</option>
                        <option value="Cheese">치즈 🧀</option>
                        <option value="Point">포인트 🅿️</option>
                    </select>
                </div>
                <div class="group"><label>발동 비용</label><input type="number" id="newCost" value="0"
                        style="margin-bottom:0;"></div>
            </div>

            <!-- Row 2 (키워드 및 응답 내용 - 상단 정렬) -->
            <div class="form-row row-primary" style="align-items: start;">
                <div class="group"><label>키워드</label><input type="text" id="newKeyword" placeholder="!명령어"
                        style="margin-bottom:0;"></div>
                <div class="group" style="padding-top: 5px;">
                    <label id="contentLabel">응답 내용 <span id="charCount"
                            style="font-size: 0.85em; color: var(--primary); font-weight: bold; margin-left: 5px;">(0)</span></label>
                    <textarea id="newContent" placeholder="시청자에게 답변할 내용"
                        style="height: 44px; min-height: 44px; width: 100%; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 12px; resize: vertical; margin-bottom: 0; line-height: 1.5; font-size: 0.95rem; background: white; overflow-y: hidden;"
                        oninput="updateCharCount(); autoExpand(this);" onfocus="autoExpand(this)"></textarea>
                </div>
                <div class="btn-group-action" style="display:flex; gap:8px; padding-top: 31px;">
                    <button class="btn btn-primary btn-save" onclick="saveUnifiedCommand()"
                        style="height:44px; margin-bottom:0; min-width:90px; box-shadow: 0 4px 15px rgba(0, 147, 233, 0.3);">저장</button>
                    <button id="btnCancel" class="btn btn-secondary" onclick="resetForm()"
                        style="height:44px; margin-bottom:0; display:none;">취소</button>
                </div>
            </div>
        </div>

        <style>
            /* [v3.2] 통합 대시보드 디자인 시스템 - 가로 배치 최적화 */
            .panel {
                padding: 25px !important;
                border-radius: 16px !important;
                background: white !important;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05) !important;
                margin-bottom: 15px !important;
                border: none;
            }

            h1 {
                margin-top: 10px !important;
                font-size: 1.5rem !important;
                font-weight: 800 !important;
                color: #2d3748 !important;
                display: flex;
                align-items: center;
                gap: 12px;
            }

            /* 100% 보장형 고정 헤더 아키텍처 (2-Table Method) */
            .unified-table-box {
                border: 1px solid #edf2f7;
                border-radius: 12px;
                overflow: hidden;
                margin-top: 25px;
                background: white;
            }

            /* 헤더 영역 (고정) */
            .table-header-box {
                background: #e0f2fe;
                border-bottom: 2px solid #bae6fd;
            }

            /* 본문 영역 (스크롤) */
            .table-body-box {
                max-height: 550px;
                overflow-y: auto;
                scrollbar-gutter: stable;
            }

            .unified-table-box table {
                width: 100%;
                table-layout: fixed;
                border-collapse: collapse;
                border: none;
                margin: 0;
            }

            .unified-table-box th {
                background: #e0f2fe;
                color: #334155;
                font-size: 0.9rem;
                font-weight: 800;
                padding: 20px !important;
                text-align: left;
                cursor: pointer;
                user-select: none;
                white-space: nowrap;
                border: none;
            }

            .unified-table-box td {
                padding: 12px 15px;
                border-bottom: 1px solid #edf2f7;
                vertical-align: middle;
                word-break: break-all;
                overflow-wrap: anywhere;
                background: white;
            }

            .sort-icon {
                display: inline-block;
                width: 15px;
                font-size: 0.8rem;
                margin-left: 4px;
                color: var(--primary);
            }

            @media (max-width: 650px) {
                .panel { padding: 15px !important; }
                h1 { font-size: 1.25rem !important; }
                .form-row { grid-template-columns: 1fr !important; gap: 10px !important; }
                .btn-primary, .btn-secondary { width: 100%; }
            }

            /* [v1.8] Premium Toggle Button (Badge Style) - 미세 밸런스 조정 */
            .toggle-badge { cursor: pointer; border: none; padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; min-width: 46px; transition: all 0.2; text-align: center; color: white; white-space: nowrap; overflow: hidden; display: inline-flex; justify-content: center; align-items: center; box-sizing: border-box; line-height: 1.2; }
            .toggle-badge.on { background-color: #2ed573; box-shadow: 0 2px 6px rgba(46, 213, 115, 0.3); }
            .toggle-badge.off { background-color: #ff4757; box-shadow: 0 2px 6px rgba(255, 71, 87, 0.3); }
            .toggle-badge:hover { opacity: 0.85; transform: scale(1.05); }
        </style>
        <!-- [v3.0] 실시간 명령어 검색 (하단 스타일 통일 버전) -->
        <h1>🔍 등록된 명령어 검색</h1>
        <div class="panel" style="border-top: 3px solid #0093e9;">
            <div class="form-row" style="grid-template-columns: 1fr auto auto; align-items: flex-end; gap: 15px;">
                <div class="group" style="margin-bottom: 0;">
                    <label style="font-weight: bold; color: #444; margin-bottom: 8px; display: block;">검색어 (키워드/내용)</label>
                    <input type="text" id="searchInput" placeholder="명령어 또는 응답 내용을 입력하세요..."
                        style="margin-bottom: 0; width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 8px;"
                        oninput="searchCommands()">
                </div>
                <div id="commandCountInfo"
                    style="font-size: 1.1rem; color: #0093e9; font-weight: 800; text-align: right; min-width: 60px; padding-bottom: 12px;">
                    - 건
                </div>
                <button class="btn btn-primary" onclick="searchCommands()"
                    style="height: 44px; margin-bottom: 0; padding: 0 30px; font-weight: bold; border-color: #0093e9; background: #0093e9;">
                    조회
                </button>
            </div>

            <div class="unified-table-box">
                <!-- 고정 헤더 영역 -->
                <div class="table-header-box">
                    <table>
                        <colgroup>
                            <col class="col-role" style="width: 110px;">
                            <col class="col-feature" style="width: 120px;">
                            <col class="col-keyword" style="width: 140px;">
                            <col class="col-content">
                            <col class="col-cost" style="width: 115px;">
                            <col class="col-action" style="width: 160px;">
                        </colgroup>
                        <thead>
                            <tr>
                                <th onclick="toggleSort('requiredRole')" class="col-role" style="text-align: center !important;">권한 <span id="sort-requiredRole" class="sort-icon"></span></th>
                                <th onclick="toggleSort('featureType')" class="col-feature" style="text-align: center !important;">기능 <span id="sort-featureType" class="sort-icon"></span></th>
                                <th onclick="toggleSort('keyword')" class="col-keyword">키워드 <span id="sort-keyword" class="sort-icon"></span></th>
                                <th onclick="toggleSort('responseText')" class="col-content">내용 <span id="sort-responseText" class="sort-icon"></span></th>
                                <th onclick="toggleSort('cost')" class="col-cost" style="text-align: center !important;">비용 <span id="sort-cost" class="sort-icon"></span></th>
                                <th class="col-action" style="text-align: center !important; cursor: default;">관리</th>
                            </tr>
                        </thead>
                    </table>
                </div>
                <!-- 스크롤 본문 영역 -->
                <div class="table-body-box">
                    <table>
                        <colgroup>
                            <col class="col-role" style="width: 110px;">
                            <col class="col-feature" style="width: 120px;">
                            <col class="col-keyword" style="width: 140px;">
                            <col class="col-content">
                            <col class="col-cost" style="width: 115px;">
                            <col class="col-action" style="width: 160px;">
                        </colgroup>
                        <tbody id="commandTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <h1>📢 정기 메세지 배치</h1>
        <div id="periodicPanel" class="panel" style="border-top: 3px solid #ffa500;">
            <div class="form-row" style="grid-template-columns: 120px 1fr auto; align-items: flex-start; gap: 15px;">
                <div class="group" style="margin-bottom: 0;">
                    <label style="font-weight: bold; color: #444; margin-bottom: 8px; display: block;">주기(분)</label>
                    <input type="number" id="periodicInterval" value="10" min="1"
                        style="margin-bottom: 0; width: 100%; padding: 12px 15px; border: 1px solid #e2e8f0; border-radius: 8px;">
                </div>
                <div class="group" style="margin-bottom: 0;">
                    <label style="font-weight: bold; color: #444; margin-bottom: 8px; display: block;">메세지 내용</label>
                    <textarea id="periodicMessage" placeholder="자동으로 보낼 홍보 메세지 (줄바꿈 가능)"
                        style="height: 44px; min-height: 44px; width: 100%; padding: 10px 15px; border: 1px solid #e2e8f0; border-radius: 12px; resize: vertical; margin-bottom: 0; line-height: 1.5; font-size: 0.95rem; background: white; overflow-y: hidden;"
                        oninput="autoExpand(this);" onfocus="autoExpand(this)"></textarea>
                </div>
                <input type="hidden" id="editPeriodicId" value="0">
                <button class="btn btn-secondary" id="btnSavePeriodic" onclick="savePeriodicMessage()"
                    style="height: 44px; margin-top: 31px; background: #ffa500; border-color: #ffa500; color: white; padding: 0 30px; font-weight: bold; border-radius: 10px;">
                    등록/수정
                </button>
            </div>
            
            <div class="unified-table-box">
                <!-- 고정 헤더 영역 -->
                <div class="table-header-box">
                    <table>
                        <colgroup>
                            <col style="width: 100px;">
                            <col>
                            <col style="width: 180px;">
                        </colgroup>
                        <thead>
                            <tr>
                                <th style="text-align: center !important;">주기</th>
                                <th>메세지 내용</th>
                                <th style="text-align: center !important;">관리</th>
                            </tr>
                        </thead>
                    </table>
                </div>
                <!-- 스크롤 본문 영역 -->
                <div class="table-body-box" style="max-height: 400px;">
                    <table>
                        <colgroup>
                            <col style="width: 100px;">
                            <col>
                            <col style="width: 160px;">
                        </colgroup>
                        <tbody id="periodicTableBody"></tbody>
                    </table>
                </div>
            </div>
    </div>

    <script src="/js/overlay_utils.js"></script>
    <script src="/js/roulette_modal.js?v=20260329_v1"></script>
    <script>
        const pathParts = window.location.pathname.split('/').filter(p => p);
        const chzzkUid = decodeURIComponent(pathParts[pathParts.length - 1] || '').trim();
        let masterData = { categories: [], features: [], roles: [] };

        // [v2.0] 클라이언트 사이드 데이터 상태 관리
        let allCommands = [];
        let currentSortBy = 'keyword'; // 기본 정렬: 키워드
        let currentSortOrder = 'asc';

        document.addEventListener('DOMContentLoaded', loadAll);

        async function loadAll() {
            await loadMasterData();
            await Promise.all([loadCommands(), loadPeriodicMessages()]);
        }

        async function loadMasterData() {
            try {
                const res = await fetch('/api/commands/master');
                masterData = await res.json();

                // 카테고리 로드
                const catSelect = document.getElementById('newCategory');
                catSelect.innerHTML = '';
                masterData.categories.forEach(c => {
                    const o = document.createElement('option');
                    o.value = c.name; o.dataset.id = c.id; o.innerText = c.displayName;
                    catSelect.appendChild(o);
                });

                // 권한 로드
                const roleSelect = document.getElementById('newRole');
                roleSelect.innerHTML = '';
                masterData.roles.forEach(r => {
                    const o = document.createElement('option');
                    o.value = r.name; o.innerText = r.displayName;
                    roleSelect.appendChild(o);
                });

                // [v1.8] 동적 변수 가이드 로드
                const guide = document.getElementById('dynamicVariableGuide');
                if (masterData.variables && masterData.variables.length > 0) {
                    const sortedVars = [...masterData.variables].sort((a, b) => (a.badgeColor || '').localeCompare(b.badgeColor || ''));
                    guide.innerHTML = sortedVars.map(v =>
                        `<span style="display: inline-block; white-space: nowrap; margin-right: 15px; margin-bottom: 8px;">
                            <span class="badge" style="background: ${getVarColor(v.badgeColor)}; color: white; border: none; margin-right: 5px;">${v.keyword}</span>
                            <span style="font-size: 0.95em; color: #555;">${v.description}</span>
                        </span>`
                    ).join('');
                } else {
                    guide.innerText = "사용 가능한 동적 변수가 없습니다.";
                }

                onCategoryChange();
            } catch (e) { console.error("마스터 데이터 동기화 실패:", e); }
        }

        function getVarColor(color) {
            if (!color) return '#0093e9';
            switch (color.toLowerCase()) {
                case 'primary': return '#0093e9';
                case 'success': return '#2ed573';
                case 'secondary': return '#747d8c';
                case 'info': return '#a55eea';
                case 'warning': return '#ffa500';
                default: return color;
            }
        }

        function onCategoryChange() {
            const catSelect = document.getElementById('newCategory');
            const opt = catSelect.options[catSelect.selectedIndex];
            if (!opt) return;
            const categoryId = parseInt(opt.dataset.id);
            const featureSelect = document.getElementById('newFeature');
            featureSelect.innerHTML = '';
            masterData.features.filter(f => f.categoryId === categoryId).forEach(f => {
                const o = document.createElement('option');
                o.value = f.typeName; o.innerText = f.displayName;
                featureSelect.appendChild(o);
            });
            onFeatureChange();
        }

        function onFeatureChange() {
            const type = document.getElementById('newFeature').value;
            const feature = masterData.features.find(f => f.typeName === type);
            const catSelect = document.getElementById('newCategory');
            const costInput = document.getElementById('newCost');
            const costTypeSelect = document.getElementById('newCostType');

            if (feature) {
                document.getElementById('newCost').value = feature.defaultCost || 0;
                document.getElementById('newRole').value = feature.requiredRole || 'Viewer';
                document.getElementById('newCostType').value = (feature.defaultCost > 0) ? 'Cheese' : 'None';

                if (catSelect.value === 'System' || feature.typeName === 'ChatPoint') {
                    costTypeSelect.value = 'None';
                    costTypeSelect.disabled = true;
                    costInput.value = 0;
                    costInput.disabled = true;
                    costInput.style.opacity = '0.5';
                } else {
                    costTypeSelect.disabled = false;
                    costInput.disabled = false;
                    costInput.style.opacity = '1';
                }

                const contentInput = document.getElementById('newContent');
                const contentLabel = document.getElementById('contentLabel');
                
                if (feature.typeName === 'Omakase') {
                    contentLabel.childNodes[0].nodeValue = "화면 표시 이름 ";
                    contentInput.placeholder = "예: 물마카세, 오늘 추천 메뉴 등";
                } else {
                    contentLabel.childNodes[0].nodeValue = "응답 내용 ";
                    contentInput.placeholder = "시청자에게 답변할 내용";
                }

                if (feature.typeName === 'Title') contentInput.maxLength = 40;
                else if (feature.typeName === 'Notice') contentInput.maxLength = 100;
                else contentInput.removeAttribute('maxLength');
                updateCharCount();
            }
        }

        function updateCharCount() {
            const input = document.getElementById('newContent');
            const count = document.getElementById('charCount');
            if (!input || !count) return;
            const len = input.value.length;
            const max = input.maxLength > 0 ? input.maxLength : null;
            count.innerText = max ? `(${len}/${max})` : `(${len})`;
            count.style.color = (max && len >= max) ? '#ff4757' : 'var(--primary)';
        }

        // [v4.4] 텍스트 영역 자동 확장 (Auto-Expanding)
        function autoExpand(el) {
            if (!el) return;
            el.style.height = '44px'; // 초기화 (감소 시 필요)
            const height = el.scrollHeight;
            el.style.height = (height > 44 ? height : 44) + 'px';
        }

        // [v2.0] 서버 재조회 없이 프론트엔드 엔진 가동
        async function loadCommands() {
            try {
                const res = await fetch(`/api/commands/unified/${chzzkUid}?page=1&pageSize=1000`);
                const data = await res.json();
                allCommands = data.items || [];
                renderFilteredCommands();
            } catch (e) {
                console.error("명령어 로드 실패:", e);
            }
        }

        function searchCommands() { renderFilteredCommands(); }

        function toggleSort(column) {
            if (currentSortBy === column) currentSortOrder = (currentSortOrder === 'asc') ? 'desc' : 'asc';
            else { currentSortBy = column; currentSortOrder = 'asc'; }
            
            // 모든 정렬 아이콘 초기화
            document.querySelectorAll('.sort-icon').forEach(span => span.innerText = '');

            const span = document.getElementById(`sort-${column}`);
            if (span) span.innerText = (currentSortOrder === 'asc') ? ' ▲' : ' ▼';
            renderFilteredCommands();
        }

        function renderFilteredCommands() {
            const keyword = (document.getElementById('searchInput')?.value || '').toLowerCase().trim();
            const body = document.getElementById('commandTableBody');
            const countInfo = document.getElementById('commandCountInfo');

            let filtered = allCommands.filter(c =>
                (c.keyword || '').toLowerCase().includes(keyword) ||
                (c.responseText || '').toLowerCase().includes(keyword)
            );

            filtered.sort((a, b) => {
                let valA = a[currentSortBy], valB = b[currentSortBy];
                if (typeof valA === 'number') return currentSortOrder === 'asc' ? valA - valB : valB - valA;
                valA = (valA || '').toString().toLowerCase();
                valB = (valB || '').toString().toLowerCase();
                if (valA < valB) return currentSortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortOrder === 'asc' ? 1 : -1;
                return 0;
            });

            body.innerHTML = '';
            filtered.forEach(c => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-role" style="text-align: center; font-size: 0.85rem;">
                        ${getRoleLabel(c.requiredRole)}
                    </td>
                    <td class="col-feature" style="text-align: center; font-size: 0.85rem;">
                        <span class="badge" style="background: #f8fafc; color: #64748b; border: 1px solid #e2e8f0; padding: 4px 8px; border-radius: 4px;">${getFeatureLabel(c.featureType)}</span>
                    </td>
                    <td class="col-keyword" style="font-weight: bold; color: #0093e9;">
                        ${highlightText(c.keyword, keyword)}
                    </td>
                    <td class="col-content" style="color: #475569; font-size: 0.95rem;">
                        ${c.featureType === 'Omakase' ? `<strong style="color: var(--primary);">${highlightText(c.responseText || '-', keyword)}</strong>` : highlightText(c.responseText || '-', keyword)}
                    </td>
                    <td class="col-cost" style="font-weight: 800; color: ${c.cost > 0 ? '#ffa500' : '#cbd5e1'}; font-size: 0.9rem; text-align: center; white-space: nowrap; word-break: normal;">
                        ${c.cost > 0 ? `${c.cost.toLocaleString()} ${c.costType === 'Point' ? '🅿️' : '🧀'}` : 'FREE'}
                    </td>
                    <td class="col-action" style="text-align: center;">
                        <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
                            <button class="toggle-badge ${c.isActive ? 'on' : 'off'}" onclick="toggleCommandStatus(${c.id}, this)" title="${c.isActive ? '비활성화' : '활성화'}">
                                ${c.isActive ? 'ON' : 'OFF'}
                            </button>
                            <button class="btn btn-primary" onclick="editUnifiedCommand(${c.id})" style="padding: 5px 10px; font-size: 0.8rem; background: #0093e9; border: none; border-radius: 4px;">수정</button>
                            <button class="btn btn-secondary" onclick="deleteUnifiedCommand(${c.id})" style="padding: 5px 10px; font-size: 0.8rem; background: #ff4757; border: none; border-radius: 4px; color: white;">삭제</button>
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
            if (countInfo) countInfo.innerText = `${filtered.length}건`;
        }

        function highlightText(text, keyword) {
            if (!keyword || text === '-') return text;
            const regex = new RegExp(`(${keyword})`, 'gi');
            return text.replace(regex, '<mark style="background:#fff3cd; color:#856404; padding:0 2px;">$1</mark>');
        }

        function getCategoryColor(cat) {
            switch (cat) {
                case 'General': return '#0093e9'; // 일반 (Blue)
                case 'System': return '#a55eea';  // 시스템메세지 (Purple)
                case 'Feature': return '#2ed573'; // 기능 (Green)
                default: return '#747d8c';
            }
        }

        function getFeatureLabel(type) {
            return masterData.features.find(f => f.typeName === type)?.displayName || type;
        }

        function getRoleLabel(role) {
            switch (role) {
                case 'Streamer': return '👤 스트리머';
                case 'Manager': return '🛡️ 매니저';
                default: return '👥 시청자';
            }
        }

        function editUnifiedCommand(id) {
            const cmd = allCommands.find(c => c.id === id);
            if (!cmd) return;

            document.getElementById('editCommandId').value = cmd.id;
            document.getElementById('editTargetId').value = cmd.targetId || '';
            document.getElementById('newKeyword').value = cmd.keyword;
            document.getElementById('newCategory').value = cmd.category;

            onCategoryChange();
            setTimeout(() => {
                document.getElementById('newFeature').value = cmd.featureType;
                document.getElementById('newCost').value = cmd.cost;
                document.getElementById('newCostType').value = cmd.costType;
                document.getElementById('newRole').value = cmd.requiredRole;
                document.getElementById('newContent').value = cmd.responseText || '';
                updateCharCount();
                autoExpand(document.getElementById('newContent'));
                document.getElementById('formTitle').innerText = "⚙️ 명령어 상세 수정";
                document.querySelector(".btn-save").innerText = "수정 완료";
                document.getElementById('btnCancel').style.display = 'inline-block';
                document.getElementById('formTitle').scrollIntoView({ behavior: 'smooth' });
            }, 150);
        }

        async function saveUnifiedCommand() {
            const id = parseInt(document.getElementById('editCommandId').value) || 0;
            const cmd = {
                id: id,
                keyword: document.getElementById('newKeyword').value.trim(),
                category: document.getElementById('newCategory').value,
                featureType: document.getElementById('newFeature').value,
                cost: parseInt(document.getElementById('newCost').value) || 0,
                costType: document.getElementById('newCostType').value,
                responseText: document.getElementById('newContent').value.trim(),
                requiredRole: document.getElementById('newRole').value,
                targetId: parseInt(document.getElementById('editTargetId').value) || null,
                isActive: true
            };

            if (!cmd.keyword) return alert("키워드를 입력해 주세요!");

            if (cmd.featureType === 'Roulette') {
                // 🎰 룰렛인 경우 상세 설정 모달 호출 (현재 폼 데이터와 동기화)
                RouletteModal.open(chzzkUid, cmd.targetId || 0, { 
                    name: cmd.responseText,
                    keyword: cmd.keyword,
                    cost: cmd.cost,
                    costType: cmd.costType
                }, (rouletteData) => {
                    cmd.rouletteData = rouletteData;
                    executeSave(cmd);
                });
                return;
            }

            executeSave(cmd);
        }

        async function executeSave(cmd) {
            const id = cmd.id;
            const res = await fetch(`/api/commands/unified/${chzzkUid}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cmd)
            });

            if (res.ok) {
                alert(id > 0 ? "업데이트가 완료되었습니다. ✨" : "새 명령어가 등록되었습니다. ✨");
                loadCommands();
                resetForm();
            } else {
                const err = await res.json();
                alert(err.message || "오류가 발생했습니다.");
            }
        }

        function resetForm() {
            document.getElementById('editCommandId').value = "0";
            document.getElementById('editTargetId').value = "";
            document.getElementById('newKeyword').value = '';
            document.getElementById('newContent').value = '';
            document.getElementById('newCost').value = 0;
            document.getElementById('formTitle').innerText = "✨ 명령어 추가";
            document.querySelector(".btn-save").innerText = "저장";
            document.getElementById('btnCancel').style.display = 'none';
            autoExpand(document.getElementById('newContent'));
        }

        async function toggleCommandStatus(id, btn) {
            try {
                const res = await fetch(`/api/commands/unified/toggle/${chzzkUid}/${id}`, { method: 'PATCH' });
                if (res.ok) {
                    // 로컬 상태 즉시 반영 (다시 로드하지 않고 검색 결과 내 데이터 직접 수정)
                    const cmd = allCommands.find(c => c.id === id);
                    if (cmd) {
                        cmd.isActive = !cmd.isActive;
                        // 버튼 UI 즉시 업데이트 (부드러운 전환을 위해 직접 조작)
                        if (btn) {
                            btn.classList.toggle('on', cmd.isActive);
                            btn.classList.toggle('off', !cmd.isActive);
                            btn.innerText = cmd.isActive ? 'ON' : 'OFF';
                            btn.title = cmd.isActive ? '비활성화' : '활성화';
                        }
                    }
                }
            } catch (e) {
                console.error("명령어 상태 토글 실패:", e);
                loadCommands(); // 실패 시 정합성을 위해 재로드
            }
        }

        async function deleteUnifiedCommand(id) {
            if (!confirm("해당 명령어를 삭제하시겠습니까?")) return;
            const res = await fetch(`/api/commands/unified/delete/${chzzkUid}/${id}`, { method: 'DELETE' });
            if (res.ok) loadCommands();
        }

        // --- Periodic Message ---
        async function loadPeriodicMessages() {
            const res = await fetch(`/api/periodicmessage/list/${chzzkUid}`);
            const list = await res.json();
            const body = document.getElementById('periodicTableBody');
            body.innerHTML = '';
            list.forEach(m => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td style="font-weight:bold; text-align:center; width: 100px;">${m.intervalMinutes}분</td>
                    <td style="white-space: pre-wrap; word-break: break-all; font-size: 0.95rem; color: #475569; min-width: 200px;">${m.message}</td>
                    <td class="col-action" style="text-align:center;">
                        <div style="display: flex; gap: 8px; justify-content: center; align-items: center;">
                            <button class="toggle-badge ${m.isEnabled ? 'on' : 'off'}" onclick="togglePeriodicStatus(${m.id})" title="${m.isEnabled ? '비활성화' : '활성화'}">
                                ${m.isEnabled ? 'ON' : 'OFF'}
                            </button>
                            <button class="btn btn-primary" onclick="editPeriodicMessage(${m.id})" style="padding: 5px 10px; font-size: 0.8rem; background: #0093e9; border: none; border-radius: 4px;">수정</button>
                            <button class="btn btn-secondary" onclick="deletePeriodicMessage(${m.id})" style="padding: 5px 10px; font-size: 0.8rem; background: #ff4757; border: none; border-radius: 4px; color: white;">삭제</button>
                        </div>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        async function savePeriodicMessage() {
            const id = parseInt(document.getElementById('editPeriodicId').value) || 0;
            const min = document.getElementById('periodicInterval').value;
            const msg = document.getElementById('periodicMessage').value.trim();
            if (!min || !msg) return alert("주기와 내용을 정확히 입력하세요!");
            
            const res = await fetch(`/api/periodicmessage/save/${chzzkUid}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: id, chzzkUid, intervalMinutes: min, message: msg, isEnabled: true })
            });

            if (res.ok) {
                resetPeriodicForm();
                loadPeriodicMessages();
            }
        }

        function editPeriodicMessage(id) {
            fetch(`/api/periodicmessage/list/${chzzkUid}`).then(res => res.json()).then(list => {
                const m = list.find(x => x.id === id);
                if (m) {
                    document.getElementById('editPeriodicId').value = m.id;
                    document.getElementById('periodicInterval').value = m.intervalMinutes;
                    document.getElementById('periodicMessage').value = m.message;
                    autoExpand(document.getElementById('periodicMessage'));
                    document.getElementById('btnSavePeriodic').innerText = "수정 완료";
                    document.getElementById('periodicInterval').scrollIntoView({ behavior: 'smooth' });
                }
            });
        }

        async function togglePeriodicStatus(id) {
            try {
                const res = await fetch(`/api/periodicmessage/toggle/${chzzkUid}/${id}`, { method: 'PATCH' });
                // 정합성을 위해 전체 목록 재로드 (간단함)
                if (res.ok) loadPeriodicMessages();
            } catch (e) {
                console.error("정기 메시지 상태 토글 실패:", e);
                loadPeriodicMessages();
            }
        }

        function resetPeriodicForm() {
            document.getElementById('editPeriodicId').value = "0";
            document.getElementById('periodicInterval').value = "10";
            document.getElementById('periodicMessage').value = '';
            document.getElementById('btnSavePeriodic').innerText = "등록/수정";
        }

        async function deletePeriodicMessage(id) {
            if (!confirm("정기 메시지를 삭제하시겠습니까?")) return;
            const res = await fetch(`/api/periodicmessage/delete/${chzzkUid}/${id}`, { method: 'DELETE' });
            if (res.ok) loadPeriodicMessages();
        }

        </script>
</body>

</html>
