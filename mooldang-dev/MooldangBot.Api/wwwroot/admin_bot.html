<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물댕봇 관리자 - 시스템 봇 연동</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .admin-container {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

            .admin-container h1 {
                color: #00e676; /* 치지직 고유 색상 느낌 */
                margin-bottom: 20px;
            }

        .warning-box {
            background-color: rgba(255, 69, 58, 0.1);
            border: 1px solid #ff453a;
            color: #ff453a;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            font-size: 0.9em;
            line-height: 1.5;
            text-align: left;
        }

        .login-btn {
            display: inline-block;
            background-color: #00e676;
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1em;
            padding: 15px 30px;
            border-radius: 8px;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

            .login-btn:hover {
                background-color: #00c853;
            }
    </style>
</head>
<body>

    <div class="admin-container">
        <h1>🤖 시스템 공통 봇 설정</h1>
        <p>이 페이지는 <strong>물댕봇 시스템 관리자 전용</strong>입니다.<br>명령어 응답에 사용할 기본 봇 계정을 연동합니다.</p>

        <div class="warning-box">
            <strong>⚠️ 연동 전 필수 확인사항</strong><br><br>
            현재 브라우저에 본인(스트리머) 계정으로 로그인되어 있다면, 반드시 네이버/치지직에서 <strong>로그아웃</strong> 하신 후 <strong>[봇으로 사용할 부계정]</strong>으로 로그인한 상태에서 아래 버튼을 눌러주세요.
        </div>

        <a href="/api/admin/bot/login" class="login-btn">
            봇 계정으로 치지직 연동하기
        </a>
    </div>

</body>
</html>
