<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>물댕봇 관리자 대시보드</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #00e676;
            --secondary: #38bdf8;
            --danger: #ef4444;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
            width: 100%;
        }

        header {
            margin-bottom: 40px;
            border-bottom: 1px solid #334155;
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #334155;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.25rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .status-active { background-color: rgba(0, 230, 118, 0.1); color: var(--primary); }
        .status-idle { background-color: rgba(148, 163, 184, 0.1); color: var(--text-muted); }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .info-label { color: var(--text-muted); }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: filter 0.2s;
            margin-top: 16px;
        }

        .btn:disabled {
            filter: grayscale(1);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-primary { background-color: var(--primary); color: #000; }
        .btn-secondary { background-color: #334155; color: #fff; }

        .btn:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        #sync-log {
            margin-top: 16px;
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--secondary);
            max-height: 100px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>물댕봇 관리자 패널</h1>
        <p style="color: var(--text-muted)">시스템 설정을 관리하고 배치 작업을 실행합니다.</p>
    </header>

    <div class="grid">
        <!-- 카테고리 동기화 카드 -->
        <div class="card">
            <h2>📦 치지직 카테고리 동기화</h2>
            <div id="sync-status-badge" class="status-badge status-idle">IDLE</div>
            
            <div class="info-row">
                <span class="info-label">마지막 실행</span>
                <span id="last-run">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">결과</span>
                <span id="last-result">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">데이터</span>
                <span id="data-counts">신규: 0, 갱신: 0</span>
            </div>

            <div style="margin-top: 16px; margin-bottom: 8px;">
                <input type="text" id="custom-keyword" placeholder="추가할 검색어 (예: 아이온)" style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-family: 'Pretendard', sans-serif;">
            </div>
            
            <div style="display: flex; gap: 10px;">
                <button id="btn-sync-custom" class="btn btn-secondary" onclick="startCustomSync()" style="margin-top: 0; flex: 1;">검색어 동기화</button>
                <button id="btn-sync" class="btn btn-primary" onclick="startSync()" style="margin-top: 0; flex: 1;">전체 동기화</button>
            </div>
            
            <div id="sync-log"></div>
        </div>

        <!-- 봇 연동 카드 
        <div class="card">
            <h2>🤖 시스템 봇 설정</h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 24px;">
                명령어 응답에 사용할 기본 부계정을 치지직에 연동합니다.
            </p>
            <a href="/admin_bot.html" class="btn btn-secondary">봇 연동 페이지로 이동</a>
        </div> -->

        <!-- 카테고리 약어 관리 카드 -->
        <div class="card">
            <h2>🏷️ 카테고리 약어 관리</h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 24px;">
                저장된 치지직 카테고리를 검색하고 호출용 약어(별칭)를 등록/삭제합니다.
            </p>
            <a href="/admin_category.html" class="btn btn-secondary">약어 관리 페이지로 이동</a>
        </div>

        <!-- 등록된 스트리머 관리 카드 (New) -->
        <div class="card" style="grid-column: 1 / -1;">
            <h2>👥 등록된 스트리머 관리</h2>
            <p style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 16px;">
                시스템에 등록된 모든 스트리머 목록입니다. 문제 발생 시 지원을 위해 각 대시보드로 즉시 접속할 수 있습니다.
            </p>
            <div id="streamer-list-container" style="max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 10px;">
                <div style="text-align: center; padding: 20px; color: var(--text-muted);">스트리머 목록을 불러오는 중...</div>
            </div>
        </div>
    </div>
</div>

<script>
    async function updateStatus() {
        try {
            const res = await fetch('/api/admin/bot/sync-status');
            const data = await res.json();

            const badge = document.getElementById('sync-status-badge');
            const btn = document.getElementById('btn-sync');
            const btnCustom = document.getElementById('btn-sync-custom');
            const inputKeyword = document.getElementById('custom-keyword');

            if (data.isRunning) {
                badge.innerText = 'SYNCING...';
                badge.className = 'status-badge status-active';
                btn.disabled = true;
                btnCustom.disabled = true;
                inputKeyword.disabled = true;
                btn.innerText = '진행 중...';
            } else {
                badge.innerText = 'IDLE';
                badge.className = 'status-badge status-idle';
                btn.disabled = false;
                btnCustom.disabled = false;
                inputKeyword.disabled = false;
                btn.innerText = '전체 동기화';
            }

            document.getElementById('last-run').innerText = data.lastRunTime || '-';
            document.getElementById('last-result').innerText = data.lastResult || '-';
            document.getElementById('data-counts').innerText = `신규: ${data.addedCount}, 갱신: ${data.updatedCount}`;

        } catch (e) {
            console.error('Status fetch failed', e);
        }
    }

    async function startSync() {
        if (!confirm('전체 카테고리 동기화를 시작하시겠습니까? (최대 수 분이 소요될 수 있습니다)')) return;
        await sendSyncRequest(null);
    }

    async function startCustomSync() {
        const keyword = document.getElementById('custom-keyword').value.trim();
        if (!keyword) {
            alert('먼저 검색어를 입력해주세요.');
            return;
        }
        if (!confirm(`'${keyword}' 키워드로 카테고리를 동기화하시겠습니까? (약 수 초 소요)`)) return;
        await sendSyncRequest(keyword);
    }

    async function sendSyncRequest(keyword) {
        try {
            const body = keyword ? JSON.stringify({ keyword: keyword }) : "{}";
            const res = await fetch('/api/admin/bot/sync-categories', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: body
            });
            const data = await res.json();
            
            let htmlLog = `<div>${data.message}</div>`;
            if (data.results && data.results.length > 0) {
                htmlLog += '<ul style="text-align: left; background: #1e293b; padding: 15px; border-radius: 8px; margin-top: 10px; max-height: 200px; overflow-y: auto; list-style-type: disc; margin-left: 20px;">';
                data.results.forEach(c => {
                    htmlLog += `<li style="margin-bottom: 4px; color: #f8fafc;"><strong>${c.categoryValue}</strong> <span style="font-size: 0.85em; color: #94a3b8;">[${c.categoryType}]</span></li>`;
                });
                htmlLog += '</ul>';
            }
            
            document.getElementById('sync-log').innerHTML = htmlLog;
            if (keyword) document.getElementById('custom-keyword').value = ''; // 입력 필드 초기화
            updateStatus();
        } catch (e) {
            alert('동기화 요청 실패');
        }
    }

    async function loadStreamers() {
        const container = document.getElementById('streamer-list-container');
        try {
            const res = await fetch('/api/admin/bot/streamers');
            if (!res.ok) throw new Error('목록 조회 실패');
            const streamers = await res.json();
            console.log('[Debug] Streamer List:', streamers);

            if (streamers.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted);">등록된 스트리머가 없습니다.</div>';
                return;
            }

            let html = '<table style="width: 100%; border-collapse: collapse; font-size: 0.9rem;">';
            html += '<thead style="border-bottom: 1px solid #334155; color: var(--text-muted);"><tr><th style="padding: 10px; text-align: left;">프로필</th><th style="padding: 10px; text-align: left;">닉네임</th><th style="padding: 10px; text-align: left;">상태</th><th style="padding: 10px; text-align: center;">작업</th></tr></thead><tbody>';
            
            streamers.forEach(s => {
                const isBotEnabled = s.isBotEnabled || s.IsBotEnabled || false;
                const channelName = s.channelName || s.ChannelName || '이름 없음';
                
                const statusHtml = isBotEnabled 
                    ? '<span style="color: var(--primary);">● 연동중</span>' 
                    : '<span style="color: var(--text-muted);">○ 미연동</span>';
                
                const rawImgUrl = s.profileImageUrl || s.ProfileImageUrl;
                const profileImg = (rawImgUrl && rawImgUrl.trim() !== "") 
                    ? `/api/proxy/image?url=${encodeURIComponent(rawImgUrl)}` 
                    : 'https://ssl.pstatic.net/static/ncloud/endpoint/img/default_profile_64x64.png';

                const chzzkUid = s.chzzkUid || s.ChzzkUid;

                html += `<tr style="border-bottom: 1px solid #1e293b;">
                    <td style="padding: 10px;"><img src="${profileImg}" referrerpolicy="no-referrer" onerror="this.onerror=null; this.src='https://ssl.pstatic.net/static/ncloud/endpoint/img/default_profile_64x64.png'" style="width: 32px; height: 32px; border-radius: 50%; vertical-align: middle; image-rendering: -webkit-optimize-contrast; image-rendering: crisp-edges;"></td>
                    <td style="padding: 10px; font-weight: 600;">${channelName}</td>
                    <td style="padding: 10px;">${statusHtml}</td>
                    <td style="padding: 10px; text-align: center;">
                        <a href="/main.html?uid=${chzzkUid}" class="btn btn-primary" style="margin-top: 0; padding: 6px 12px; font-size: 0.8rem; width: auto;">대시보드 접속</a>
                    </td>
                </tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        } catch (e) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--danger);">목록을 불러오는 데 실패했습니다.</div>';
        }
    }

    // 3초마다 상태 갱신
    setInterval(updateStatus, 3000);
    updateStatus();
    loadStreamers();
</script>

</body>
</html>
