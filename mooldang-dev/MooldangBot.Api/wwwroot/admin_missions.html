<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>룰렛 미션 관리자 - MooldangBot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --primary: #ff0055;
            --success: #00c853;
            --warning: #ffd600;
            --text-main: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 { margin: 0; font-size: 28px; }

        .status-filters {
            display: flex;
            gap: 10px;
        }

        button.filter-btn {
            background: #333;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button.filter-btn.active {
            background: var(--primary);
        }

        #mission-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mission-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: slide-in 0.3s ease-out;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mission-info .viewer {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 5px;
        }

        .mission-info .item-name {
            font-size: 20px;
            font-weight: 700;
        }

        .mission-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .btn-success { background: var(--success); color: white; }
        .btn-cancel { background: #444; color: white; }

        .time { font-size: 12px; color: #666; margin-top: 5px; }

        /* Toast & Audio */
        #toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .toast {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            margin-top: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: toast-in 0.3s ease-out;
        }

        @keyframes toast-in {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        /* Load More Button */
        .load-more-container {
            display: flex;
            justify-content: center;
            margin: 30px 0;
        }

        #btn-load-more {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-dim);
            padding: 12px 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btn-load-more:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: rgba(255, 255, 255, 0.3);
        }

        #btn-load-more:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>🎯 미션 관리 대시보드</h1>
            <div class="status-filters">
                <button class="filter-btn active" onclick="setFilter(0)">대기 중</button>
                <button class="filter-btn" onclick="setFilter(1)">완료됨</button>
                <button class="filter-btn" onclick="setFilter(2)">취소됨</button>
            </div>
        </header>

        <div id="mission-list">
            <!-- 미션 목록이 여기에 동적으로 추가됨 -->
        </div>

        <div class="load-more-container">
            <button id="btn-load-more" onclick="loadHistory(true)" style="display: none;">더 보기</button>
        </div>
    </div>

    <div id="toast-container"></div>
    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <script>
        let currentStatus = 0;
        let streamerUid = "";

        // API 및 SignalR 연동
        async function init() {
            // 유저 정보 가져오기 (실제 구현 시 API 호출 필요)
            const res = await fetch('/api/auth/session');
            if (res.ok) {
                const session = await res.json();
                streamerUid = session.chzzkUid;
                loadHistory();
                startSignalR();
            } else {
                alert("인증이 필요합니다.");
            }
        }

        let lastId = 0;
        let isLoading = false;

        async function loadHistory(isLoadMore = false) {
            if (isLoading) return;
            
            if (!isLoadMore) {
                lastId = 0;
                document.getElementById('mission-list').innerHTML = '';
            }

            isLoading = true;
            const btn = document.getElementById('btn-load-more');
            if (btn) {
                btn.disabled = true;
                btn.innerText = '로딩 중...';
            }

            try {
                const res = await fetch(`/api/admin/roulette/${streamerUid}/history?status=${currentStatus}&lastId=${lastId}&pageSize=20`);
                if (res.ok) {
                    const result = await res.json();
                    renderList(result.data, false); // 항상 append (이미 clear 처리함)
                    lastId = result.nextLastId || 0;
                    
                    if (btn) {
                        btn.style.display = lastId > 0 ? 'block' : 'none';
                        btn.innerText = '더 보기';
                    }
                }
            } catch (err) {
                console.error("Failed to load history:", err);
            } finally {
                isLoading = false;
                if (btn) btn.disabled = false;
            }
        }

        function renderList(logs, prepend = false) {
            const list = document.getElementById('mission-list');

            logs.forEach(log => {
                const card = document.createElement('div');
                card.className = 'mission-card';
                card.id = `mission-${log.id}`;
                
                const timeStr = new Date(log.createdAt).toLocaleTimeString();
                const rouletteNameTag = log.rouletteName ? `<span style="color: var(--primary); font-size: 13px;">[${log.rouletteName}]</span> ` : '';

                card.innerHTML = `
                    <div class="mission-info">
                        <div class="viewer">${rouletteNameTag}${log.viewerNickname}</div>
                        <div class="item-name">${log.itemName}</div>
                        <div class="time">${timeStr}</div>
                    </div>
                    <div class="mission-actions">
                        ${log.status === 0 ? `
                            <button class="btn btn-success" onclick="updateStatus(${log.id}, 1)">완료</button>
                            <button class="btn btn-cancel" onclick="updateStatus(${log.id}, 2)">취소</button>
                        ` : `
                            <span style="color: #666">${log.status === 1 ? '✅ COMPLETED' : '❌ CANCELLED'}</span>
                        `}
                    </div>
                `;
                if (prepend) list.prepend(card);
                else list.appendChild(card);
            });
        }

        async function updateStatus(id, status) {
            const res = await fetch(`/api/admin/roulette/history/${id}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(status)
            });

            if (res.ok) {
                if (currentStatus === 0) {
                    const el = document.getElementById(`mission-${id}`);
                    el.style.opacity = '0';
                    setTimeout(() => el.remove(), 300);
                } else {
                    loadHistory();
                }
            }
        }

        function setFilter(status) {
            currentStatus = status;
            document.querySelectorAll('.filter-btn').forEach((btn, idx) => {
                btn.classList.toggle('active', idx === status);
            });
            loadHistory();
        }

        function startSignalR() {
            const connection = new signalR.HubConnectionBuilder()
                .withUrl("/api/hubs/overlay")
                .withAutomaticReconnect()
                .build();

            connection.on("MissionReceived", (log) => {
                if (log.status === 0) {
                    renderList([log], true);
                    showToast(`새로운 미션: ${log.itemName}`);
                    document.getElementById('notif-sound').play();
                }
            });

            connection.start().then(() => {
                connection.invoke("JoinStreamerGroup", streamerUid);
            });
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        init();
    </script>
</body>

</html>
