# [오시리스의 함대] - BACKEND API LAYER
# 메인 API 서버 및 데이터베이스 마이그레이션을 담당합니다.

services:
  migration:
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-dev-migration
    restart: "no"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    entrypoint: [ "dotnet", "cli/MooldangBot.Cli.dll" ]
    networks:
      - mooldang_dev_net

  app:
    build:
      context: .
      dockerfile: ./MooldangBot.Api/Dockerfile
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-dev-app
    restart: always
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    deploy:
      resources:
        limits:
          memory: 512M
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
      - CONNECTIONSTRINGS__COMMONCONNECTION=Server=db;Database=MooldangCommon;Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-dev.rule=Host(`dev.mooldang.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.app-dev.entrypoints=web-dev"
      - "traefik.http.services.app-dev.loadbalancer.server.port=8080"
      - "traefik.http.services.app-dev.loadbalancer.sticky.cookie=true"
      - "traefik.http.middlewares.app-upgrade.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.dev-noindex.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow, noarchive, nosnippet"
      - "traefik.http.routers.app-dev.middlewares=app-upgrade,cloudflare-real-ip@file,dev-noindex"
      - "traefik.docker.network=mooldang_dev_net"
      - "traefik.env=dev"
    networks:
      - mooldang_dev_net
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${COMMON_SONG_DATA_PATH}:/app/wwwroot/uploads/library/songs
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys

networks:
  mooldang_dev_net:
    external: true
