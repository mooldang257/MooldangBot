# [오시리스의 함대 v2.6] - BACKEND LAYER
# 메인 API 및 치지직 봇 서비스를 담당합니다.

services:
  migration:
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-dev-migration
    restart: "no"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    entrypoint: [ "dotnet", "cli/MooldangBot.Cli.dll" ]
    networks:
      - mooldang_dev_net
    # 인프라 레이어의 db 서비스가 준비될 때까지 기다림
    # (주의: 별도 파일로 분리 시 depends_on의 condition은 같은 파일 내 서비스에만 적용됩니다. 
    # 따라서 여기서는 외부 서비스 존재 여부만 체크하게 됩니다.)

  app:
    build:
      context: .
      dockerfile: ./MooldangBot.Api/Dockerfile
    image: mooldang-app:${VERSION_APP:-latest}
    container_name: mooldang-dev-app
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    env_file:
      - .env
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app-dev.rule=(Host(`${BASE_DOMAIN}`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.app-dev.entrypoints=web"
      - "traefik.http.services.app-dev.loadbalancer.server.port=8080"
      - "traefik.http.services.app-dev.loadbalancer.sticky.cookie=true"
      - "traefik.http.middlewares.app-upgrade.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.middlewares.dev-noindex.headers.customresponseheaders.X-Robots-Tag=noindex, nofollow, noarchive, nosnippet"
      - "traefik.http.routers.app-dev.middlewares=app-upgrade,cloudflare-real-ip@file,dev-noindex"
      - "traefik.env=dev"
    networks:
      - mooldang_dev_net
    volumes:
      - ${AVATAR_DATA_PATH}:/app/wwwroot/images/avatars
      - ${UPLOAD_DATA_PATH}:/app/wwwroot/uploads
      - ${COMMON_SONG_DATA_PATH}:/app/wwwroot/uploads/library/songs
      - ${APP_DATA_PATH}:/app/data
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys

  chzzk-bot:
    build:
      context: .
      dockerfile: ./MooldangBot.ChzzkAPI/Dockerfile
    image: mooldang-chzzk-bot:${VERSION_APP:-latest}
    container_name: mooldang-dev-chzzk-bot
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
    env_file:
      - .env
    environment:
      - DOTNET_ENVIRONMENT=Development
      - DB_HOST=db
      - REDIS_URL=redis:6379
      - RABBITMQ_HOST=rabbitmq
      - LOKI_URL=http://loki:3100
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-mooldang_osiris_secret_2026}
      - CHZZKAPI__CLIENTID=${CHZZKAPI__CLIENTID}
      - CHZZKAPI__CLIENTSECRET=${CHZZKAPI__CLIENTSECRET}
      - DISABLE_POINT_WRITEBACK=true
      - DISABLE_POINT_BATCH=true
      - CONNECTIONSTRINGS__DEFAULTCONNECTION=Server=db;Database=${MARIADB_DATABASE};Uid=${MARIADB_USER};Pwd=${MARIADB_PASSWORD};SslMode=None;
    networks:
      - mooldang_dev_net
    volumes:
      - ${KEYS_DATA_PATH:-./keys}:/root/.aspnet/DataProtection-Keys
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://localhost:8080/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  mooldang_dev_net:
    external: true
