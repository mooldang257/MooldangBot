version: '3.8'

services:
  # [오시리스의 대시보드]: UI 개발 모드 최적화 (Hot-Reload 활성화)
  studio:
    build:
      context: ./MooldangBot.Studio
      dockerfile: Dockerfile
      target: builder # [물멍]: Vite 등 개발 의존성이 포함된 빌드 단계를 사용하도록 설정
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      # 1. 로컬 소스 코드를 컨테이너 내부와 실질적으로 연결합니다.
      - ./MooldangBot.Studio:/app
      # 2. 컨테이너 내부의 의존성(node_modules)은 로컬에 의해 투명하게 덮어써지지 않도록 익명 볼륨으로 보호합니다.
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # 3. Windows 환경에서의 파일 시스템 변경 감지 성능을 위해 폴링 모드를 활성화합니다.
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    # 개발 모드에서는 리소스 제약을 완화하거나 필요한 포트를 직접 열어줄 수 있습니다.
    ports:
      - "3001:3000" # (선택사항) Nginx를 거치지 않고 직접 접근하고 싶을 때 대비
